body:
  text: 周易象㫖决録卷三明熊過撰下經咸艮下兊上胡仲虎曰上經首乾坤者天地定位也下經首咸恒者山澤通氣也位欲其分故天地分為二卦氣欲其合故山澤合為一卦八純爻皆不應泰否天地相應故居上篇咸損少男女相應恒益長男女相應故居下篇咸以少男下少女又應之至者故首下篇咸亨利貞取女吉彖曰咸感也柔上而剛下二氣感應以相與止而說男下女是以亨利貞取女吉也天地感而萬物化生聖人感人心而天下和平觀其所感而天地萬物之情可見矣柔上剛下以兌柔艮剛言蜀才云本否卦六三升上上九降三程先生從之非也朱先生曰咸自旅來柔上居上剛下居五亦非也大傳曰彖者言乎其象爻者言乎其變如二氏是象言其變乎按荀卿子咸感下云以髙下下以男下女剛上而柔下據荀氏以正古經其義既明矣今其下當曰二氣感應以相與止而説是以亨利貞取女吉而以男下女歸剛上柔下之前耳咸本訓皆而彖傳以咸感為言宋李舜臣本字說遂謂无心之感人相感誠不外心然若有所繫則意必之私耳何以為感哉復彖傳言天地之心咸言人心乾氣化之始而曰品物流形咸形化之始而曰二氣感應故知形氣之不相離也象曰山上有澤咸君子以虚受人初六咸其拇象曰咸其拇志在外也拇依子夏作􅡑古文荀作母六二咸其腓凶居吉象曰雖凶居吉順不害也腓說文云脛腨也下體股足之間二象也荀氏作肥謂五尊盛之稱卦以拇腓股脢頰為次有義知荀氏非矣二陰柔不能待感而先動故凶然本體艮葢咸則動而體巽進退居則不變為艮止故不害也何子元以順慎通與坤四傳同者非崔憬謂承比于三亦非二五正應非戒其不感欲感而後應不可躁也呂仲木曰本義訓居為靜與小象雖字不合愚謂吕氏過矣九三咸其股執其隨往吝象曰咸其股亦不處也志在隨人所執下也股者三互巽之中也執猶執友之執隨指二拇動足未必聽故初于四有志而已二互巽之下進退之初而腓動靜之制在焉三居互巽之中股可止而牽于腓故云亦不處以互巽進退而失艮體之止於上六正應亦失所以為主矣其往寜不吝哉執下謂下比二以為所執汙下誤矣九四貞吉悔亡憧憧往來朋從爾思象曰貞吉悔亡未感害也憧憧往來未光大也九四以陽居陰雖失其正然與初為感者貞也憧憧往来四上感五五下感四也朋從爾思四五俱陽為朋爾謂四也四雖剛而體說故象如此毛氏璞曰易言悔亡自此始悔亡者齊履謙曰功能掩過也九五咸其脢无悔象曰咸其脢志末也脢子夏鄭虞王皆謂脊肉説文脢即膂也心繋於膂以奠神明宰庶務故詩言膂力經營王弼以為心上口下陸師農因謂喉中脢核馮椅曰喉之出納所皆非也九五有正應而三體艮執之五自瘁其膂而巳不解于位民之攸塈故僅免於悔然失説使之道非感之中志在末務而巳俞氏末下當有𤼵字非李鼎祚謂上居卦終為末亦非也卦以感為義而爻以靜為善何也凡感貴以神横渠先生所謂咸卦六爻皆以有感不盡咸道故君子欲得以虚受人也虚受人者即所謂神之感而无意必固我諸爻動而无靜五靜而无動皆非心之正也上六咸其輔頰舌象曰咸其輔頰舌滕口説也輔虞氏作䩉耳目之間稱䩉矣滕陸氏曰達也九家作乗者非也項氏曰初上皆不言凶悔吝者當感之時柔在内者必應于外柔在外者必説于内皆其常理又所應皆正非妄感也故无凶悔事有當用播告者滕口說非鄙之專倚則亦非美也故不得言吉蘇氏曰爻配一體自拇而上至於口當其處者有其德德有優劣而吉凶生焉六體各見非全人見其所感非全德也是故六爻未有不相應者而皆病焉不凶則吝其善者免於悔而巳彼以夫五爻者皆有為之病五懲其病而舉不為是无為之病也脫簡據荀子咸感也下脱以髙下下據荀卿男下女在柔上剛下之下證誤拇依子夏作􅡑恒巽下震上恒亨无咎利貞利有攸往彖曰恒久也剛上而柔下雷風相與巽而動剛柔皆應恒恒亨无咎利貞久於其道也天地之道恒久而不已也利有攸往終則有始也日月得天而能久照四時變化而能久成聖人久於其道而天下化成觀其所恒而天地萬物之情可見矣貞所以為恒説文恒从心从舟在二岸之間徹首尾矣而在既亨无咎之後何也上下未交則不見可貞者恒之始剛柔適職而情深通可久之道也居恒之世而利有攸往欲及其未窮不見更端終始之迹非一定不易之謂也吕仲木引大傳窮變通久為言然至窮乃變非先天不違矣予友山東李茂欽曰成章而後逹亦恒意其稱天地之道者雙湖胡氏曰卦自乾坤交是也乾言性情命而咸恒獨言情隨所見而標之耳學者至分天人以通之鑿矣咸恒之情有不𤼵于性者乎象曰雷風恒君子以立不易方平菴項氏曰巽入而在内震出而在外二物各居其位故謂之不易方雷入從風風出從雷則易位如益而言遷改矣夫項氏得其象矣義則未盡既動而順又易方焉則渝常道故不易方者非泥懼誘於物也初六浚恒貞凶无攸利象曰浚恒之凶始求深也浚如春秋浚洙詩小弁浚泉之浚謂深之耳蘇氏下沈曰浚即巽入也入者内辭如朱義四不應初初不能度勢性務入深以常理求之則外辭矣下巽為婦故内三爻言婦道上震為夫故外三爻言夫道初才弱志卑見四之不相下而深藏可謂貞矣然不交則兩情不通内職不修矣故凶不亨而用貞終必兩廢故无攸利曰始求深言始未可遽求深入也九二悔亡象曰九二悔亡能久中也咸九四恒九二皆以陽居陰非貞也恒之二不曰貞而徑言悔亡咸九四不正不中恒九二不正而中中重於正也九三不恒其德或承之羞貞吝象曰不恒其德无所容也巽為進退其究為躁卦三居巽極德之不恒甚矣横渠謂進則犯上退則乗剛非也吳氏以為婦失職被黜者羞食之加饌主饋者既失職而出或人非可主饋而代之承進者又非正饌皆非常也奚而不吝九四田无禽象曰久非其位安得禽也田者震為大塗禽者巽為鸛禽之類也初六浚而深入无禽之象以九居四而在恒時久非其位失夫之剛无以供中饋之烹餁矣六五恒其德貞婦人吉夫子凶象曰婦人貞吉從一而終也夫子制義從婦凶也上六振恒凶象曰振恒在上大无功也振虞張作震動也説文作楮者非上六振恒震體也公羊傳曰震之者何猶曰振振然也上六柔而不夫居震之極處於恒終而奮迅輕動三不恒而強振之為恒亦終於无功而已大謂陽葢三也在上明其振三之謂也升陽子讀易至咸恒曰大哉觀象之道乎咸者少男女之交人造丹之象也雜物撰德備於中爻互巽在艮陽之中伏氣築基自巽始也二陽在互巽之上鼔巽風追二氣於兊口也稱二氣感應舍濁來清之謂也止而説陽不剛不可以造丹也恒之言久長男女得丹之象也互兊在二陽之丄明金砂自重稷入也不正臨其上而居互體之中明次採氣以動河車也巽居互兊之下明巽風繇兊鼓也故曰恒久古之久視者其觀變於陰陽乎斯言有窺矣證字據禮緇衣証字者一恒其徳貞之貞作偵據虞張本振恒之振作震遯艮下乾上遯亨小利貞小謂二陰也遯亨以乾言小利貞以艮言體艮止而不遽以侵陽乃艮之貞而彖傳浸長之意康成以敬仲辭卿當之意或近矣彖曰遯亨遯而亨也剛當位而應與時行也小利貞浸而長也遯之時義大矣哉否亦剛當位何以異遯二為三所畜上下之交未絶也以權應柔順時而行心遯而身在位明哲以保其身者乎象曰天下有山遯君子以逺小人不惡而嚴初六遯尾厲勿用有攸往象曰遯尾之厲不往何災也卦之名遯以二陰浸長而迫陽以遯初非自遯也傳義謂遯而在後非卦象義矣四陽將遯初尾其後猶逺於陽體艮止而不相犯故厲而不災也六二執之用黄牛之革莫之勝説象曰執用黄牛固志也二柔浸長為成卦之主用事之爻也然柔中而正體艮用三以自執其侵陵之志者黄牛之革謂九三艮之所以為止者也吳氏曰二下卦之中為黄坤為牛而上畫變成坤是牛外之皮變故為革愚謂乾為馬震得乾之初亦為馬坤為牛巽得坤初亦為牛二變體巽故稱黄牛二以三自執故三係遯也九三係遯有疾厲畜臣妾吉象曰係遯之厲有疾憊也畜臣妾吉不可大事也九三當陰長陵陽之界既與之同體而下比之是以不免疾厲畜臣妾吉畜下二隂使制于陽而不陵上則吉也畜如畜君何尤之畜止也臣妾者艮象觀旅得之初位剛臣二位柔妾虞翻曰三消成坤與上易位坤為臣兌為妾非也九四好遯君子吉小人否象曰君子好遯小人否也三二私比則為繋戀四初正應故稱和好朱義乾體剛健有所好而能絶是也九剛可為君子四柔亦能為小人故設小人之戒矣九五嘉遯貞吉象曰嘉遯貞吉以正志也二雖浸長然以中正體艮尚可轉移而九五亦有治遯之才能嘉美其遯使不犯陽俞謂九四剛而不正逺小人以情九五剛而中正逺小人以禮以别好遯嘉遯者是已孔疏五正二志成遯之美劉氏以為五无去位義為不悖矣上九肥遯无不利象曰肥遯无不利无所疑也句字音无誤大壯乾下震上大壯利貞彖曰大壯大者壯也剛以動故壯大壯利貞大者正也正大而天地之情可見矣一陽來復見天地之心四陽見其情仁者天地之心情其所發也咸恒萃言萬物之情而大壯不及萬物讀易者繇是以知萬物之情不能正且大如天地矣象曰雷在天上大壯君子以非禮弗履李茂欽曰自反而縮雖千萬人吾往矣初九壯于趾征凶有孚象曰壯于趾其孚窮也初九在下先動壯于趾之象雜卦傳曰大壯則止陽止俟陰之消未可遽進故征凶孚猶公羊所謂季氏孚云爾二非正應故謂之孚朱義以孚為必謂之必窮此註家之誤繇王弼以来莫改矣俞氏曰上无應援遂孚於二不得已而孚者也故曰其孚窮九二貞吉象曰九二貞吉以中也九二雖不正然以九居二壯而得中朱先生謂因中求正不然也秀巖李氏曰爻辭言九二貞吉者三此言以中解言得中道未濟言中以行正大意相類但各叶韻耳九三小人用壯君子用罔貞厲羝羊觸籓羸其角象曰小人用壯君子罔也罔猶孟子罔民之罔與網同三變體離目為網故陸氏以羅釋其義謂蒙覆取之也朱先生視有如无過于勇不然也假而曰君子用无不成語矣且過勇則與用壯何異而又别構奇言乎大壯正而已而或用力或用智則貞于威厲矣羝羊荀爽曰三與五同功為兊故曰羊觸籓侯果曰九四體震為竹葦故稱籓也羸馬氏曰大索也羸其角者兌為附決故孔疏云拘纍纒繞也九四貞吉悔亡籓決不羸壯于大輿之輹象曰籓決不羸尚往也九四乗壯體震欲消二陰故貞吉内逼三陽外敵二陰然爻剛位柔不極其壯故自決其籓不以羸三陽之角則觸者反止其輹耳洪景盧謂賴震陽之壯故不羸豈其然哉臨敵而輹壯可以往矣輿輹者國語云震為車四成卦之主故輿以大言大者陽也異餘爻矣六五喪羊于易无悔象曰喪羊于易位不當也羊洪景盧謂九三九四六五為兊羊郭舉正作牛非也易王肅音亦畔也陸績作埸晁以道曰易古文疆埸字與象數合九四之剛非六五之柔所能制是以任其畔而亡去與在籓羸角者異夫羸角者无攸利則喪羊者寜有悔哉位不當讀如彼惡敢當之當廣韻敵也位不當謂五柔順不敵羣陽也上六羝羊觸籓不能退不能遂无攸利艱則吉象曰不能退不能遂不詳也艱則吉咎不長也羝謂三埤雅云大壯之極疑于羝羊非也上六陰柔象不可為羝籓上自謂也上以重陰居五固籓之後欲退羸角之三下有九四壯主比之而不能也遂進也居一成之地進无所之壯終震極不計審而𤼵故曰不詳鄭王肅以詳為祥非也艱則吉知艱而辟也證字易據陸作埸晉坤下離上晉康侯用錫馬蕃庶晝日三接晉下依王弼郭京脫亨字康侯以順而進來朝之侯也考工記曰母或若女不寜侯不厲于王所即其義錫馬蕃庶互坎馬美脊也坤為衆故蕃庶錫如師錫之錫謂下與上也離日在上故晝日三陰在下故三接姚氏曰覲禮延升一也致亨升致命二也亨升三勞之升成拜三也彖曰晉進也明出地上順而麗乎大明柔進而上行是以康侯用錫馬蕃庶晝日三接也柔進而上行晉明夷皆以離取義而晉之離在上也程先生曰凡卦離在上者柔居君位多云柔進而上行如噬嗑暌鼎亦通是以下依郭京俞琰脫亨字或曰三女之卦在上者巽則六四皆謂之上合又謂之上同合同皆謂五也兌在上則上六皆謂之上窮俱不得為上行獨離為得尊位則謂之上行耳蜀才云自觀卦朱先生從之不然矣象曰明出地上晉君子以自昭明德平菴項氏曰自昭以象地明德以象目也初六晉如摧如貞吉罔孚裕无咎象曰晉如摧如獨行正也裕无咎未受命也摧依鄭讀如南山崔崔之崔四體艮在坤土之上為山也晉以進為義者也九四據二陰欲進之衝為初之應故有崔如之象初之應四正也故象曰獨行正以為獨行則正不必以衆也罔與罔罟之罔同虞翻曰應離為罔孚謂二三猶云夷伯李氏之孚也説文作有孚裕朱義不為人信者皆非初在二三之下有罔其所孚晉以應四之象以柔在下而體順有裕无咎之象葢衆允之志不在于四未肯受命須寛以居之也六二晉如愁如貞吉受兹介福于其王母象曰受兹介福以中正也二无應援欲之五而四將據之上疑五之不斷下防四之見害又動則成坎加憂皆有愁象柔順中正靜而有常四亦終莫能閉葢吉象也王母者吳幼清曰六三之陰在二上猶母也九四之陽尊於四猶父六五之陰又尊於父猶王母黄潤玉以為閟宫姜嫄疑不必然六三衆允悔亡象曰衆允之志上行也允從說文作􅣡字從本從屮諧允聲本者進趨􅋄亦進而上徹之義方於象叶九四晉如鼫䑕貞厲象曰鼫䑕貞厲位不當也鼫䑕子夏鄭瞿皆作碩碩大也二三四互艮象䑕九陽畫為大䑕本草指為螻蛅項以土狗言皆非䑕以晝伏非能以晝進者三陰欲進麗六五大明之君九四以非類畏忌羣陰自疑其往也晉之時衆皆以柔進而四獨以剛是貞於厲者或曰六五大明之君在上九四恃剛而進猶鼫䑕撲火而見爇也位不當當讀平聲言不敵衆允之勢未能撫而有之也六五悔亡失得勿恤往吉无不利象曰失得勿恤往有慶也以陰居陽悔也五居離體之中有大明之德而下皆順從故其悔亡失得依孟馬鄭虞王作矢得馬王云離為矢今按弧矢威天下於睽取離是其象荀爽曰離者射下故為矢得星氏謂象數之合此也在旅離而遇艮止則一矢亡在晉離而遇坤順則矢得矢得則獲下故不必憂慮而往吉无不利荀爽曰中盛光明照四海也朱義緣輔嗣伊川小變之曰去其計功謀利之心非矣上九晉其角維用伐邑厲吉无咎貞吝象曰維用伐邑道未光也孔疏曰西南陽位處晉極明終猶日過中已在於角而猶進之象故曰晉其角朱先生依虞翻等舊説謂角剛居上不然也維交結也上窮无可進返而與五相維離五為中女蠶絲故稱維離為兵戈故稱伐四與上同體故為私邑虞翻謂坤為邑通常而不達變矣明之將終不能及逺與四同體四閉其應无以令之而至於用兵道不光矣四上皆陽體離而熖烈故皆稱厲此正而吝者言乎其小疵也與謙上之征國邑不同矣證字依鄭摧作崔依説文允作􅣡依子夏鼫作碩依孟馬鄭虞王失得作矢得明夷離下坤上明夷利艱貞彖曰明入地中明夷内文明而外柔順以蒙大難文王以之利艱貞晦其明也内難而能正其志箕子以之大難闗天下之難内難一家難也處義者歉於外順處恩者忌於内溺内難能正其志此獨指六二言之朱先生謂六五葢爻辭誤之也象曰明入地中明夷君子以蒞衆用晦而明蒞衆坤為衆也初九明夷于飛垂其翼君子于行三日不食有攸往主人有言象曰君子于行義不食也離有飛鳥之象於旅見之初居下无責又去災尚逺而離以察幾故垂翼而飛王輔嗣曰絶跡匿形不繇軌路故明夷於飛懐懼而行行不敢顯故垂其翼是也君子謂初初與四應六四互震之中畫為大塗于行謂自初適四也三日厯三位乃之四也左氏紀楚丘之言四日之謙明而未融日之動當三在旦日離象也乾一兊二離三為三日非也離似頥有求口實之象變則不食未去則垂翼緩之至行則不食亟之至也有攸往則其跡露故主人有言主人謂四猶睽之主皆指其應九家易謂衆陰者非也言左氏曰火焚山山敗於人為言按洪範亦以言屬火九家以四五體震為言失之矣濳遯則有不食之厄顯行則遭妄動之譏六二明夷夷于左股用拯馬壯吉象曰六二之吉順以則也股依馬生作般云日隨天左旋也晁氏曰約周髀而言當作股晁葢指勾股亦旋意王輔嗣曰行不能壯意謂髀股吳幼清遂指三言之非也於象離為目為目不為股象鄭以夷作睇曰二辰在酉酉是西方下體離離為目互體在震東方又在辰得巽氣為股非也六二居中得正順於九三拯子夏作枡上舉也夷日明於左旋而升用晦之道也吳幼清曰九三陽剛在六二之前互震下畫為馬足作足之馬互坎中畫為美脊亟心之馬壯則行地无疆能枡舉六二不畏於上之夷明故吉也五夷二而三拯之嫌于内比二柔體正故象以順則明之也二能免夷明者也朱義初見傷二傷而未切雖本王程然未有初災反深於二者矣九三明夷于南狩得其大首不可疾貞象曰南狩之志乃大得也離南方之卦九三以剛居剛又互震動故為南狩吳幼清曰大謂三之陽三與上應上者三之首故曰大首謂能得上六也疾貞程朱連讀項玩辭貞字自為句得之六四入于左腹獲明夷之心于出門庭象曰入于左腹獲心意也坤為腹離亦為腹凡稱先陰後陽先左後右畫卦先下後上則左腹謂離初指四所應者初攸往四闇而有言必待入左腹出門庭始獲初明夷之心初互坎之下為心葢四雖非明夷之主君子以為不諒人只矣門庭坤偶闔戸有門象四自謂也吕仲木蔡介夫謂醫書心在左腹不然也彼自以昧言耳心豈在左腹哉朱先生謂六四居闇尚淺猶可得意於去亦不然矣吳氏謂三四五艮之反體艮為門闕五在門闕之外者近鑿六五箕子之明夷利貞象曰箕子之貞明不可息也五以柔暗居尊為明夷之主夷二之明故其象如此箕子蜀才作其子俞氏曰其子即箕子也不敢顯稱箕子之名遂微其辭而曰其子孔子逆知文王之意乃於彖傳顯言為其箕子後人因彖傳稱箕子遂于爻辭併加竹作箕文王本文葢即是其子非箕子也其子指六二六五為明夷之主六二在内正應其子也愚謂俞氏説是矣此所謂文王之危辭也若諸家以六五為箕子而以上六為明夷之主則不可之甚固當從俞説上六不明晦初登于天後入于地象曰初登于天照四國也後入于地失則也以陰居坤之極不明其德夷三之明也初登天得三之應也闇極而不能援然後三竟匿坤地之下矣鹽鐵論文學易曰小人處盛位雖髙必崩不盈其道不恒其德而能以善終身未之有也是以初登于天後入于地曰疑為文言矣證句據項氏疾貞之貞自為句證字據馬王左股之股作般證字據子夏拯作抍證字據蜀才箕作其家人離下巽上家人利女貞巽長女離中女而各得其正舜之釐降文王之小星也故利女貞彖曰家人女正位乎内男正位乎外男女正天地之大義也家人有嚴君焉父母之謂也父父子子兄兄弟弟夫夫婦婦而家道正正家而天下定矣家人男女正位以言乎巽陰四内陽五外也長女出嫁從夫也家人有嚴君父母之謂以言乎離也中女在家從父也此自以義言之與六十三卦所陳别為例也今乃中執一説必曰二為女五為男二為母五為父漢自虞荀迨宋程蘇諸家倡而和之同守不變夫離再索而得中女無母象巽一索而得長女無父象今奈何誤誖至是哉馬融獨知家人女為奥主長女中女各得其正稱利女貞于彖傳亦不能明其㫖也吳幼清曰五為巽女之夫居三畫卦之人位三為離女之夫居六畫卦之人位故曰家人象曰風自火出家人君子以言有物而行有恒初九閑有家悔亡象曰閑有家志未變也離體而有先見之明能防閑于有家之始故雖剛而不中亦能亡其悔六二无攸遂在中饋貞吉象曰六二之吉順以巽也中謂二居下卦之中二不變則互坎二變則互兊皆有飲食之道為中饋矣以婦職故舉以明之易象言順以巽者三蒙六五以本爻之變言漸六四以本爻不變言此指所應爻言皆有巽象九三家人嗃嗃悔厲吉婦子嘻嘻終吝象曰家人嗃嗃未失也婦子嘻嘻失家節也嗃嗃依劉向作熇與詩熇熇同離體之象九三重剛離極惟悔厲乃吉然使其婦子至於嘻嘻則吝吝言乎其小疵也嘻字書嘆也一曰有所多大之聲禮嘻甚周頌噫嘻皆嘆辭也嘻嘻甚於熇熇葢不堪而嘆不以訓笑説者自漢來皆曰嗃嗃之反宋王回疑重剛卦无嘻笑理以謂難意獨得卦情矣三顓尚其剛使其婦子不能容而嘆豈有不吝者亦異于上九之威如矣威如如者如威而已不顓尚剛也六四富家大吉象曰富家大吉順在位也四承乗應皆陽是上下内外皆富矣四為巽主居得其正有巽入而安其居之象九五王假有家勿恤吉象曰王假有家交相愛也假當依馬融古雅反大也朱先生從陸氏訓至恐有不然此與豐王假之假同豐彖傳謂王者以天下為家故云尚大今此獨曰以是至於有家則其辭不逹矣天下為家者勢大易忘勿恤者蘇氏所謂簡易勿恤以通相愛之情者是也上九有孚威如終吉象曰威如之吉反身之謂也吳幼清曰家人卦初上二爻以卦之初終取義下體在下之家也以有家之臣而言三為夫二婦也上體在上之家也以天下之君而言五為王四為后不敢遠應為配而取近比者家道尚親也睽兊下離上睽小事吉革亦二女同居而大亨革以九居五六居二大亨者以其正也睽胥反焉所以僅小事吉也彖曰睽火動而上澤動而下二女同居其志不同行説而麗乎明柔進而上行得中而應乎剛是以小事吉天地睽而其事同也男女睽而其志通也萬物睽而其事類也睽之時用大矣哉睽吉小而用大何也蘇氏曰人茍惟知同之足若是必睽人茍知睽之足以有為若是必同象曰上火下澤睽君子以同而異初九悔亡喪馬勿逐自復見惡人无咎象曰見惡人以辟咎也初應在四互坎馬象也而為同體之五所乗故有喪馬之象然四往无所之則正應者合其勢自復王弼謂物莫能同其私必相顯非也虞氏復謂四變則互震為逐上乃艮故勿逐亦迂曲矣吳幼清知坎為馬顧曰坎下畫柔變剛為兊坎體失故喪馬初變為柔坎體復故勿逐自復不求於四而求諸初九其取象宜其隠哉惡人劉氏讀如周鄭交惡之惡九四不當位又睽久而不同心也初才剛體説剛則自守者堅説則不拒絶人蘇氏曰以其難致捨之則從我者皆吾疾也是相率而入于咎耳故見惡人所以辟咎也今謂如陽貨之類者非同德相應矣九二遇主于巷无咎象曰遇主于巷未失道也主謂五說文巷里中道何休云一里八十戸八家共一巷是也離中虚有巷之象不言家而言巷二五皆不當位卦繇此成睽然俱求其黨註家謂之出門同趣不期而㑹葢卦名睽而爻義則貴其合二本五之所求彖傳以為應剛者是也得其正應又何咎耶說者謂二五君臣之睽如此六三見輿曳其牛掣其人天且劓无初有終象曰見輿曳位不當也无初有終遇剛也三互離為見非正離也互坎為車為曳非正坎也曳者緣地而不能行義取坎陷无牽退之意也互離又為牛掣王弼曰滯隔所在不獲進説文作觢牛角一俯一仰不能駕輿行也无前掣之意六三以説為成兊之主而麗文明之君然才弱難進故象如此或曰􅞮者牛前而車後今三四五互坎稍前於離牛二三四互離反却於坎輿用通其人謂三三之天謂上也陽爻故稱天且者未必然之辭鼻者上通之物劓之則洬其上通吳幼清以為三車曳牛掣而乗車者復將遭上劓鼻之災也兊為毁折所謂无初今言者因安定晦菴語謂篆文天而相同亦附㑹太甚矣三上葢夫婦之睽者胡仲虎曰三上皆言見意見也火澤之睽生於動三上之睽生於見本无輿曳无牛掣本无劓故其見如此九四睽孤遇元夫交孚厲无咎象曰交孚无咎志行也初四皆无應而四稱睽孤在下猶可獨立在上不可无輔也元夫謂初陽德也兩剛相與故有威嚴六五悔亡厥宗噬膚往何咎象曰厥宗噬膚往有慶也五以陰居陽宜有悔然柔進上行得中而應乎剛有悔亡之象蘇氏曰五配九二二宗九四二與四同功故曰宗自五言二之宗故曰厥宗李鼎祚曰厥宗噬膚二兊為口五爻陰柔噬膚之象非也吳氏指五為二宗俞氏謂五以四為宗大謬誖矣膚六三也六五所以不適二者疑四之為寇也四以噬三則不暇寇我我往從二何咎之有上九睽孤見豕負塗載鬼一車先張之弧後説之弧匪寇婚媾往遇雨則吉象曰遇雨之吉羣疑亡也上九剛明之極猜狠太甚見六三牽輿之牛疑其為背負泥塗之豕泥塗者兌澤也虞翻曰坎水滯於卦中不能流有泥塗之象吳氏謂九四互坎中畫水濕故六三互坎下畫水旁土謂泥塗鑿矣見六三載人之輿疑其為載鬼之車三互坎為車鬼謂離也離南方之卦鬼南方之宿有大陵積尸之氣離在互坎之上故以星象吳氏指九四坎月之魄為鬼不然也載鬼一車疑其所載之多不專於己也既又疑三為寇而射己左氏作寇而下匪寇之寇坎為弓有射象後説之弧京馬鄭王瞿子元作壺謂三互離大腹似壺矢韇也虞翻曰之應厯險以與兌故後説之壺至是而疑稍釋矣遇雨者應三互坎也羣疑既釋則陰陽和洽而雨故吉卦之睽始於疑故也證字據左傳先張作寇張據京馬鄭王瞿子元説弧之弧作壼證音惡人依劉績讀交惡之惡蹇艮下坎上蹇利西南不利東北利見大人貞吉蘇氏曰艮東北方坎北方也蹇難在東北則西南者無難之地虞翻曰坤西南卦五在坤中坎為日月生西南故利西南徃得中謂西南得朋艮東北之卦月消於艮喪乙滅癸故不利東北其道窮則東北喪朋蹇本无坤而虞主坤本以坎險而虞為得本以艮為知而虞為喪違經義矣王弼但謂西南為地東北為山程先生因謂西南坤方為地東北艮方艮為山地平山險學者承傳遂至朱先生不能改也朱先生知坤方之誤不以入本義而艮方之言又遂遺坎吳幼清之言曰凡爻位初東五南四西上北初東山下最卑上北水外最險往来上下二體窮盡之處不若交際之處為利以爻位分絶无所據彖曰蹇難也險在前也見險而能止知矣哉蹇利西南往得中也不利東北其道窮也利見大人往有功也當位貞吉以正邦也蹇之時義大矣哉艮有光而又互離為見往謂在上以解反對言之解曰乃得中坎在下也此曰往得中坎往而在上矣解曰往有功四之陽動於上也此曰其道窮三之陽止于下也朱先生主坤荀爽主小過何子元主升皆非中義鄭訓作和與説文同王肅又訓作適俱違遠卦象劉績讀如解得衆曰中衆之誤卦本无坤劉説謬矣楊敬仲曰自春之始于東而中於西南窮于東北則西南有中之象東北有窮之象是楊言亦支也貞吉謂五也傳所謂當位貞吉以正邦者是也朱先生通指五爻失之象曰山上有水蹇君子以反身修德郭京舉正以反身作正愚謂反身者取諸身而足以詔蒙士其義為優初六往蹇來譽象曰往蹇來譽宜待也往以坎言來以艮言待下鄭本以有時字者是六二王臣蹇蹇匪躬之故象曰王臣蹇蹇終无尤也沈存中云王五也臣二也蹇蹇者五蹇而二亦蹇是也胡炳文遵洪邁之説曰坎又互坎得蹇蹇之義朱先生謂應在險中皆未盡象㫖矣九三往蹇来反象曰往蹇來反内喜之也来反郭京舉正曰來正葢以九居三又不失本體艮止之正且在下二陰之所倚重故内喜之也六四往蹇來連象曰往蹇来連當位實也連馬云難也四體坎險而又在互坎之間外難未夷而歸遇難故曰往蹇来連連者難之相仍也朱先生謂連於九三合力以濟非也當廣韻云承也實陽也九三以陽居陽在四之下是承四之位者實也猶屯之乗剛意同而辭異者也王弼謂得位履正當其本實雖遇於難非妄所招俞氏讀作去聲曰但言當位則六二亦當位故加實以明之皆非象㫖矣九五大蹇朋來象曰大蹇朋來以中節也大謂陽朋指九三陽類九五成險之主剛徤中正故其象如此三五雖非正應然異位同功猶解九四解三而俟二也六二言臣而九五不言君大即君也人君无可去之義故止其所而俟朋來以濟難以中節者諸爻皆取不往而來九五正位不動无往无來天下之濟難者朋來而取節焉大蹇之世易于姑息朋來之衆難於齊一故其中道可節之也上六往蹇來碩吉利見大人象曰往蹇來碩志在内也利見大人以從貴也碩即大也指三之陽陽太陰小不言大以别於大蹇也故曰志在内明其下應三也朱先生止謂來就九五則與見大人為複語矣上能出險故吉利見大人比九五也脫字據鄭氏宜待下有時字正字據郭京正誤來反作來正正音據義依廣韻當位作平讀解坎下震上解利西南无所往其來復吉有攸往夙吉解陸德明作蟹音按卦以免險為義則讀當如解棼之解序卦解緩别一義乃如德明作胡賣反耳蘇氏曰所以為解者震與坎震東也坎北也解者在此所解在彼東北解者之所在則西南者所解之地也无所往其來復吉言乎二也有攸往夙吉言乎四也彖曰解險以動動而免乎險解解利西南往得衆也其來復吉乃得中也有攸往夙吉往有功也西南得衆者何也西南所解之地平易近民民必歸之來復得中之上李鼎祚本有无所往句无所往言其與民休息也來復復東北也解之利西南者東北為之也震東而坎北也蹇解反覆之卦蹇九五向往在上今反居二為來復蹇九三向體艮不動今進居四體震動為往虞翻主四反釋來虞既以初往四得坤象為利矣初茍来復何以成解乎荀氏謂二處中成險解何取于成險之義乎朱先生主升之三胡仲虎主小過之二俱非也凡彖不假於一爻之變以立義也其攸往者虞謂初之四胡謂二之四朱謂三之四卦无坤而強立坤義以就其説自漢以來之失也凡彖統論六爻之體不假於一爻之變以立義也爻占其變則有之矣无所往者要解之成有攸往夙吉者原解之始朱先生謂有功指二殆亦不然矣隆山李氏曰蹇止乎險下不若屯動乎險中屯動乎險中又不若解動乎險外也天地解而雷雨作雷雨作而百果草木皆甲折解之時大矣哉象曰雷雨作解君子以赦過宥罪初六无咎象曰剛柔之際義无咎也際交也九二為下卦之主而六陰柔弱自下承之也九二田獲三狐得黄矢貞吉象曰九二貞吉得中道也二於地稱田三狐者三陰九二比初比三應五也九家坎為狐虞翻曰變之互艮為狐二三五歴三爻故田獲三狐也按既濟坎亦取狐象不必言變為艮又其所歴有九四九非陰不得與三並稱狐吳幼清曰下坎為狐三四五又互坎有三陰朱先生謂卦四陰除五君位餘三爻即三狐意亦近之而未盡矣黄矢互離為矢居二為中黄者中之色矢之齊五分其金而錫居二以柔濟剛故象曰得中道也俞氏曰衆皆疑而我釋之故言獲中直則在我而已故言得六三負且乗致寇至貞吝象曰負且乗亦可醜也自我致戎又誰咎也據釋文乗平讀六三將出險然才柔志剛負四乗二坎為輿也寇指四洪氏謂互坎為盜四剛而不中見三乗其同類憤而不能容之四二皆解主而以四為寇者三二同體已服雖僭猶可寛以解之也九四解而拇朋至斯孚象曰解而拇未當位也拇王弼謂三李鼎祚曰九四體震為足三在足下為拇然則王以為手拇非也程朱二先生謂初為拇按初剛柔之際義无咎不應解之朋至蘇氏謂九二王弼謂初按朋同類四與二同功皆陽則蘇説是也二四俱為解主四雖比三然為震主體動有能解去之象故二不致疑至而相孚也解拇何以未當位三以負為羞知其不能承四之位也當承也秀巖李氏以為不當君位若進之五則雖去羣陰亦不然矣六五君子維有解吉有孚于小人象曰君子有解小人退也維者互坎之維持也俞氏謂六五下應九二近比九四二君子相與維持事從解釋小人有生路可趨吉之道也初上皆非正故謂孚皆陰故曰小人今謂君子之解以小人之退為驗孚无驗義君子之解小人信之自退而同解也上六公用射隼于高墉之上獲之无不利象曰公用射隼以解悖也上髙而无位公也上體三四五互坎為弓上六變為剛則四五上成離又有矢可射隼虞翻王弼指三三互離為鳥而處坎上隠伏為盜隼象也陰之在下者象狐其在上則象隼墉坎王公設險之象在坎上故稱髙也三負四乗二二陽皆欲得之不能去也然二陽自配初五則三所疑者惟上六耳上雖與三為應而三失位負乗不見應也上居動之極為解之成不黨而將解其荒悖故能射而獲之隼獲爭解二與四无不利者矣此所謂解也易之戒震動多矣今動靜而无不利者自坎而進于震經厯險阻而後動器成而時至矣脫字據李鼎祚彖象其來復上脱无所往三字正音據卦義讀如解紛之解據釋文且乗之乗平讀損兌下艮上損有孚元吉无咎可貞利有攸往曷之用二簋可用享損而有孚元吉无咎蘇氏曰為上卦言也可貞无咎利有攸往曷之用二簋可用享蘇氏曰為下卦言也損益三陰三陽之卦損之成卦在三上二爻也蘇意以損道上行而舉而之上則无下皆貞而不往則无上可貞利有攸往者貞者有往者故曰曷之用曷之者擇之也用謂用損之道俞氏所謂問辭也二簋者兌之二陽俞氏指六三之偶非也可用者答辭也言可用者其為物薄適時之變非其常也兊本乾而九三獨上故變為陰初與二意向之猶祭之設簋精意以享之我非實與而神非實取也彖曰損損下益上其道上行損而有孚元吉无咎可貞利有攸往曷之用二簋可用享二簋應有時損剛益柔有時損益盈虚與時偕行損下益上蜀才虞翻等皆謂自泰來朱先生不從亦自知卦變之説不足以明經㫖矣其道上行自陽而言也二簋應有時者初九遄往而九二征凶故二簋雖應而往有時也經言二簋用享言乎其損也傳言應有時裁乎其物也故不同也損剛益柔有時三益上之時輔嗣以為剛為德長損之不可為常也與時偕行通損益盈虚之時輔嗣以為自然之質各有定分損益之加非道之常也傳凡三言時葢極論損下益上損剛益柔在損時則可非其時有不必然者矣升陽子曰應有時辨鉛生望逺之意少女之遇少男可以造丹矣察識藥苖者宜知之象曰山下有澤損君子以懲忿窒慾揚雄曰山殺瘦澤增髙俞氏曰忿怒如山之突兀况多忿如少男者乎故君子懲之如摧山意欲如澤之汙下況多欲如少女乎君子窒之如填澤初九已事遄往无咎酌損之象曰已事遄往尚合志也通尚于上者非尚庶幾也合志合二也為大作自營而不茍於損也九二利貞征凶弗損益之象曰九二利貞中以為志也卦以損下為象九二何以往凶也五雖柔而居剛非不足二雖剛而居柔非有餘則二不可復往損之任在三而初二皆非所當損初以剛居剛且欲酌損二以剛居柔説以奉五非益上之道故弗損以益之弗損晁氏客語為讀者是初九之遄往迹與心合故曰尚合志九二獨心向之耳故曰中以為志守其剛中所以益柔中也傳言設簋應有時謂此乎六三三人行則損一人一人行則得其友象曰一人行三則疑也三人即下兌三爻一人六三也損一人即一人行也互震為大塗三人位故曰三人行得其友虞翻上據坤應兊之三兊為友故稱得友是也本義一陽上而一陰下何以言損下哉六四損其疾使遄有喜无咎象曰損其疾亦可喜也疾謂坎為心病四應在初二之病四為之虞翻謂疾二蜀才謂疾初宜去之王輔嗣謂疾初宜納之其指不同程朱緣是以為損其陰柔之疾然皆非也遄即遄往之遄謂初蘇氏曰下之損者有限而上之求者无已此下之所病也我去是病則夫遄者喜我矣自初言之已事遄往則四之求我也寡故酌損之自四言之損其疾則初之從我也易故遄有喜六五或益之十朋之龜弗克違元吉象曰六五元吉自上祐也六五虚中損己本受下之益而上九與之相比故曰或益而象傳上祐者謂上九也十朋虞翻曰坤數十取龜者肖離之卦如頥益之類也或益之舊絶句如益上九十朋之龜弗克違言受益之可必横渠説有據矣兩貝為朋爾雅神靈攝寶文筮山澤水火為名黄潤玉指大龜背中有二十貝曰十朋未詳孰是元吉大吉而已吳幼清曰五居三陰之上為元鑿矣上九弗損益之无咎貞吉利有攸往得臣无家象曰弗損益之大得志也陽實陰虚虚者當益而實當損然上乃受益之地不可有損故下應六三以不損于己者益之凡損己益人者所益有限弗損以益人則益无方矣益不自留故无咎可貞而吉本義云亦必以正則吉豈以不自留者非正哉利有攸往得六三一人之損故曰得臣六三狥義而忘家者也故曰无家三與上交相為賜也獨以惠而不費當之失損之名義矣俞氏曰益九五之君以益下為心故大得志損上九乃臣也亦大得志然則君臣上下皆當以益下為心也正句據晁氏客語弗損絶句據舊讀及程張或益之絶句益震下巽上益利有攸往利涉大川彖曰益損上益下民説无疆自上下下其道大光利有攸往中正有慶利涉大川木道乃行益動而巽日進无疆天施地生其益无方凡益之道與時偕行象曰風雷益君子以見善則遷有過則改風雷益與雷風恒大象奚以異義史繩祖曰震雷位巽風位先震後巽方位之序順而有常故君子體之立不易方益則先巽後震此為變動故體之遷善改過初九利用為大作元吉无咎象曰元吉无咎下不厚事也陽畫曰大王輔嗣曰處益之初居動之始體剛德以蒞其事而之乎巽以斯大作必獲大功也虞翻侯果皆本繋辭以為耒耜之利易道設虚以待有不止於耒耜矣朱義受上之益不可无所報効易道屈伸自然之感非論報施也倒體卦益之下即損上也説者以為上易有為功則利倍罪則責薄故損之上僅能无咎而已正且吉下雖有為功歸于上罪先其責故益之初至于元吉然後无咎其所居非厚事之地事事之重厚者猶詩北門王事敦我之云謂不當任厚事非矣六二或益之十朋之龜弗克違永貞吉王用享于帝吉象曰或益之自外來也或指初以非正應稱或二虚中能受居益下之時不獨受上益也王輔嗣曰帝者生物之主興益之宗出震而齊巽者也六二居震之中而應于巽故享帝之美在此時也朱義居下受上之益故為卜郊之吉占非象㫖矣二地上也祭天者掃地而行事因吉土以享也二臣道而有王稱自帝視之王亦臣也或曰别標王者以異于臣二非王也亦通虞翻謂王為五可謂不達矣卦以益下為義爻又益上者惟其時物交相為賜也六三益之用凶事无咎有孚中行告公用圭象曰益用凶事固有之也三多凶稱凶事説文云凶象地穿交陷其中三互坤而震極未有不陷所以為凶事之象也无咎者干寶以為處震之動懐巽之權者葢言其時位矣有孚謂四以非正應故曰孚中如中行獨復之中震大塗有行象二五之中自貞悔言三四之中自一卦言非其中爻不備也六三之用凶事无咎矣然四者益下之權在焉而又近五為公象虞氏謂三伏陽為公五可為王則三為公楊敬仲指上九皆非也震善鳴有告象用圭者圭於文從二土震震本從坤受益而成為土三在互坤之中又為一土故曰圭土圭求端于天之器王肅作用桓圭虞翻以乾為圭吳幼清以震為圭周尚書以為錫𤣥圭之類劉用熈曰周禮珍圭恤凶荒皆非也三告四用圭下之求益于上也固有之孔子于象傳别明凶事先𤼵後聞固有此理也六四中行告公從利用為依遷國象曰告公從以益志也中行謂三益下之權在四故三告而四從之四成巽之主有順從象楊敬仲因小過五稱公謂公一國之君以九五為公非也俞氏曰三事而後告事凶而去君遠也四告而後遷事大而去君近也利用為依遷國者初陰六陽相易為遷國二三四互坤為國陽君陰民六二六三國之舊民不遷者四遷於初而依六二遷國之君也初遷于四而依六三遷國之民也益志者四本者益下之志故告之即從也俞氏以損益三四易位為遷近五為依亦通九五有孚惠心勿問元吉有孚惠我德象曰有孚惠心勿問之矣惠我德大得志也益權在四故三五皆以為孚四比五順其心以益下五中正為益下之主故有勿問元吉之象有孚惠我德謂四之惠皆五德也傳稱中正有慶者如此上九莫益之或撃之立心勿恒凶象曰莫益之偏辭也或擊之自外来也上處巽之成進退无常當益之極益終當變不能益三非四五之志故撃之者至三四五艮手有擊象曰五非上應故稱或位則不能安其身時則不能易其心應則不能定其交其主心勿恒矣損彖傳曰損剛益柔有時損下之道時暫而已益彖傳曰日進无疆其益无方益下之道則宜恒久故上九立心勿恒有凶象偏辭虞孟作徧晁本從之按易撃傷者至是言无相益者耳人心皆疾周匝之辭也朱義曰從其求益之偏辭徒見王弼本耳胡仲虎曰上下經陰陽各三十畫然後為泰否為損益咸男女之交變而損則不交恒男女之不交變而益則交咸者夫婦之情情之感也極必損恒者夫婦之道道之久也極必益然損三益上為損初二上而為四五者不謂損損四益初謂之益上五下而為三二不謂益益在下卦之下民爻也下之上容可損下之下為民決不可損也故損之釋彖曰損下益上而不言損民益之釋彖曰損上益下民説无疆則其為益民也可知已証句據九四有孚中行自有孚絶句証字據虞孟晁氏偏辭作徧辭夬乾下兊上夬揚于王庭孚號有厲告自邑不利即戎利有攸往彖曰夬決也剛決柔也徤而説決而和揚于王庭柔乗五剛也孚號有厲其危乃光也告自邑不利即戎所尚乃窮也利有攸往剛長乃終也五互體乾為君又居尊位王庭之象乗一陰居五陽之上又與五同體故曰柔乗五剛兌説小人在君側善固結彌縫而君不疑揚於王庭肆於君側也朱義正名其罪者不然孚謂上六居兌之成為口舌號而招三三以重剛故厲而絶之心迹无可疑矣安得非危乃光耶自始也坤為邑五隂皆變而僅存上六邑之削小者自邑而告之先離其黨也范大性曰兵戎乃用衆坤為衆乾變坤至五幾於无衆矣故不利即戎此得其象而失其義者即戎以除君側未有不亂者夬之所尚在決不可施之君側故窮象曰澤上於天夬君子以施禄及下居德則忌決附之時利施而不利居故曰居德則忌言不居其德也歐氏易童子問曰小人盛則決之衰則養之王弼以則作明者非初九壯于前趾往不勝為咎象曰不勝而往咎也吳㓜清曰初為趾四在下卦三陽之前與初同位前趾謂四也丁氏易東曰四陽為壯五陰為決大壯初曰壯趾此因大壯初趾而加前以别之非矣初居卦下而欲急進超升大壯四陽之位近九五以決上六故壯前趾之象也不勝為咎吕仲木曰位卑而无以應言之无與為倡行之无與為隨以其憤心而往不惟決其前趾矣為咎者其咎乃自為之也九二惕號莫夜有戎勿恤象曰有戎勿恤得中道也惕號者上號三二聞而驚惕也二動成離日而二者地上之位日至地上則大明夷明地中為莫夜也戎亦指上兌為除戎器也惕號莫夜慎獨以養未𤼵之中𤼵皆中節又奚以戎為恤哉九三壯于頄有凶君子夬夬獨行遇雨若濡有愠无咎象曰君子夬夬終无咎也頄翟𤣥云乾首之前王弼以為上非也壯頄者過剛非君子之夬遇雨若濡諸爻皆无應而三獨應上遇言其適然而非本心也上六為成兌之主又上于天之澤故為雨三爻止疑於汚故曰若濡然實則決而和也其志之宻人雖有愠奚咎哉九四臀无膚其行次且牽羊悔亡聞言不信象曰其行次且位不當也聞言不信聰不明也九四位居下體股肱之上為臀膚在臀下而柔者四本外剛中柔志非能決乗九三之剛其下不柔又居兌下毁折傷而不良于行也牽羊悔亡説卦兌為羊王弼曰抵狠難移之物謂五也按説文牽引而前也四不以決見傷若羣進相牽以往則可悔亡程先生曰自强而牽挽以從羣行者是也朱義本張子之説曰不與羣陽競進而安出其後推之卦象朱義殆不然也兌為口舌故曰聞言即告自邑之言也四變坎為耳互離為目虞翻曰折入於兑故聰不明言其易溺於所趨也九五莧陸夬夬中行无咎象曰中行无咎中未光也莧虞翻本作莞爾之莞陸蜀才同虞翻作睦謂和睦也明以識焉若荀氏從俗之誤葢兌説有莞睦之象傳義皆云馬齒莧非也子夏傳莧陸皆木根草莖剛下柔上此附荀爽云爾荀氏謂三五同功而決上故言決決五體兌柔居上莧根小也三體乾剛在下陸根深且大也此自言五何以及三又兑雖下剛上柔而譬諸草木則八卦之象于兑无聞矣近世吳幼清以莧從卄為羊角從目為羊目從几為羊足而取兑象俞氏不改於舊按説卦兌羊之㫖考項氏玩辭而附之曰説文莧山羊細角者本草亦以莧似羊陸則羊之所行也言雖各有主本而紆曲不既甚哉九五陽剛得位而決附之權在焉徒以體兌而莞睦以決雖中行而未光明矣葢決而和此臣之事而非君之權以是為未光也易惟其時物而已三應上五叱之俱言夬夬決而又決也宋咸曰計註驗經誤增中字上六无號終有凶象曰无號之凶終不可長也証字莧陸據蜀才虞翻作莞睦字証衍文據宋咸本未光上衍中一字姤巽下乾上姤女壯勿用取女女壯謂巽為長女初比二故四勿取朱先生註曰一陰而遇五陽則女德不貞其説本鄭𤣥一女當五男之意而實不然也卦義本謂所遇而合无所應安在其為當五陽哉一陰方生而以為壯程子所謂漸壯而敵陽者也彖曰姤遇也柔遇剛也勿用取女不可與長也天地相遇品物咸章也剛遇中正天下大行也姤之時義大矣哉依郭京勿用上脱女壯二字天地相遇品物咸章者荀爽及九家易曰乾成於巽位之已而轉舍于離坤出于離與乾相遇葢本相見乎離之意蘇氏曰剛者二中正者五陰之長自九二之亡而後為遯始无臣也自九五之亡而後為剝始无君也姤之世上有君下有臣君子之欲有无為不可也程先生二五皆中與正俞氏謂剛為四皆非象㫖朱義從翟𤣥指九五為剛中正二五皆陽獨指九五為剛中者例之明巽中正皆二五統言之爾象曰天下有風姤后以施命誥四方乾為施巽為申命告四方者所謂夏至之日施令命誥四方所以助微陰虞翻震東姤南巽西復北皆總在初非也初六繋于金柅貞吉有攸往見凶羸豕孚蹢躅象曰繋于金柅柔道牽也柅作鑈絡絲趺也子夏易繋于金鑈晁以道曰蒼頡篇柅作檷柎􅀈也巽為繩之象九家曰絲繋于柅猶女繋於男故以喻初宜繋二若能專心順二則吉有攸往見凶初為二所據應四則有凶也羸宋衷馬君以為大索所以繋豕豚類巽象陰躁虞氏必以應言坎象非也蹢躅依李茂欽作彳亍住足于步止也行有二足一步一住巽為股為進退股而進退則蹢躅也初應於四二為所據不得從應故有為所孚者蹢躅之象即所謂有攸往見凶也初六在下尚㣲不必以剛制二朱先生以柅為止車物非柔道牽矣九二包有魚无咎不利賔象曰包有魚義不及賔也包依李茂欽作勹王氏讀庖非魚陰物巽為魚故初六得稱魚姤者主求民之時近而先者則得之不論其應否嫌若有咎故曰无咎朱先生謂不制而使遇衆害由是廣此可謂治姤之道而非初二相姤之情矣不利賔姤以初為成卦之主四對初之賔也賔主相對為正二以近比而姤初則初不復應四矣九三臀无膚其行次且厲无大咎象曰其行次且行未牽也九三過剛不中而无所遇之象行未牽與柔道牽相反以其永牽於初而不行也九四包无魚起凶象曰无魚之凶遠民也无郭京舉正失字之誤註云二有其魚故失之洪景盧謂巽下乾上故九二有魚九四失魚葢初者巽主爻為魚也初六不中不正彖以勿取戒之四其正應而亦失則後災也材剛位柔民心已去有起而爭之詎得不凶哉九五以杞包瓜含章有隕自天象曰九五含章中正也有隕自天志不舍命也以用也杞者枸杞謂二本小木程朱二先生從虞翻以為髙大堅實者不然瓜干寶曰初二體巽為草木二又為田田中之果柔而蔓者指初瓜象也蘇氏曰瓜得所附而後止故受之杞則能籠而有之蘇氏葢緣張弧之説九五者姤之主知初六之勢將至剝盡而後止故受之以九二也此於初六始姤之情九五治姤之道為有見矣志不舍命俞氏以為傳舍之舍象辭后以施命告四方此言志不舍命九五之志將以遍告四方如風行天不少停置也含即包瓜即章上九姤其角吝无咎象曰姤其角上窮吝也証字蹢躅依李茂欽作彳亍包依李茂欽作勹无魚依郭氏作失魚証音舍命之舍依俞氏作去聲萃坤下兌上萃亨王假有廟利見大人亨利貞用大牲吉利有攸往萃有二亨二先生并緣馬鄭陸績虞翻作衍文今依王肅本存之廟鄭𤣥曰互有艮巽巽木在艮闕之上宫室之象愚謂兑為巫宫室而有巫廟象是矣謂四本震爻長子五本坎爻隠伏居尊為鬼神象長子入闕升堂祭祖禰之禮則亦迂哉大牲李鼎祚曰坤為牛巽木下剋坤土殺牛之象也吳幼清指下坤為牛上兌為羊三四五上肖坎為豕而三牲備亦通彖曰萃聚也順以説剛中而應故聚也王假有廟致孝享也利見大人亨聚以正也用大牲吉利有攸往順天命也觀其所聚而天地萬物之情可見矣孝指祖考享指諸侯於廟覲禮三享皆束帛加璧庭實惟國所有詩率見昭考以孝以享是也明則有禮樂幽則有鬼神乃萃之大者也而朱先生曰廟所以聚祖考之精神按彖傳孝享之義不止此天地萬物之同情即所謂順以説剛中而應之道也蘇氏曰萃未有不享而其未見大人也則亨而不正者爭非其有也五能萃二四能萃初近四而无應則四萃三近五而无應則五萃上從我者納之不從者付之其所欲從此大人也故順以説剛中而應二與五而已象曰澤上于地萃君子以除戎器戒不虞俞氏曰兌西方殺氣屬金故言戎器互巽體故除坤藏而不露故言不虞兌為口故言戒初六有孚不終乃亂乃萃若號一握為笑勿恤往无咎象曰乃亂乃萃其志亂也孚謂二初二自有正應故不終與二陰萃乃其志亂非正也若號乃變成震有聲之象鄭氏蜀才讀握曰屋夫三為屋指三陰笑者詩燕笑語之意言號呼三陰萃而相得悲喜无常也王弼安卑退以自牧於爻之情為不暢矣程傳於肯綮亦所不中恤讀如保恤居萃之初萃雖未成而上有正應勿恤陰類往應四陽因四萃五故往无咎也六二引吉无咎孚乃利用禴象曰引吉无咎中未變也卦雖以四陰萃二陽然獨初二有應故二引初為无咎孔疏言牽引二陰或讀詩替引之引皆非也孚謂初初有二之引乃敢用二之禴以萃四恐間於六三也二變成離為夏禴夏祭名禴與牲異象言其順爻言其孚吳幼清曰上為北五者日行天中近北夏時也故凡夏禴之象皆以五言之殆近巧鑿乎六三萃如嗟如无攸利往无咎小吝象曰往无咎上巽也萃如者六三之本志嗟如上六不應故无攸利然三四五互體巽順不至相忤故往亦无咎但有小吝而吝者小疵朱義謂求萃近而不得至四顧云下比衆陰語自相乖不得於辭矣俞氏曰孔子於此文明以互體示人王弼輩不取互體殆未深究耳九四大吉无咎象曰大吉无咎位不當也九四近臣居多懼之地非其位而有聚物之權咎之所歸也以其體兌説部率三陰順而萃五故有大吉无咎之象朱義謂九四上比九五下比三陰故得所萃不然也九五萃有位无咎匪孚元永貞悔亡象曰萃有位志未光也卦以二陽萃陰五萃之有位者也有位而得民之萃豈有咎哉吕仲木謂萃位非萃德者不然陽剛中正不謂德乎九四比羣陰在下以分其萃而五不得專故有匪孚者此必然之象朱義謂若有未信以疑辭明實象殆不然矣五志則何以未光以四之分其萃而有匪孚者也俞氏曰此唯九五一陽天下皆知比於五故元永貞言於彖萃有二陽天下莫知所萃故元永貞言於五漢上朱氏曰一本无志字上六齎咨涕洟无咎象曰齎咨涕洟未安上也齎將也咨依虞翻陸希聲作資上變乾為玉為金資象也上以陰柔居外而下无正應齎咨涕洟而急萃於五故象以未安上明之正字一握依鄭氏蜀才作一屋衍字志未光依陸氏舊本及朱漢上志字衍文升巽下坤上升元亨用見大人勿恤南征吉升之見大人不言利而言用何也俞氏曰利見者宜見之用見者將變動而有為則見之陸德明曰本或作利見非也項氏玩辭萃與升皆剛中而應萃剛中在上其衆必聚升剛中在下其勢必升故萃以五為大人升以二為大人南征吉巽東南之卦也又升則益南故謂之南征王輔嗣曰以柔之南麗乎大明則南征遂為假象吳幼清以卦自臨變初三相易而三為南以三為南不應古法胡仲虎述後天方位曰巽坤之中有離離南象自巽而坤其行自南謂巽坤中有離亦強生見耳程朱二先生皆謂前進則於象義益不復究虞翻曰二之五成離故南征吉象外蔓延矣其不言坤升者卦主巽且言其自下而升耳坤在上則无所升而説卦但曰坤者地也本不可以方言俞氏并指坤為南方之卦殆亦不然矣夫彖曰柔以時升巽而順剛中而應是以大亨用見大人勿恤有慶也南征吉志行也柔謂巽陸績曰柔本不能升故曰時按巽之升非以其附陽以其遇坤也其升有時故謂之時升耳虞氏以四時明之其言二升五以為坎離當夏冬已紆曲矣其震兌春秋之象亦隠伏難見象曰地中生木升君子以順德積小以髙大順言乎其坤也積言乎其巽也虞翻陸德明王肅等作慎不然初六允升大吉象曰允升大吉上合志也允説文作􅀈進也諧聲字去義存聲從省作允所以為升者在巽所以為巽者在初故言進升進齋徐氏曰晉下三柔與五同志故六三言衆允而釋之以志上行升下一柔與四合志故初六言允升而釋之以上合志朱義誤因九家初與二陽合志俱升五位之語非也上謂六四進齋徐氏之語殆非也九二孚乃利用禴无咎象曰九二之孚有喜也剛德居中而獲上之象用禴與萃二同六二求萃於上九二亦求升於上也萃先无咎而後孚升先孚而後无咎所應剛柔之異也吕仲木曰主升之君而才弱當升之臣而質剛天下之所疑也孚而用禴質諸鬼神且不疑而况于人乎喜而后可知也九三升虚邑象曰升虚邑无所疑也晁以道曰四邑為丘四丘為虚非空虚也馬云丘虚得之葢易之言也邑者多坤而坤未嘗虚言邑自三升四故得言虚矣朱先生曰陽實陰虚六四王用亨於岐山吉无咎象曰王用亨於岐山順事也爾雅二達謂之岐旁釋名物兩為岐二達物兩者象卦之折也坤而言山以下之升而得名也下謂之升則上必髙髙者山象也亨陸氏曰通也王何以通於兩岐之山王者五也巽之所以能升以其剛中而應也五欲應二通四兩岐之山以待之使其險阻易升也象曰順事言四順六五應二之事崔憬之言曰太王為狄所迫徙居岐山一年成邑二年成都三年五倍其初通而王矣故曰王用亨于岐山又或指王曰文王稍異其辭然皆為岐周今以易辭例之則如文王箕子皆指其人直稱王而不知其為何王者不可指也直稱王如書多方多士皆時王而謂曰太王曰文王不既誣乎且諸家註隨之西山既曰周岐也釋升之岐山又曰岐周也一岐周耳既已曰西又復更曰岐何其眩人之聽聞如此哉辭也者各指其所之西山因兌而言也岐山者因坤而言也荀爽知岐周之説不恊卦象乃曰巽升坤上據三成艮巽為岐艮為山夫知岐之非岐周而不知巽之為岐既不得其象而艮之為山復待三之升而後得之則亦何紆曲哉六五貞吉升階象曰貞吉升階大得志也五貞於二而應之巽因以升故六五有階之道階升之可據者荀爽曰陰正居中為陽作階今朱義謂五升而居尊位恐于彖傳不恊矣上六冥升利于不息之貞象曰冥升在上消不富也豫上六冥豫導之渝升上六㝠升導之貞豫上體震動因其動心而欲變其豫升上體坤順順其進心而欲移于貞序卦云升而不已必困故上六消而不富也証字允升之允依説文作􅀈証音亨西山之亨依陸氏許庚反困坎下兌上困亨貞大人吉无咎有言不信有言不信兌為口也困之成卦在二上兩爻象曰困剛揜也險以説困而不失其所亨其惟君子乎貞大人吉以剛中也有言不信尚口乃窮也龍仁夫讀困而不失其所絶句亨自為句屯蹇皆以坎為險而皆在外困坎在内欲動如屯止如蹇不可得矣唯説而順受則不失其所而亨據後漢書即顗傳亨以一字絶君子通指諸陽剛中不言正明大人為二也象曰澤无水困君子以致命遂志初九臀困于株木入于幽谷三嵗不覿象曰入于幽谷幽不明也險暗處困下之象臀干寶曰兌為孔穴坎為隠伏隠伏在下而漏孔穴臀之象也臀奚為困於株木四互巽為木木中曰株四互巽之中也四欲拯初而初入幽谷坎為陷為溝瀆為隠伏有入幽谷之象也三嵗不覿與九四來徐徐相𤼵厯二位之謂有配在四而不善二四亦困於金車是以三嵗不見九家易曰三者陽數非也幽不明謂坎入則四失互離九二困于酒食朱紱方來利用亨祀征凶无咎象曰困于酒食中有慶也剛中處險應援相得之象坎為酒兌為食二處坎中而應兌之中他无所困而以酒食飫者也鄭𤣥四二據初辰在未上值天厨酒食非矣坎色赤變赤言朱者諸侯黄朱五以命服求二之義紱者三四五互巽為股而三當股位而三四互離為牛二以離牛之革蔽於巽股之下也鄭𤣥曰二與四互體離為鎮霍爻四為諸侯有明德受命當王者離為火火色赤四爻辰在午時離氣赤又朱者非利用亨祀既濟坎有祭象祭義曰鄉之然後能亨之五亨二故利用亨祀也李鼎祚本荀爽説曰二本陰位升上為宗廟非也程先生分為享人鬼楊敬仲曰祀尊上為享意近之二五皆剛者也方其見掩二獨以柔用之懐以酒食説于未困則所以説之者少矣朱先生謂困于得所欲之多殆不然也既征凶而又无咎何也俞氏以為君召不可不往六三困于石據于蒺藜入于其宫不見其妻凶象曰據于蒺藜乗剛也入于其宫不見其妻不祥也陰柔不中正承乗皆剛而无應與之象兌為剛鹵亦有石象謂四也荀九家易坎為蒺藜謂二也三内體固言宫上兌女三坎男之妻三失位而才柔雖有離目然妻在離之外二柔不相應則隔絶而不見朱先生以妻為六恐不然也九四來徐徐困于金車吝有終象曰來徐徐志在下也雖不當位有與也九五劓刖困于赤紱乃徐有説利用祭祀象曰劓刖志未得也乃徐有説以中直也利用祭祀受福也劓刖荀王肅陸績作臲祪鄭𤣥當作倪㐳臲祪古文也以上六繇辭考之當是晁氏推象數亦然九五方為剛掩而居互巽之上巽為髙而又進退則不安矣簡輔謂上柔而无位如人之劓四剛失位而應初如人之刖則五居尊位左右皆刑餘之人非象㫖與象傳異矣赤紱者二之臣紱坎為赤詩赤芾三百是已五困而无助思以赤紱爵二故曰困于赤紱李鼎祚以二互體為文明赤紱之象程先生謂赤紱无所用而反為困皆不然也困而求二乃徐有説者九二雖揜于三然五以剛中而説體二以同德相應人莫能間徐徐而來也二中而不正故象以直言之明正之異于直也兌于萃有假廟之象祭與享不同楊敬仲上祭下近之祭者人享者神有求无求之别也言五之有求于二也陸績陸德明本亦作享祀者非陸績徒曰二言朱五言赤二言享五言祭傳互言之太鹵莽矣程先生分祭天神義亦无當也上六困于葛藟于臲祪曰動悔有悔貞吉象曰困于葛藟未當也動悔有悔吉行也虞翻曰巽為草莽稱葛藟謂三也按巽為木无為葛藟者豈以巽為風木柔易隨風為葛藟之象邪五居互巽之上既髙而不安上在而上則愈微故蒙上文而不復出困字止稱臲祪也三柔而牽已五剛而難乗曰者兌為口舌故自訟也蘇氏曰上六困三五而不能去謀全之過也曰不可動動且有悔而不知其不動乃所以有悔也上无揜我者則吉莫如征也予觀處困之道惟陽者能亨陰柔觀其所附而已初三附于坎陷故皆入困上附于説則可動矣陽剛則无所動心而俟黨與之至故二四皆言來而九五言徐説也方徐之云當困時不可求亟通也証字據荀王陸作臲祪証句據龍困而不失所絶句周易象㫖决録卷三
