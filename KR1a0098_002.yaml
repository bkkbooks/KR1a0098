body:
  text: 周易象㫖决録卷二明熊過撰上經同人離下乾上坎離皆乾坤之用易至同人十二卦坎體凡六見矣離自需訟小畜履四卦互體見之至同人十三卦而正離見十四卦而六離之用始與坎等然離之用隱者過半矣聖人處憂患而用明如此夫同人于野亨利涉大川利君子貞彖曰同人柔得位得中而應乎乾曰同人同人曰同人于野亨利涉大川乾行也文明以健中正而應君子正也唯君子為能通天下之志同人柔得位得中而應乎乾曰同人指二之同乎九五也五外卦野之象也同人于野亨利涉大川指五陽之同乎六二也以隂居隂太隂水象六二坤爻九五者乾爻故曰乾行耳虞翻乃謂乾四上失位變而體坎故曰利涉大川乾行獨取四上失位者若得位者不變失位者變易中無其例矣侯果謂九二升上為郊野是同人於野而得通者由乾爻上行故特曰乾行不即本卦六二為言而以虛位九二立義同人安從得九二之升哉程先生以天德釋之得其理而不及卦爻之㫖王輔嗣曰非二所能是乾之所行蓋近矣柔之應乾不曰君而人者無乎君之辭也虞翻旁通師卦震夫巽婦所謂二人同心者而言人豈其㫖哉同人大有皆五陽而一隂主之大有之隂在五故曰元吉同人之隂在二而羣陽宗之則曰亨曰利君子貞君臣之間功名之際其難乎象曰天與火同人君子以類族辨物黃潤玉曰天上運火上炎類也故曰與初九同人于門無咎象曰出門同人又誰咎也初前遇六偶為門象變則成艮亦為門闕六二同人于宗吝象曰同人于宗吝道也二宗者胡仲虎曰二往同五復成離五來同二復成乾乾離各反其本之謂宗又禮繼别宗繼小宗皆言尊也詩云君之宗之陽為隂之宗也吝猶言嗇主一不他之意六二成卦之主又居隂專之位故應乾者如此荀爽以宗為衆曰隂道從一而衆陽皆欲與二為同故吝不知二中正同人之義侯果殆程朱二說所主本其謂所同雖吝亦臣妻之道者近之若如程朱謂宗黨故吝則五同二亦宗黨者象繫之曰同人之先以中直何也於是復以宗為初斯為不達象義哉九三伏戎于莽升其高陵三嵗不興象曰伏戎于莽敵剛也三嵗不興安行也三互巽為伏互離兵戈伏戎之象巽又為草木二成巽之主也巽為股為高象升高三動互艮山象高陵蓋龍斷而左右望也三與二相比欲同人焉不慮二不從而忌五得二隱兵于二將上襲五故升高而伺遂與為敵然五剛中正而卒不可與爭爻在三乾為嵗故三嵗不興安可行也九四乘其墉弗克攻吉象曰乘其墉義弗克也其吉則困而反則也二離中虛外周象墉九三為六二之墉九四亦欲得二乘二之墉將攻而取之其材陽也弗克攻者其位隂也卦惟三四不言同人二與五相同而三四有爭奪之象非同者也九五同人先號咷而後笑大師克相遇象曰同人之先以中直也大師相遇言相克也五先號咷者互巽其究為躁也二得位得中而應五三四失義而近據之未獲同心故先號咷後笑者五動互為說大師克相遇者二坤爻為師二本成離之主以師克三四而與五相遇也本相應而言遇者不期而㑹也克敵而忽遇喜之辭亦見同人之難也畫卦者先下同人之先指二也中謂居下卦之中直坤爻之德也吳幼清以號咷為六二離火之聲大師者同人六畫俱變成師師以坤為衆坤衆自乾陽變為大師此占五耳而旁及他爻吳氏非也上九同人于郊無悔象曰同人于郊志未得也郊者俞氏指邑外為郊在野內二體言五去二逺為野外體言上去五近為郊同人之世物情未能無爭五雖同體而自處其上其為同人功過俱亡故無悔而已其何以通天下之志哉志未得與通天下之志正反字音句無誤大有乾下離上大有元亨彖曰大有柔得尊位大中而上下應之曰大有其德剛健而文明應乎天而時行是以元亨何以謂之大中五大而二小以别之也諸爻得位失位並無凶咎以其皆應五也五雖得應而才終柔不足為主必有待乎陽剛而後亨同人履應其德故曰乾大有應其時故曰天大有之君有其位有其德又有其時矣同人曰文明以健自明而誠者乎大有曰剛健而文明自誠而明者乎象曰火在天上大有君子以遏惡揚善順天休命初九無交害匪咎艱則無咎象曰大有初九無交害也何以謂之無交蘇氏曰二應於五三通於天子四與上近焉獨立無交者初而已何以謂之害正應之四為離惡人則有害矣俞氏兼應承兩剛非也初居孤逺無交者勢耳非其咎也艱謂不敢輕進求交楊敬仲曰害害道也乾初貴潜需初貴不犯難履初貴獨行在大有獨貴交也亦通然上有離明之主不可茍進故艱則無咎艱者不茍以為幸也九二大車以載有攸往無咎象曰大車以載積中不敗也坤大輿指軫方能載者言二體乾稱大車以全體言也二虛足以受九剛足以行與大畜之二同蘇氏指為五蓋失之矣體剛履二一中也有應於五則積中矣虞翻曰所積皆中而不敗是也九三公用亨于天子小人弗克象曰公用亨于天子小人害也三居下卦之上有公象剛而居正不以有自私有亨象天子謂五四離惡人當三之前三之應五四或間之未能遽達之象也九四匪其彭無咎象曰匪其彭無咎明辨晳也彭盛也詩載驅出車皆取人馬强盛為彭今曰匪彭諸陽皆為六五所有非九四之盛也故象以明辨晳表之四在三陽之上勢逼六五别謙多懼有由然矣六五厥孚交如威如吉象曰厥孚交如信以發志也威如之吉易而無備也六五下應九二之剛而得其助故威如其體文明其德中順威如者如威而已侯果曰為卦之主有威不用惟行簡易無所防備物感其德翻更畏威是也然則有大者可易而無備乎曰非信以發志者則必廢交相為用耳道德之威不怒而威於鈇鉞者也上九自天祐之吉無不利象曰大有上言自天祐也履信思順而上賢五之事也上者天之位也自天祐之祐五也所謂柔得尊位而上下應之者陽多隂少少者為主故雖上稱應句字音無誤謙艮下坤上謙亨君子有終虞翻曰君子為三艮終萬物有久於其道之象終下說苑有吉字韓嬰詩外傳曰能以此終吉者君子之道今謂亨通而有終則卦係君子若為羡文矣彖曰謙亨天道下濟而光明地道卑而上行大道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙謙尊而光卑而不可踰君子之終也天道指九三下濟者居坤之下交際之間也艮有光明之象上行謂坤謙尊而光言其下濟乎卑不可踰言其上行乎象曰地中有山謙君子以裒多益寡稱物平施初六謙謙君子用涉大川吉象曰謙謙君子卑以自牧也謙之下稱謙謙大川者荀爽曰九三互坎也稱自牧養以待用之謂之艮止之象也蘇氏曰謙之過無所用之用於涉川而已番陽齊節初曰九三勞而謙二四上為九三而謙初無所為故曰自牧六二鳴謙貞吉象曰鳴謙貞吉中心得也姚信曰承震為善鳴蘇氏謂隂陽唱和寄之於鳴與三相從者得之以六居二故為貞朱先生曰謙極有聞是謙鳴而非鳴謙矣得者德也謙者心德也謙之鳴嫌于外飾故表之曰中心得積中發外豈但聲音笑貌哉九三勞謙君子有終吉象曰勞謙君子萬民服也蘇氏曰艮之制在三而三親以艮下坤故曰勞謙荀爽曰體坎為勞亦未盡也九三居艮之終故以彖辭君子有終屬之陽為民服者羣隂歸之六四無不利撝謙象曰無不利撝謙不違則也說文云撝裂也從手為聲手容恭也六四乃上下之際才位皆隂故不敢當陽之承撝裂退讓去位以避之禮言恭矣非謂更當發揮其謙也則也者天則以柔居柔之則也六五不富以其鄰利用侵伐無不利象曰利用侵伐征不服也五隂爻之虛為不富謂不自滿也以者用也三非正應故稱鄰六二近昵九三而不服五三五同功故五用三為帥互震長子帥師從民望而伐之柔順得中用於謙者如此侵依郭京舉正作征越已之分乃為侵君上所行祇合征正之也上六鳴謙利用行師征邑國象曰鳴謙志未得也可用行師征邑國也三謙之主上與為應鳴謙之象師謂坤為衆應震為大塗征象上四同體五坤為王都四近五上公采地蓋私邑附庸也四據上之應上以極謙得陽剛之助故利征之九家易以上呼三來居五為利行師虞翻以利五之正已得從征非卦義矣上鳴謙異于二何也二外比震由衷而鳴其謙於外上下應震自上而鳴其謙于下由衷者情自上者地望所據有非其心者矣脫誤依說苑韓詩外傳彖辭終下脫吉字豫坤下震上豫利建侯行師彖曰豫剛應而志行順以動豫豫順以動故天地如之而况建侯行師乎天地以順動故日月不過而四時不忒聖人以順動則刑罰清而民服豫之時義大矣哉九家易曰震為建侯坤為行師蓋震長子主器又雷震驚百里一同古分壤之則說卦傳坤為衆四互坎險以一陽統衆隂即師象也國語稱居樂出威德之吳幼清指坤為震侯國震為坤衆帥也四主衆隂成卦之主不曰上下應而曰剛應何也豫有君弱臣强之嫌且非五應亦不得行其志也聖人明微據實為之辭曰剛柔云耳五柔四剛也項氏玩辭曰豫隨姤旅若淺事而有深意曰時義大矣哉欲人之思之也坎之險難暌之乖異蹇之跋涉皆非美事有時或用之故曰時用大矣哉欲人之别之也頥大過解革皆大事大變故曰時大矣哉欲人之謹之也象曰雷出地奮豫先王以作樂崇德殷薦之上帝以配祖考崇德深居馮氏謂褒崇其德易繫帝出于震震在上上帝之象互艮為門闕互坎為隱伏有宗廟祖考之象節初齊氏曰仲春雷乃發聲春禘有樂秋嘗雷乃收聲是以無樂按詩蒸嘗衎烈祖則固有樂齊氏言乃自搆不本經義矣郭兼山謂大司樂奏圜鍾于圜丘圜鍾亦二月律周郊正以后稷配然郊特牲云周始郊日以至則雷在地中矣豈始用冬至而周公用仲春乎抑舉先王為辭周以前實用仲春也夫齊氏不考於迎長祈穀之辨矣初六鳴豫凶象曰初六鳴豫志窮凶也初隂柔居豫初而不中正靜而不動順而不健志安夫豫又有四震由豫權臣之應而為善鳴蓋不勝其有矣其凶以盈滿也卦初非窮地故以志表之六二介于石不終日貞吉象曰不終日貞吉以中正也四互艮為石則二為艮始介說文云分疆也凡物兩間為介介所以分也初應于四者二與之介下交不瀆也二變為剛則互離三雖離中而在下卦之上日終之象四為權臣而三比之二以重隂性靜不待至三能早疏由豫之爻上交不諂也六三旴豫悔遲有悔象曰旴豫有悔位不當也旴依姚信作旰日始出承二終日之辭言早也六三順動之交近震旭日始旦比于由豫之爻蓋早豫之象也以其居順極而又互艮之中故知所悔然以隂居陽不能帥志窒欲至于遲豫又有所悔也蓋不可與立矣九四由豫大有得勿疑朋盍簪象曰由豫大有得志大行也四互坎有疑象九才剛故勿疑朋依一行作用卦惟一陽五隂非其朋也坤為盍聚㑹也簪如士喪禮以爵辨服簪裳於衣之簪連也朝景迂曰古冠禮未有簪名冠簪之訓至侯果始有之耳程先生釋簪為聚朱先生兼取疾義皆非也按簪京氏作撍蜀才同埤蒼云疾也是疾本訓撍而非簪也然則釋為連者簪之正義也四之所得有豫者有貞者不必能同而皆所疑也大有得者一剛之得五柔用盍簪者五柔之合一剛也志大行者剛應而又無他爻以分其權也以其樂與人同存心于天下者之所為也六五貞疾恆不死象曰六五貞疾乘剛也恆不死中未亡也當豫而乘由豫之剛故貞疾與他卦乘剛者亦異矣俞氏曰所以恆不死者柔得中而無大過雖為陽剛所逼猶存虛位蓋未亡也上六冥豫成有渝無咎象曰冥豫在上何可長也上以隂柔居豫極迷而忘返五柔同豫如結成之象然本動體又變剛成離破冥則其成渝矣正字據僧一行朋作用據姚信旴豫之旴作旴隨震下兊上隨元亨利貞無咎彖曰隨剛來而下柔動而說隨大亨貞無咎而天下隨時隨時之義大矣哉剛柔震剛而兊柔也陽上隂下者體也今震陽在下若自上而來故稱來內辭也虞翻蜀才吳幼清皆以為自否來朱義主困噬嗑未濟三卦俞琰主蠱皆非也左傳穆姜以元亨利貞為隨四德與傳異象曰澤中有雷隨君子以嚮晦入宴息九家易曰兊澤震雷八月之時雷藏于澤者得之震東方卦日出之地曰𤾉谷兊西方卦日入之地曰昧谷今自震東趨兊西嚮晦之象卦互巽入艮止入而止息之象也侯果曰坤為晦乾之上九來入坤初嚮晦坤初升兊為休息入宴非也初九官有渝貞吉出門交有功象曰官有渝從正吉也出門交有功不失也主守為官蜀才謂館非也震為長子主器官之象九家易是矣夫法之畫一莫嚴於官而初為震主有渝之象初以剛居剛二以柔居柔皆正也故初隨二不為詭隨者兩正相依貞吉之象也朱先生曰既隨則有所偏主而變其常初九於何得偏義哉出門交有功震為大塗二隂象門鄭康成曰震為日門通釋因言震卯有出門象非也交謂二也二與四同功而二多譽故稱功初交有功而三失丈夫者卦六爻皆取隨義初隨二二隨三三隨四四隨五五隨上也六二係小子失丈夫象曰係小子弗兼與也小子指三互艮少男之象程朱二先生謂初陽非也震長男何謂小子乎二之係小子六三也其丈夫初也三之失小子六二也其丈夫四也是隨之義也六三係丈夫失小子隨有求得利居貞象曰係丈夫志舍下也舍據漢上朱氏音捨王弼作去聲不然下謂小子二也傳義指初俞氏又居貞而止于九四之下皆非矣九四隨有獲貞凶有孚在道以明何咎象曰隨有獲其義凶也有孚在道明功也隨四者自三言之也三隨而有獲四疑於昵矣四多凶近也而况有植黨作福之形哉故貞凶三非正應故曰孚自四言之也震為大塗曰道互艮光輝曰明言四所孚之三在震道之上以明相接猶言不敢自他途以進也功也自為句五多功故稱功言四之志率所隨以赴五非植黨也動說之初以陽居隂故其象如此九五孚于嘉吉象曰孚于嘉吉位正中也嘉猶詩嘉客之嘉上貴而無位稱嘉五處尊而位中正故能不遺外臣如此若上六過此則道窮矣五以剛居剛為正在兊體之中為中上六拘係之乃從維之王用亨于西山象曰拘係之上窮也居隨之中而無所隨從象謂上窮是也上也者上六也以其為五所孚而五互巽繩故有繫維之象詩白駒縶維嘉客是也王謂五亨陸德明云通也西者兊方居卦上故象山也處西山而無所從循思成矣王通西山以求之隨之至也程先生言周王業亨通于西山之時朱先生直曰自周而言岐山在西以亨為祭享矣長寧周氏以書多方多士稱太王文武例定為時王其亦知二先生之誤吕仲木止疑朱說而從程先生王業之言此近於五十步之論矣證音據何氏告蒙約舍音捨王弼作去讀非證句以爻辭功也二字為句蠱巽下艮上蠱元亨利涉大川先甲三日後甲三日彖曰蠱剛上而柔下巽而止蠱蠱元亨而天下治也利涉大川往有事也先甲三日後甲三日終則有始天行也蠱者前人之壞緒四前後之交互兊為澤有大川之象虞翻謂二動之坎九家復謂自泰來乾天有河坤地有水不可也三互震東為甲也三日指互震三畫言巽固進退不决茍非艮止于上則亦未蠱若巽而動則為恆矣先甲三日為巽初致蠱之由後甲三日則震上飭蠱之極故恆曰終則有始蠱亦曰終則有始馬季長曰艮在東之北巽在東之南而蠱上艮下巽故稱先甲後甲其意先天甲在東之離由甲逆數離震坤三位而得艮先甲三日也由甲順數離兊乾三位得巽後甲三日耳此其言偶中矣然聖人之取甲于蠱豈徒摽其位乎他若虞翻以賁無妄卦變定之既迂曲不通而子夏傳以癸丁為言鄭𤣥以先為造作新令之日先三日用辛取自新後三日用丁取丁寧朱義從之皆太新巧蘇氏以先三甲申盡于已而陽盈將亂後三甲寅盡于亥而後變為終始天行于卦象天道之運雖通而失三日之義矣徐直方曰先三後三為六爻已終而七則更端七日得七日來復皆其義所謂終則有始天行也象曰山下有風蠱君子以振民育德山下有風則何以蠱邵子曰蠱者風之族也蟲以風化故字從蟲今夫山下有風則木多滯淫而蟲生焉蠱之象也朱先生曰振民有風象育德有山象初六幹父之蠱有子考無咎厲終吉象曰幹父之蠱意承考也九二幹母之蠱不可貞象曰幹母之蠱得中道也九三幹父之蠱小有悔無大咎象曰幹父之蠱終無咎也六四裕父之蠱往見吝象曰裕父之蠱往未得也六五幹父之蠱用譽象曰幹父用譽承以德也上九不事王侯高尚其事象曰不事王侯志可則也諸爻取父母之象李吳湛子嘗有說矣有未暢者别衍足其意曰上乾陽居隂父之已殁者五坤中居陽母老而存者蠱父殁母存女長子幼之卦也爻兼取互義初巽女暫攝亡父所遺一家之事也幹蠱者必陽剛初才隂位陽嫌於司晨初之無咎幸藉其子之權也九二兊女專任寡母一身之事也母主乎內之中婦人無外事故獨二言母蠱也象言得中道中猶內也九三震男有材智而體巽權故其幹蠱雖有小悔而無大咎六四艮男年幼稚而當艮止故往見吝往未得言無如蠱何六五用譽者何也崔子鍾曰六五幹蠱惟在用譽二多譽也非謂可致聞譽子鍾言是也艮男依母才弱而志剛故用陽德以輔之承以德二乾爻故稱德也不事王侯艮為止也巽言志艮言意皆於主爻言之剛柔之别也虞翻以為自泰而變泰初之上以初與三皆乾乾為父二亦陽而獨稱母者謂應在六五也猶為可解然至上卦則于泰為坤而六四六五皆反稱父蠱則既已不通李鼎祚爻位之說亦直可施諸下卦而已近江夏劉績以謂九二幹母為繼初六之後九三幹父繼九二之後內卦以家言也外卦以國言也六四外卦繼九三後位近君乃世臣子承父事之象蓋蠱為前人已壞之緒而卦畫以下為前也至五繼六四亦謂之父者則曰人君别子故另取位義又復支蔓矣豈所謂植遺腹朝委裘之時乎證音據俞氏先後皆去聲臨兊下坤上臨元亨利貞至于八月有凶臨八月何子元曰先儒自寅至酉為觀其說是也今按李鼎祚自建丑至申為否虞翻鄭元自子至未為遁者非陽生言七日隂生言八月者陸希聲言兊在西方月生于西兊象得八故曰八月戒在逺震在東方日生于東震象得七故曰七日喜于近七八主靜故于彖象言之王介甫詩說云陽生言日隂生言月沙隨程氏曰陽極于九而少隂生于八隂之義配月隂極于六而少陽復于七陽之義配日蓋衍其說也彖曰臨剛浸而長說而順剛中而應大亨以正天之道也至于八月有凶消不久也大亨以正亨通也天指二之剛中也楊敬仲曰惟民生厚因物有遷與物通者往往失正而况大亨乎大亨而不失其正者非人之所能為也大亨人亨也正人正也而曰天道明其不加人為也人心至動至變無思無為是謂天性之妙天之道也象曰澤上有地臨君子以教思無窮容保民無疆朱先生曰教之無窮者兊也容之無疆者坤也初九咸臨貞吉象曰咸臨貞吉志行正也九二咸臨吉無不利象曰咸臨吉無不利未順命也爾雅丘左高為咸右高為臨澤上有地是謂丘也卦惟二陽如復震故有咸臨之象湛先生謂臨之名義乃上臨下今遍臨者則下臨上不知彖傳剛浸而長臨所繇取象不必謂上臨下也吕仲木又引程先生諴感之說謂卦惟一陽乃可言臨按程先生說出王弼弼棄象者不足與論咸臨之義也或曰咸之九四九五降而下接於民則為臨之初九九二故曰咸臨張文饒又謂臨初二有咸象以咸之用在兊之說皆非也未順命者六五在二隂之間故雖知臨其命未必皆當二體兊說嫌於舍我所學以從上然本剛中而應故有都俞吁咈焉孔頴達曰斟酌事宜有從有否者是也朱先生未詳胡安定朝景迂馮厚齊曰未羡文不達爻義荀爽云陽當居五隂當順從今尚在二司馬君實因謂二在下體小人未盡受命亦非也六三甘臨無攸利既憂之無咎象曰甘臨位不當也既憂之咎不長也三不中不正又兊口柔說互坤土味甘故為甘臨之象與甘節之甘異矣動則成乾三惕若憂象也故無咎同或曰與泰艱貞無咎同以三變成泰項氏曰六三以甘媚臨而無攸利見二陽之難說既憂之無咎見二陽之易事也六四至臨無咎象曰至臨無咎位當也至臨者坤兊之交地澤相依臨之至也以六居四正也去其正而止曰位當何也彖傳歸大亨以正于剛中故不豫隂以正也六五知臨大君之宜吉象曰大君之宜行中之謂也知如字六氏作去讀非乾知坤能知指九二乾爻臨謂二咸臨於已大謂陽乾君坤藏大君亦指二宜謂剛中乾九二所謂君德者是也臨之權在二二以剛中君德未順命以應五五有君位柔順居中委而聽之各行其中吉之道也劉績引緯書陽氣在內中和之德應乎盛位浸大之化行于萬民庶幾近之或曰臨四五自咸初二升而上達於君若堯之鰥寡無虐者上六敦臨吉無咎象曰敦臨之吉志在內也爾雅云如覆敦者敦丘注江東呼地髙堆為敦上居艮坤二土之終是髙地之象柔順於上內臨二陽以待其進故曰志在內內謂內卦也柔敦有七義恕泜大勉誰何迫聚即無以為厚者句字音無誤觀坤下巽上觀盥而不薦有孚顒若觀依陸去讀鄭康成曰諸侯貢士于天子大夫貢士于其君以禮賓之唯主人盥而獻賓賓盥而酢主人設薦則弟子也今觀六爻俱無祭義而有觀國賓王之文漢五行志地上之木為觀其於王事亦可觀是也自馬季長以盥為灌地降神王弼因謂祭莫盛乎盥誤盥為灌矣程先生云不可使誠少散如既薦後長寧周氏以薦有藉解而不知薦無亂意謂恭己南面豫殷薦上帝豈可訓亂耶王肅本作盥而觀薦吳幼清曰敬之感人甚速觀祭者但觀其初盥不待既薦之後也二家文雖通失本㫖矣有孚顒若有孚者下之孚也彖傳所謂下觀而化也顒說文云大頭也詩云其大有顒凡卦以初為下終為上上二陽頭之象所謂大觀也朱先生止謂尊敬殆有遺論文中子贊易至觀曰可以盡神然乎哉彖曰大觀在上順而巽中正以觀天下觀盥而不薦有孚顒若下觀而化也大觀之觀依王肅以觀之觀依徐氏作平讀化者觀賓興而人知厲矣觀天之神道而四時不忒聖人以神道設教而天下服矣陸曰一本作以神道設教朝曰當無以字象曰風行地上觀先王以省方觀民設教初六童觀小人無咎君子吝象曰初六童觀小人道也初以隂居下去五最逺之象吳幼清曰觀艮之互體少男為童小人無咎君子吝項氏曰百姓日用而不知君子不著不察則可羞矣六二窺觀利女貞象曰窺觀女貞亦可醜也三四五互艮為門闕二以隂柔之小人在內雖與五為應而隔於三四猶女子在門內而窺觀門外也吳幼清曰初居陽象男童二居隂象女子六三觀我生進退象曰觀我生進退未失道也我者三自謂天地之大德曰生而人得以為生者觀八月之卦刑中有德故以生言六三居下卦之上而近於巽雜卦傳曰巽為進退故六三自觀其生以審所學猶吾斯未信之意傳義俱謂行事非也朱語類為六三觀九五為進退亦非也俞氏主荀爽以我為五謂三觀五之生意而進退為有忌憚夫易有于本爻而稱他爻為我者乎吳幼清指主爻為我其說曰蒙主爻在二其稱童蒙求我謂二也不知彖統一卦指主爻為我爻各即其所居有必不可相假者中孚吾我而亦以主爻之四附㑹之容得不謂之紆曲乎此九三觀我而又指為四非尤紆曲乎他卦三不中多不善二中多善觀獨以逺近取義皆欲觀五也道即生也六四觀國之光利用賓于王象曰觀國之光尚賓也觀隂消陽長之時以六四為主爻而逼近九五然以隂居隂而得正故有此象坤為國互艮有光五君位有王象四承五有賓王象國之光即五之我生者周史謂光逺而自他有耀是矣項氏曰國有光則賓無光可觀則敵當觀之時聖人懼焉九五觀我生君子無咎象曰觀我生觀民也觀作平讀觀之變剝在此然刑中有德故九五以我所生觀示於人彖所謂中正以觀天下者是也故有君子無咎之象君子者履中正者也穀梁傳常事曰視非常曰觀上九觀其生君子無咎象曰觀其生志未平也觀者上觀之其指下隂而言于是隂生益盛二陽漸消之勢决矣上雖未能中正以觀天下然以陽居隂體巽之極亢而能悔不以無位安然放意此所以無咎而象表其志也四隂浸長應曰小壯而名觀者隂本巽順也上必中正然後下觀而化上九之志未平有以也矣龍仁夫以觀觀無兩音例依卦名作去讀者非也爻辭五平讀彖傳平讀者二證音彖辭彖傳觀平讀者一爻平讀者五去讀一證字據陸朝聖人下無以字噬嗑震下離上噬嗑亨利用獄彖曰頥中有物曰噬嗑噬嗑而亨剛柔分動而明雷電合而章柔得中而上行雖不當位利用獄也頥中有物則為噬嗑賁何以不為噬嗑俞氏所謂噬者必下動賁無震也剛柔分震剛離柔分居內外非謂三隂三陽也胡氏謂分乾五坤初之剛柔為震離則益逺矣徐氏曰剛柔分未噬也動而明將噬也合而章已噬也柔得中上行對賁言之謂居尊在上而行事也朱義自益六四來非矣簡輔曰先言得中後言上行因賁之離居下也如本義當作柔上行而得中矣簡言是已五以隂爻居陽故位不當然柔而得中乃得用獄之宜中則無不正矣噬嗑剛柔分而柔得中節剛柔分而剛得中噬嗑有亨有利節有亨有不可貞剛之用難矣哉或曰噬嗑巽宫之卦可以權節坎宫之卦為陷非矣象曰雷電噬嗑先王以明罰敕法據蔡雍石經作電雷敬軒薛氏曰明罰取火敕法取雷初九屨校滅趾無咎象曰屨校滅趾不行也初上不言噬無位受刑之象初在卦始罪薄過小陽剛橫亘於震足之下遮沒其趾之象六二噬膚滅鼻無咎象曰噬膚滅鼻乘剛也中四爻為用刑象膚鼎肉之大臠謂二中正而乘初剛初噬之沒鼻則其噬合矣蓋剛者情多直而以柔中正聽之必得其情也二互艮四互艮之主爻為鼻又為黔喙噬膚滅鼻之象爻位以次漸深噬肉以次漸難六五為難易之中也朱語録噬膚而沒其鼻於器中近是矣義謂傷滅者非六三噬臘肉遇毒小吝無咎象曰遇毒位不當也三在膚裏稱肉離日熯之為臘或曰臘取三剛象肉取六柔象肉藏骨柔中有剛亦通非應稱遇謂四互坎為毒六三隂柔不中正而近比于四故有噬臘遇毒之象蓋不能用獄矣周禮臘人鄭注云小物全乾曰臘臘之言夕也朝暴于夕乃乾昏禮臘必用鮮是也言肉則無骨然視膚為難朱先生以為全體骨而不言小物似而非也當據何氏平讀謂不能承四也二三皆無咎三小吝中正不中正之分也九四噬乾胏得金矢利艱貞吉象曰利艱貞吉未光也乾胏馬融曰有骨之謂金矢者何也陸績曰離為兵矢金矢取其剛直也太平御覽引王肅易注曰四體離乾卦骨之象骨在乾肉脯之象金矢所以獲野禽故噬之反得金矢按四成卦之主頥中之物也四位雖柔而才本剛直四噬則頥合矣噬乾胏故利艱貞得金矢故吉朱先生信周禮鈞金束矢之言非也利艱貞吉何以未光噬乾胏而得金矢斯其人已不為大畏民志矣六五噬乾肉得黃金貞厲無咎象曰貞厲無咎得當也五之乾肉林黃中曰折肉披筋而熯之似剛非剛似柔非柔也其疑於剛柔以六居五也五成離之主而又柔中黃者中也五變為乾金故曰金項氏曰於四噬其乾胏之强而得其金矢之用於五噬其乾肉之强而收其黃金之用聖人待强梗之仁是也貞者正也厲者離火之嚴所以為德威也離初故未光離終故不明此離之中故得當也彖言不當而爻言當猶漢獄失當得當之云位與事之分也柔以居五本不當然能貞厲故用獄則得當矣九四金剛而近五之中直故曰金矢六五黃中而近四之用剛故曰得黃金君臣以剛柔相濟亦皆用獄之道上九何校滅耳凶象曰何校滅耳聰不明也鄭𤣥云互坎為耳離為槁木木在耳上也滅耳校之厚掩過其耳不見也王弼訓漫不以初三上為刖為劓為刵郭雍氏曰書注劓輕刑剕辟為重漢書斬趾同于棄市初六小刑不當斷趾上九罪大復不當輕刑六二之刑何為返稱無咎上九輕刑何凶于二哉以是知三滅二非刑此說似矣不知上九非輕刑滅耳非刵胡仲虎又以馘耳為重刑又豈知馘獨施之軍旅而馘亦不用何校哉朱先生謂傷者亦非象㫖證字依蔡雍石經作電雷證音據何氏告蒙約當作平讀賁離下艮上賁亨小利有攸往彖曰賁亨柔來而文剛故亨分剛上而文柔故小利有攸往天文也文明以止人文也觀乎天文以察時變觀乎人文以化成天下小利有攸往據郭京舉正謂不誤作小蓋上卦艮止推之固可通矣鄭康成曰卦互體坎艮艮止于上坎險于下夾震在中故不利大行小有所之則可矣是鄭以前不已作小矣又以自二至上為二體亦非中爻不備之義馮椅曰今本誤當作柔來而文剛故亨小分剛上而文柔故利有攸往非也賁乃噬嗑倒體六二之柔自噬嗑六五而來文內卦上九之剛自噬嗑初九而分文上卦胡俞說是也程先生以賁自泰來下文九二之剛二文上六之柔朱義又推損與既濟既以紆曲矣天文上據舉正脫剛柔交錯四字楊敬仲曰本質剛大柔來文之則亨其功大本質大故也本質因柔雖剛往文之僅小利有攸往而已本質小故也今察其㫖亦非文明者文理密察言乎其離也止者各止于至善言乎其艮也此知止能得之事也或言一隂一陽之卦自復姤來二隂二陽卦自臨遁來三隂三陽卦自否泰來或又謂彖傳凡言剛來柔來皆從乾坤二卦來皆非也昔孔子謂子貢曰夫白而白黑而黑夫賁又何好乎又謂子張質有餘者不受飾達此可以知聖人之學易矣象曰山下有火賁君子以明庶政無敢折獄明離象無敢艮象無敢者詳審而後發也初九賁其趾舍車而徒象曰舍車而徒義弗乘也四互坎為車初之應也然文剛者在二初九有應而不受惟自潔以答二之好故稱義也六二賁其須象曰賁其須與上興也六二一隂施于二陽之間以文剛者也然成離之主而性炎上故為賁須之象也在頥曰須在口曰髭在頰曰髯侯果曰自三至上有頥之象二在頥下須之象也卦以文剛爻實之曰此附上而興者也九三賁如濡如永貞吉象曰永貞之吉終莫之陵也九三有離文自飾故曰賁如有坎水自潤故曰濡如據而兩獲之象然三體剛履正故貞于二二者文下卦之主也與二同德故隂莫之陵六四賁如皤如白馬翰如匪寇婚媾象曰六四當位疑也匪寇婚媾終無尤也陸績以震為白為馬故曰白馬翰如震為白馬者馵為白足顙為白顛皆出震而震四之互象也康成謂六四巽爻者非檀弓云戎事乘翰翰白色未獲賁也朱先生謂為疾者非居艮之初而文柔之剛尚逺三為互坎之盜康成謂三見四適初未定欲斡而有之是已非三之寇則與上為婚媾故象以當位疑釋之終謂上九四受上之文故無尤也朱先生謂九三剛正非寇乃求婚者則于象辭增守正不與殆近于支而贅矣當位疑何也欲退則失上之文欲進則懼三之難或飾或素內懷疑懼鮮潔其馬翰如以待雖履正位未果其志也六五賁于丘園束帛戔戔吝終吉象曰六五之吉有喜也艮為山丘為果蓏而又在震林之上則上丘園也五與上皆無應于下然上本文柔之主五以柔中亦能將幣以從之束帛者匹兩為束六五以兩拆成爻之象又坤畫九家為帛有束帛象也隂爻嗇故用幣薄終也者上也五得上之文喜而後可知也寧不吉哉王弼賁于束帛丘園乃落賁于丘園帛乃戔戔用莫過儉泰而能約虞翻曰巽為帛為繩艮手持故束帛以艮斷巽故戔戔他義可也以巽為帛改說卦耶李鼎祚曰五離爻離為中女主為蠶系束帛之象未詳何據子夏傳五匹為束三𤣥二纁象隂陽亦非也上九白賁無咎象曰白賁無咎上得志也上稱白賁賁者文飾也字從貝諧卉聲貝水蟲皆有雜文如錦者隂蟲也說卦曰坤為文今上以乾畫居賁終則以陽漫之故其賁白謂不雜也吳幼清曰上復之二則二三四互兊為白兊者故不取白蓋失之矣得志者蘇氏曰柔之文剛也往附于剛以賁從人也剛之文柔柔來附之以人從賁者也以賁從人則賁存乎人以人從賁則賁從乎已此上九之所以得志也陽行其志而隂聽命惟其所賁故曰白賁受賁莫若白也證字據郭京舉正以不利有攸往之不作小字脫文據舉正天文上脫剛柔交錯四字剝坤下艮上剝不利有攸往彖曰剝剝也柔變剛也不利有攸往小人長也順而止之觀象也君子尚消息盈虛天行也據俞易趙氏輯聞剝也之剝音撲觀象者謂五隂勢順然艮剛難止當早圖于觀卦二陽之時以柔畜之故曰尚消息盈虛也觀謂卦名象曰山附於地剝上以厚下安宅初六剝牀以足蔑貞凶象曰剝牀以足以滅下也六二剝牀以辨蔑貞凶象曰剝牀以辨未有與也六二之辨何以未有與鄭𤣥云足上稱辨謂近膝之下屈則相近伸則相逺也愚謂二俯則聨初仰則望五正辨之象然皆隂類而無應故崔憬曰至三有應二未有與也二小人之惡若上有剛德之與則知有忌憚若五為陽則大觀在上而服矣即象傳而彖傳之㫖益明聖人不養人之惡而欲圖于早如此不曰無與而曰未有則以治剝望上九乎六三剝之無咎象曰剝之無咎失上下也位陽而又應陽與四隂異矣六四剝牀以膚凶象曰剝牀以膚切近災也膚者牀之膚崔憬謂薦席也京氏作簠謂祭器胡淡菴云取象簠以精義在焉夫牀何取於簠哉六五貫魚以宫人寵無不利象曰以宫人寵終無尤也五剝之主凡剝者皆其類也故雖體艮欲止而在下者將附以進五變巽為繩而巽又有魚象洪景盧言易中魚皆指巽是也貫魚指下四爻皆從巽來如魚駢頭貫之以繩自上及下也五統羣隂如后統衆妾四為夫人佐后三下卦之長為九嬪以主九御二為世婦初御妻寵宫人不及以政受之隂事尚順也望前先卑望後先尊剝之勢至五而極順而止之其權在五故其象如此彖傳曰觀象觀卦名也觀二陽之卦五所自變非謂觀察也終謂上九上九碩果不食君子得輿小人剝廬象曰君子得輿民所載也小人剝廬終不可用也艮為果蓏蓏當二柔果當一剛上九之象故稱碩果也君子謂上陽小人五隂也輿者下坤為大輿下完而上覆可以任載陽無盡理也廬更為門闕之象上壯而下撓雖有門闕不可用矣艮之為門闕者在上故曰終上卦之終也朱先生云廬謂㦸柄㦸柄之籚從竹蓋積竹也與經文廬不同字而義又無取不如本義說矣何子元云與小象合者也證音據趙氏輯聞剝也之剝音撲復震下坤上復亨出入無疾朋來無咎反復其道七日來復利有攸往復出入古注入則陽反出則剛長蓋剝一陽在外倒轉為復則反於內也無疾謂陽生有漸而不遽也五隂之朋來順一陽善補剝時之過無咎之象也虞翻曰出震成乾入巽成坤復取陽長而又何以言成坤哉朱先生以為已之出入近人事舍取象之義矣吳幼清曰復自師而變師之初還復於二為出師之二還復于初為入謂一陽之出有師象可也而必師初復二二復初又取臨泰壯夬所變之卦還復未變之時以明朋來之義尤為游辭鑿說以反復其道者程先生曰消長之道反復迭至也七日來復者卦起中孚六日七分也褚莊并云五月一隂生至十一月一陽生朱義遂主之侯果又以豳詩一日二日為言見變月言日之意然臨一陽長而言八月則其說不能通於彼矣虞翻李鼎祚皆本易軌謂爻主一日剝卦陽氣盡於九月之終十月末純坤用事坤卦將盡則復陽來隔坤卦六爻為六日復來成震一陽爻生為七日其說原於易緯稽覽圖既曰爻主一日剝陽盡于九月終矣又曰十月末純坤用事坤將盡則復陽來是不為一月來復乎故卦起中孚六日七分為復者其義明矣養生家亦曰時有六候候當五日采藥用一候半為七日來復道樞易成子言抱一者用四十九日而聖胎成人生四十九日而七魄全死四十九日而七魄絶此來復之數隂陽之極皆有以窺此矣彖曰復亨剛反動而以順行是以出入無疾朋來無咎反復其道七日來復天行也利有攸往剛長也剛反動而以順行古讀至動為句剛言反見元貫始終而今循之反舊也剝上九剛為止反遂成震為動故曰剛反動陸剛反斷句若曰動而以順行則動與行何所分視豫順以動不多一行字乎彖言天行者蠱剝復也蠱亂極而治復隂而陽生乎利往者以初初者復之主爻剛所自長也復其見天地之心乎天地以生為心靜不可見而動可見也復見天地之心與咸恆遁壯不同何也橫渠之言曰心隱于微情發乎顯也輔嗣以寂然至無為本夫陽動而隂靜者也復一陽之卦何得言無言靜乎象曰雷在地中復先王以至日閉關商旅不行后不省方先王也者先代之王也后謂時王也遵先王之遺意而廣其條也閉關象坤之闔户商旅象坤之衆俞氏說如此震為大塗商旅之路坤為靜不行之象坤為地方之象顔師古訓方為常謂常務非也項氏曰彖取陽之復來故可以出入象取雷之在地中故不可以行初九不逺復無祗悔元吉象曰不逺之復以修身也祗按說文提出萬物之象居復之初知幾即復無逺而提出已形之悔元吉之象也楊敬仲曰意起為放不繼為復不繼不再起也元始也復于意未動之始也其言簡明矣王肅陸績作提安也荀爽九家作㩼多也書不同文德明季長以為適所以之辭康伯侯果訓為大鄭氏訓為病皆於文義不貫傳義皆釋云至然抵可訓至祗非抵也安有至意哉六二休復吉象曰休復之吉以下仁也休讀如休休有容之休二才位俱隂柔順中正剛之來復而無所競故稱休復正與下仁之㫖符㑹仁指陽所謂天地之心也王應麟曰復之初即乾之元乾為木果在春為仁發生也下仁下附初九二先生别申休義為美非矣六三頻復厲無咎象曰頻復之厲義無咎也頻鄭氏作卑朝以道曰卑古文頻字今文作顰六三才剛而位柔剛之來復順之則不堪競之則不能故顰蹙以待之雖不如二然義無咎矣升陽子曰三體震木而變火是始青天中碧落空歌也上與坤交生浮黎土矣火性炎赫故稱厲土能生金為空氣金胎木體仁金體義故曰義無咎明金情戀木慈仁也其亦窺此也乎六四中行獨復象曰中行獨復以從道也凡卦三四皆可言中如益三四皆以中行言又卦五隂二三近陽五上逺陽四居逺近之中在震大塗之半故曰中行其稱獨復初一陽獨四應之也二以初為仁四以初為道者道自行言率性之義取四為外體象也朱義四處羣隂之中而獨與初應者虞翻指為俗說譏切之曰中謂初震為行初一陽爻故稱獨四得正應初故曰中行獨復蓋虞以中為內疑於初九繇辭矣六五敦復無悔象曰敦復無悔中以自考也敦者坤土而隆其上之象六五隂之方盛然體柔順故能因四之獨復而附益以自托也俞氏曰二居下卦之中而休復四居五陽之中而獨復五因二四之中自考乎已之中是已考如考中度衷之考以成訓者或于本義不協矣上六迷復凶有災眚用行師終有大敗以其國君凶至于十年不克征象曰迷復之凶反君道也上六隂暗之極居坤之成坤為先迷故曰迷復鄭康成曰異自內生曰眚害物為災也行師者坤為衆荀爽謂上行師而距於初陽息上升必消隂終有大敗是也其君謂五虞翻謂坤為邦國故國君凶十年者李鼎祚曰坤數主十也乾無十坤無一隂數極于六而七則又為乾之始陽數極于九而十則自為坤之終故凡言十坤終之象此行師一事而象三行師大敗為已也以國君為人也十年不征兩師皆不興幸免凶敗然民離國弱遲之十年亦不能出也江夏劉績曰迷復凶有災眚此言不從陽之凶上六比君欲為六五征不服然終不克此言敵陽之凶是也反君道者五中以自考上六不終也證句據古讀彖傳剛反動為句證字據鄭氏朝氏頻作顰無妄震下乾上無妄元亨利貞其匪正有眚不利有攸往妄者二隂耦畫之象無妄者一陽竒畫之象陽一在內則不二故名無妄元亨利貞者據其體外來為主者辨其分震下有外來為主之嫌猶所謂外鑠非知能之良耳性無去來故文王特摽之蓋以辨聖學也卦象有此二義匪正指外來之剛謂初也剛在上為正在下則稱外來說卦以大畜時無妄災對言之剛自外來而主內則不若大畜之在上蓋匪正矣故異自內生不利攸往之象也元亨利貞者聖學也俞氏以上九當之云乾道之變非天道之正夫乾道天道異乎哉夫俞氏泥實象過矣彖曰無妄剛自外來而為主于內動而健剛中而應大亨以正天之命也其匪正有眚不利有攸往無妄之往何之矣天命不祐行矣哉卦以下為內上為外陽本在上故稱外來對大畜之辭也大畜以艮上一陽為主剛在外無妄以震下一陽為主剛在內程先生曰坤初六爻變為震朱先生曰自訟來皆非也震卦一君二民主初陽內動而外健故大亨五剛中而應二故正正釋貞天命猶言乾道天地之中正即道道即命也祐依馬氏作右大畜無妄反復之卦乾遇艮七而為大畜卦圖右行逆數也無妄則震左行遇乾一乾不為貞而為悔乾運非大畜右行之時有無妄之災矣聖人觀圖察順逆之數明二卦反復之象以釋為主匪正之義舊說以虛辭通實象非也象曰天下雷行物與無妄先生以茂對時育萬物對時育物先王而君子不用者貴有其位乎物與依黃潤玉作讀張清子集注與即應字天雷而物應也初九無妄往吉象曰無妄之往得志也爻與彖辭異彖辭據六爻之反復言爻辭據六爻之定體言初九剛為主于內上應九四兩剛不相牽係直心而往此心之本體故曰得志六二不耕穫不菑畬則利有攸往象曰不耕穫未富也簡輔不耕不菑為讀據古注陸德明讀非無妄主震初動于六二坤土之下二以柔順中正而從之初先耕而二因以穫震為禾稼艮為手禾在手故有穫象田者一嵗反草曰菑三嵗悉耨曰畬初爻非坤故不菑歷三位而五以剛中應之故有畬象往者往應五也隂虛故不富不求富也禮坊記易曰不耕穫不菑畬凶加凶焉記者不知易矣六三無妄之災或繫之牛行人之得邑人之災象曰行人得牛邑人災也隂不中正居震極而互艮止不能攸往故象如此坤為牛指二坤畫離牝牛亦二也三本互體巽繩而係離牛艮鼻者五非三應稱或居上卦人位在震大塗稱行人應二故稱得牛牛為五得則三坤三畫為失所乘邑居六畫為邑人故以為災無詰捕之象也虞翻曰乾四據三故行人之得三繫於四故邑人之災象㫖不明矣九四可貞無咎象曰可貞無咎固有之也義謂陽剛乾體下無應與可固守是也不及初吉不如上無利矣有猶孟子言我固有之本爻固有之德耳義謂猶守者非九五無妄之疾勿藥有喜象曰無妄之藥不可試也五何以有無妄之疾疾謂隂也吳幼清曰疾者以外物之應足以為內心之病九五剛中則無妄其有應則疾矣侯果謂四三妄處五乃憂疾是百姓有過在豫一人者今詳九四無妄處之迹聖人之應物來則照而去不留是猶無妄之疾耳不屏絶外物而外物自不能為纍何以藥為哉藥者虞翻所謂巽木艮石稱藥矣上九無妄行有眚無攸利象曰無妄之行窮之災也上九以乾主爻健極而居卦終故其象如此無妄之德動而健非禁其行者此蓋由位生也禍福無不自已求者無妄而更欲行則異自內生已非無妄又况於行而窮之乎楊敬仲曰窮之則災是也窮之也者窮之也往說文云之也由是而之焉故吉行則進而有為也崔子鍾所謂下三爻貴動三則居者災上三爻貴靜上則行者凶也證句據簡輔不耕不菑為讀據黃潤玉物與為讀證誤據馬融不祐作右大畜乾下艮上大畜利貞不家食吉利涉大川大畜大壯皆四陽占皆曰利貞何也胡仲虎曰壯而不貞其壯也剛而無禮畜而不貞其畜也博而寡要其不家食何也鄭氏說九三至上九頥象居外纂言兊口在四食于外皆是也虞翻二稱家二五易位成家人家人又體噬嗑食者非李鼎祚乾賢人賢人在艮宫闕故不家食亦非也利涉大川吳幼清云二四五上有舟象乾健應五上進有舟行而前之象彖曰大畜剛健篤實輝光日新其德剛上而尚賢能止健大正也不家食吉養賢也利涉大川應乎天也據鄭𤣥管輅日新絶句管氏云朝旦為輝日中為光蘇氏曰剛健者乾篤實者艮輝光者二物相磨而神明見也乾不得艮則索健艮不得乾則徒止以止屬健以健作止而德之變不可勝窮也上俞上聲讀賢謂陽尚賢者五尊上九之陽也大謂陽小畜巽隂畜陽非正大畜艮陽畜陽則正不以止健之功歸之于二隂之小也止健不分特曰能止健有微權矣不家食四養初九之陽也利涉大川用乾之功也乾在下體亦謂之應天以明天之理無不在也隂生于巽巽隂之微也故曰小畜陽終于艮艮陽之究也故曰大畜艮畜乾貞巽畜乾悔也象曰天在山中大畜君子以多識前言往行以畜其德黃潤玉曰天者積氣貫乎地中凡雲雷多自山出此天氣之在山中者虛齊趙氏曰互震足兊口於中爻有言行畜德之象初九有厲利已象曰有厲利巳不犯災也厲謂六四體艮為小石與初相磨厲也利己者受畜也已從陸夷止反讀子夏傳云居而俟命則利往而違上則厲意近之矣災謂艮山之阻九二輿說輹象曰輿說輹中無尤也輿指二輹謂初也二說輹與小畜同小畜下有牽大畜下利己小畜見止大畜自止也環溪吳氏曰輿說輹一也在小畜之三未免反目在大畜之二則無尤以其中也九三良馬逐利艱貞日間輿衛利有攸往象曰利有攸往上合志也乾為良馬為行健三陽皆良馬九三得位而初二隨其後故曰逐逐者追逐於後而不得馳上有艮止利艱貞之象也三四五上肖離為日輿指二衛指初言九三居終日乾乾之地與二陽同心日討國人軍實而為行計也大畜之權在上故曰能止健健而自止三所以合上之志也六四童牛之牿元吉象曰六四元吉有喜也艮為少四在艮下得坤之初為童牛體艮手持木而居止之四應初初陽未進而止之用力易也童牛無角上剛畫象楅衡止之上為畜主而四能分其任故其象如此元如喪元之元上也六五豶豕之牙吉象曰六五之吉有慶也五變體巽有豕象猶姤也豶如賁鼓賁實義大豕也陸氏云去勢本虞氏劇豕說然爾雅以􅀈訓豶么訓幼矣牙埤雅云以杙繫豕謂之牙上剛畫在前猶杙牙古注作齒牙非也二陽已進五以柔中當尊位以畜之又有上九為之左右故慶大于喜也二隂雖能畜陽然上為成卦之主二隂之牿牙在焉二隂識所主故有喜慶也上九何天之衢亨象曰何天之衢道大行也陽居艮上畜道巳成無復畜止之象何如何校之何梁武帝音賀負也王延夀魯靈光殿賦直云荷天衢以元亨鄭康成指艮背上乾首下為肩荷物處陽乾爻有天象艮為徑路天衢也長寧周尚書引莊生背負青天而莫天閼者證之是矣馮氏椅曰外無陽爻則坤順不能畜內無隂爻則同類不相畜然則成大畜之義者在艮之上九而能畜乾之陽者在艮之四五也證句據鄭𤣥管輅日新絶句證句利已之已從陸氏夷止反證字據鄭𤣥王延夀梁武帝何天作荷證音上從俞氏上聲讀頥震下艮上頥貞吉觀頥自求口實頥貞吉指艮卦似離目有觀象觀頥震觀艮也口容止上九體止之成故得專頥名言觀上所以養人者震動有求義自求口實指初言吳幼清以坎二易上成觀五易初成頥鑿矣彖曰頥貞吉養正則吉也觀頥觀其所養也自求口實觀其自養也天地養萬物聖人養賢以及萬民頤之時大矣哉自求而亦曰觀所謂知行之合一也口實非必飲食仲虺之誥曰恐來世以台為口實蓋言語為階養身者有道焉象所謂慎言語節飲食乃備其義耳象曰山下有雷頥君子以慎言語節飲食初九舍爾靈龜觀我朵頥凶象曰觀我朵頥亦不足貴也靈龜謂四頥似離有龜象也四體艮不食為靈初震動之主故舍靈龜而不養朱先生謂陽剛在下足以不食上應六四之隂而動于欲非也卦象互離為觀我指初朵震反生下垂之象謂初時淺位下不能養人及民徒自顧而垂下其頥以求食所志鄙劣凶之道也爾我與中孚同內外之辭也吳俞皆謂爾初我上疑誤慿虞艮我之說辭不達矣六二顛頥拂經于丘頥征凶象曰六二征凶行失類也說文曰顛頂也謂上九卦所繇頥者傳義謂倒恐不然拂說文過擊也經古孟子注過歷也丘說文空也王肅謂六五是矣而意指艮半為丘則以虛字為實象非也蓋六五有養人之位而無其德是空頥耳然二雖中正體震妄動求養于顛頥歷五而後至飲食有爭道故擊之而後過也子夏劉一行以拂為弗云輔弼非是繇頥者利之所在也丘頥者位之所在也蘇氏曰見利而蔑其位君子不以為義也二五皆隂類拂之則失類也六三拂頥貞凶十年勿用無攸利象曰十年勿用道大悖也拂頥承上拂丘頥而省六三隂柔不中不正而處震極以三五同功故亦拂而求養焉亟動於欲求而不觀故與上雖正應而凶十年勿用坤數也西溪李氏曰口容止頥貴止不貴動艮止上三爻皆吉震動下三爻皆凶也六四顛頥吉虎視耽耽其欲逐逐無咎象曰顛頥之吉上施光也四亦顛頥然同體艮故吉艮為虎卦省離目有視象耽說文視近志逺馬君云虎下視也四下正應初故視下為近上與四非應非比故志上為逺初九舍四觀朵頥而求自養故四視之無得而遂仰志於上如虎取食也漢書序傳引古文易作六世耽耽或曰巽宫游魂卦非也自養于內者莫如龜求養于外者莫如虎體艮上九由頥能應其求故其欲逐逐逐逐薛綜云速也隂求口實乃其正故無咎初指四為龜者肖其全四自為虎體其位外剛猛而內隂險也上指上九艮有篤實光輝施光言養及四也六五拂經居貞吉不可涉大川象曰居貞之吉順以從上也六五失民為二三所拂愠起而爭則無助艮為居順上九而居貞吉象也爻材柔而體艮止艮之主爻適當其前故不利涉也上九由頥厲吉利涉大川象曰由頥厲吉大有慶也上九以剛居柔當卦之成行止之權在焉養君德以養天下卦之所由以頥也艮為小石厲象心匪石而不可轉止之義卦有舟虛之象故又利涉也吳幼清以卦自坎變坎九五降初坎初六升五而强者退後弱者進前故不可涉大川坎九二升上坎上六降二强者進前弱者退後故利涉大川則若巧而鑿矣字音句無誤大過巽下兊上大過棟橈利有攸往亨彖曰大過大者過也棟橈本末弱也剛過而中巽而說行利有攸往乃亨大過之時大矣哉史繩祖曰本末字皆從木以一陽藏于木下為本以一陽散于木上為末大過巽下兊上以四陽畫積于中二隂畫處于外猶之木焉上缺下短本末弱是也剛過而中四陽故稱過皆在內四爻故稱中非謂二五皆中二五繇辭皆無中意也剛雖過而蓄于中不用壯矣剛過而中則可立巽而說行則可權故本末雖弱而利往也象曰澤滅木大過君子以獨立不懼遁世無悶黃潤玉曰澤水漲而沒木澤之太過也君子體之故用之獨立不懼舍之遁世無悶吕仲木曰未有遁世獨立之行而不懼無悶是妄人耳初六藉用白茅無咎象曰藉用白茅柔在下也九二枯楊生稊老夫得其女妻無不利象曰老夫女妻過以相與也二之五皆取象于屋齊民要術白楊堪為屋材廣八卦之象曰巽為楊為白故枯楊白楊也稊者陸氏謂楊之秀上應兊澤故生楊近澤之木故以象也大戴禮云五月楊稊稊者發孚朱先生云根非也卦以初為本至二則非根矣老夫自互乾言女妻者兊為少女二陽始過以與五虞翻謂二過初之長女與五五過上之少女與二是也朱義本馬荀說曰比初隂非象㫖矣王弼曰老過則枯少過則稚以老分少則稚者長以稚分老則枯者榮是或方技之所祖乎九三棟橈凶象曰棟橈之凶不可以有輔也陽以隂為輔三重剛自用而末又弱故不可以有輔也九四棟隆吉有它吝象曰棟隆之吉不橈乎下也有它吝子夏傳曰非應稱他指三言朱先生以下應初六為有他非也四與三比同是棟也三橈四羞與比之有他同下亦謂三四以陽居隂不至于大過故不因下而橈凡畫卦者自下浸而上故三視四得稱下九五枯楊生華老婦得其士夫無咎無譽象曰枯楊生華何可久也老婦士夫亦可醜也爻辭承九二言五陽之極以與二二之稊楊至是畢達而華二巽長女為老婦至是得五互乾為士夫士夫者郭氏舉正云當作少夫剛過而在中故無咎居羣剛之上而當大過之時故無譽一說吳幼清曰二三四互乾二乾之初士夫也九五變為柔與九二應三四五互兊五兊女之終老婦也稱女稱老以卦畫之初終不以倫次起義荀君云五陽得正位數七故為士夫然正位安知其不變哉醜如醜夷之醜老婦利非士夫之利故言亦可醜耳先儒或曰二當大過之咸故能交而生五當大過之恆奠其居而不交也上六過涉滅頂凶無咎象曰過涉之凶不可咎也下應于三如乾首沒兊澤中也大過二隂事陽過恭吳幼清曰初柔居下得所故仰承者謹而又謹上柔居髙不安故下行者卑而又卑如行過涉水愈趨于下而沒其頂也楊敬仲曰見危授命而功不濟亦有從而議其非者則鄉原之道而見利忘義者得志矣證字據郭氏士夫之士作少坎坎下坎上習坎有孚維心亨行有尚彖曰習坎重險也水流而不盈行險而不失其信維心亨乃以剛中也行有尚往有功也天險不可升也地險山川丘陵也王公設險以守其國險之時用大矣哉坎何以稱習項氏曰重卦之序坎在六子之先故加習以起例郭京舉正及朝氏所載徐氏語皆云習上脫卦名坎字然景迂謂古文不脫何子元以吳斗南所傳費氏易正與今同云今卦爻辭上卦爻之名鄭𤣥實加也險為而不恃也維心亨身尚未亨也或曰中剛象心柔絡之象維中心之實不解故稱維心也行有尚者坎忌不流然本勞卦也故行則必通坎流水與兊澤盈科而進者異天險指上坎地險指下坎互艮為山丘陵象本卦象為川也象曰水洊至習坎君子以常德行習教事陸司農曰趨而下者至也常德行則險而不變坎剛中之象習教事則險而能應重坎象也崔子鍾述俞易曰坎為兵戈詩常德以立武事月令仲春教振旅仲秋教治兵非也按離為兵戈坎不為兵戈且坎之時用惟變所適亦不專指是也初六習坎入于坎窞凶象曰習坎入坎失道凶也窞王肅云坎底也在習坎之下故曰底說文云坎中更有坎也習坎以全卦之時言入坎以二體之內言彖言習坎而爻繫于初者重險之下才弱而無以自拔也道謂處險之道中正是也初隂之不中正無以出險也九二坎有險求小得象曰求小得未出中也小得險中所得也隂小指六三九二才剛志柔未能出險與五皆以險相臨而不相應三方在險相待而全故易求也六三來之坎坎險且枕入于坎窞勿用象曰來之坎坎終無功也至曰來往曰之下坎方脫上坎在前之象此自重坎言險古文鄭向本作檢鄭云木在手朝氏謂象數合蓋互艮之下為手而近震木檢之象也枕鄭云木在首三互艮之下而橫艮木于上爻枕象此又以互體取義古文作沈非也入于坎窞謂六三居坎之成流而趨下以附九二相與為固也三與初同入坎窞而凶與勿用異者二三同患相恤初自以為事外可免挾其險而不附故有失道之凶也五上亦然六四樽酒簋二用缶納約自牖終無咎象曰樽酒簋二剛柔際也四變則互離巽巽木而離大腹故象樽酒者坎𤣥水也簋互震竹器二謂副二缶爾雅釋盎孫炎云瓦器亦離鼓缶象禮器五獻之尊門外缶然可節歌故詩云坎其擊缶四比於五箸尊盛𤣥酒肴實樂則用缶而已言其薄以相與也鄭云四互震上爻辰在丑上值斗可斟之象斗上有建星形似簋建上有辨星形似缶鑿甚矣天子大臣以王命出㑹諸侯主國尊棜簋副設𤣥酒以缶故云艮手巽繩有納約之象四偶畫虛而通明有牖象四五相締不由户而由牖非正應也六子本卦重者爻不相應義取近比而已坎四柔近比五剛故曰剛柔際九五坎不盈祇既平無咎象曰坎不盈中未大也祇依鄭作坻按詩宛在水中坻說文云小渚坎之象也澤水盈科而後進者九五坎中之陽流而不盈適平于坻而已蓋陽剛中正而能出險之象故無咎也或云坎不盈承上樽酒言之爾雅小罍謂之坎二五俱險陷之主二有險而五不盈上下之勢異也蘇氏云不盈所以納四也盈者人去之不盈者人輸之象傳中釋坎未大澤不盈言九五剛中處險之用耳朱先生曰有中德而未大夫既有中德矣而有未大者乎上六係用徽纆置于叢棘三嵗不得凶象曰上六失道凶三嵗也坎上變巽為繩三股曰徽兩股曰纆上不附五故係用徽纆也坎為叢棘言叢棘則在地上非坎窞矣此坎之終也置叢棘者衆議於九棘之下三嵗者取義卦之三畫上六隂柔居險極所恃險而已險窮則亡故三嵗不得九家易曰害人者加明刑任之以事能復者上罪三年而舍三嵗不得則司圜所謂不能改而出圜土者殺矣故凶證句據象傳正樽酒簋二為句證字據古文鄭向本險作檢據鄭氏祇作坻離離下離上離利貞亨畜牝牛吉先利貞而後亨六二居下離之中則正六五居上離之中則不正故亨係乎貞之後矣坤為子母牛柔相依附也離得坤中爻而麗二剛非其類故止云牝牛蓋牡牛善觸乘匹則益悍老子曰牝常以靜勝牡以靜為下是也彖曰離麗也日月麗乎天百穀草木麗乎土重明以麗乎正乃化成天下柔麗乎中正故亨是以畜牝牛吉也重明以麗乎正此極言三才之離也俞玉吾曰上離重明下離正也以上卦之重離麗下卦之正也異於家人正位之正程先生從孔疏曲為五說曰隂居五位非隂陽之正乃事理之正夫隂陽事理可岐而二乎重明者本明而又明也其在人心則虛明神用無所不通意動故昏一日覺之緝熙於光明則不識不知順乎帝則而無不皆正故曰重明以麗乎正以之為言用也用重明即麗正非有所作意矯强也朱義止係卦名不信孔氏等卦體之言有遺論矣然則柔麗乎中正故亨以卦體言之五何以得中正乎曰五中而不正者也疑因上重明麗正而誤加麗正之語於中之下也若朱先生門人所録語謂此說六二分數多胡氏遂附㑹之曰坎之剛中九五分數多故九五曰坎不盈卦辭釋有孚亦曰水流而不盈離之中正六二分數多故卦辭曰畜牝牛而六二爻辭亦曰黃離元吉則亦恐不然矣象曰明兩作離大人以繼明照于四方陸司農曰起而上者作也繼明者緝熙之義非有兩明也初九履錯然敬之無咎象曰履錯之敬以辟咎也初當趾為履居離之初附麗方始其履錯然文章歷琭之象又以陽剛而處明體為能敬以辟咎也錯者俞氏以為礪石引詩鶴鳴可以為錯證之鑿矣楊用修曰錯古易作舄今改作錯不識古文篆耳按初本附二在下豫頗韙之第曰履舄然則義不可通也六二黃離元吉象曰黃離元吉得中道也九三日昃之離不鼓缶而歌則大耋之嗟凶象曰日昃之離何可久也九三不歌而嗟何也震為鼓為聲九家易離為大腹缶象樂器也離變則所鼓非缶矣艮為少男有返老還童之象人之老不以生為樂則以死為憂人能自作元命或順受正命則皆樂而不憂矣嗟亦震聲吳氏二三四互倒兊口者鑿蘇氏曰火得附則傳九三於四不得其傳而遇其窮也愚按莊生薪窮火傳之㫖識此則死而未嘗死也又何大耋之嗟哉古文及鄭薛無凶字朝景迂曰無凶字者得象數或曰日昃之離離為樂也爾雅大琴謂之離九四突如其來如焚如死如棄如象曰突如其來如無所容也突如者下體之象突竈突也三四當繼明之時而二剛相值三以舊火上升接四如火氣之出於突四以新火逼乎五其猛烈如火之焚承繼可謂不善矣九三無所附九四人莫之附皆窮者也然九三咨嗟而已九四位過乎中壯火之氣衰矣不順忽出剛暴凌爍孰敢親而麗之欲得五而五拒之矣何所容哉六五出涕沱若戚嗟若吉象曰六五之吉離王公也沱若互坎水象戚坎加憂象嗟若互兊舌象六五為重離主繼明嗣位而不以位為樂嗣天子之孝百官總已以聽于冡宰之時也居倚廬而無命戒悲不樂矣而終吉者以王與公相麗隂陽相資也王指五公指上九家易曰陽當居五隂退居四五當為王三為公四處其中附上下非也孔疏曰五為王位而連言公便文㑹韻亦非也蘇氏王公指上九簡輔公指二亦非也離以附麗為義五附上而得助上為五折首獲醜寧不言乎內卦言日外卦言火劉氏曰火乃日之用故分離爻體用也止九王用出征有嘉折首獲匪其醜無咎象曰王用出征以正邦也上當離終之時火傳炎極而反于木離之木科上槁五為成卦之主有空中之權也上五同體相比故五用上以出征離明故有嘉首謂三乾畫為首其指五五之醜類乃二二五皆離之主故所獲匪二也正邦者三體兊剛鹵也離為兵戈征之所資虞翻曰王為乾乾征坤隂類非也考誤據卦體五中而不正其曰柔麗乎中正疑因上重明而誤加正字據古文及鄭薛朝嗟下無凶字周易象㫖决録卷二
