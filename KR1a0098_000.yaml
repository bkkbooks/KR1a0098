body:
  text: 周易象㫖决録易類提要臣等謹案周易象㫖决録七卷明熊過撰過字叔仁號南沙富順人嘉靖己丑進士官至禮部祠祭司郎中據過自序是書初名易象㫖後遂加决録名之案三輔决録名始趙岐而命名之義古無傳説以意推之葢定本之謂也自序又稱初聞閩人蔡清善為易購得其書惟開陳宗義不及象於是稍記疑者為贅言辛丑謫入滇晤楊慎慎始勸成此書葢初讀宋易覺不合乃去而為漢易故其説以象為主考左傳韓起適魯見易象春秋古人既以象名知象為易之本㫖故大𫝊曰易也者象也象也者像也王弼以下變而談理陳摶以下變而言數所謂各明一義者也後人併而一之概稱象數於是喜為杳冥之説者併而掃之惡言象數明人之易言數者入道家言理者入釋氏職是故矣過作此書雖未能全復漢學而義必考古實勝支離恍惚之談其據舊説以正今文者凡證字一百有一證音三十有八證句二十有六證脱字七十有九證衍文三十證當移置者三十有二證舊以不誤為誤者三所據之書如郭京之偽托舊本吳澄之妄改古經槩用援引不免輕信又如坤卦小象但知魏志之作初六履霜不知後漢書之實作履霜堅冰亦間有未審然皆援據前聞非由臆造又但注某字據某書當作某亦不敢擅改經文猶屬謹嚴在明人易説之中固卓然翹楚矣乾隆四十五年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀周易象㫖决録私識門人問於先生曰子之象㫖是有象之象也其於無象之象奈何曰無象之前萬象森然已備是隂含陽也有象之後則其理定而不移矣其變動積分之數㡬兆甚微而不可示人耳分有無者世儒之陋也門人問於先生曰子書明象之㫖而已而旁擊諸家不好辯乎哉曰不直則道不見又問曰象㫖以明易也採諸家之説而萃其中此於潔浄之體不妨乎曰始吾欲為或問而以其說歸焉繼欲省學者兩讀而不果也有繼我而作者其猶我之志也夫問曰子於易繋而必以象解之何也曰言皆因象而生者也聖人不昌虚言升菴楊子昔謂我曰繫畫以象解殆自子始乎子為謝楊子曰夫古有之矣引而不發今相為廓大之耳問曰繫之數不已細乎曰吾罪也夫吾罪也夫夫天地密移孔子之没垂二千年達其盈虚消長之則者獨邵子止矣仲敬劉子間語我以端緒而未進我不敢秘也有能通其說者皇帝王伯之業財成輔相之道亦因可見吾何敢秘其端緒哉問曰子之序所校證字者一百一證音者三十八證句者二十六證脫字者七十九證衍文者三十證移置者三十二舊以為誤今證還其舊者三舊分段不明今正之十傳附經者一條分綱下而註之確菴曽公欲别置卷首則何如曰始吾懼夫以鑿空疑我也故必有所據而後敢亦懼夫人之臆說經也故序首先見之確菴公欲别置首卷猶吾意也而讀序者氣脈益聨絡矣從確菴公可也證字一百一卦遺十二字乾據趙氏健作􅹧坤據魏文帝紀作初六履霜據鄒志完禮深衣作兼直其敬據荀虞姚信蜀才作隂凝嫌據九家作屯據虞翻王肅作即麓據鄭作機訟據鄭氏作至惙據鄭氏作三拖師據崔憬子夏傳作大人據郭京作執之小畜據說文陸氏作說輹據馬融作恤去據孟荀一行作既望據簡輔作礙履據荀爽作考詳泰據漢書陸徳明作包㐬據郭京作反實謙據郭京侵作征豫據姚信從日作旴豫據僧二行作用盍噬嗑據蔡邕石經作電雷賁據郭京作小利復據鄭氏晁氏作顰復无妄據馬氏作右大畜據王延夀作荷天大過據郭京作少夫坎據古文作檢據鄭氏祇作坻咸據子夏作咸􅡑據虞翻作咸䩉恒據禮緇衣作德偵據虞張本作震恒大壯據陸作埸晉據鄭作崔如據說文作衆􅀈據子夏作碩䑕據孟馬鄭虞王作矢得明夷據馬王作般據子夏作枡據蜀才作其家人據劉向作熇蹇據郭京作來正暌據左傳作宼張據京馬鄭王翟子元作說壼益據虞孟晁氏作偏辭夬據蜀才虞翻作莞睦姤據李茂欽作彳亍據李茂欽作句據郭京作失魚萃據鄭氏蜀才作一屋據虞翻陸希聲作資升據說文作􅀈升困據荀王陸作臲硊井據俞玉吾作汲震據荀氏遂泥作隊泥艮據古文晁項彖傳作艮背據子夏作枡隨據孟喜荀氏作裂作腎據公羊及虞氏作閽心漸據晁氏作于般據楊敬仲仍作漸于陸豐據孟喜六二作見主據姚信九三作右股據漢書說文作豐屋據鄭𤣥作天瘵據鄭𤣥王肅作祥也據林栗作亨據鄭氏作戕旅據胡氏作已中孚據金君卿作變據子夏陸績作縻之據京氏晁氏作近望小過據郭京作已止繫辭據樂記潤作奮據虞翻作之象作變而玩據劉績及本章上文例作言補過據鄭本作及終京房作不留據虞翻作變天據姚信作典體據桓元明僧紹作仁據郭京作不動說卦據郭京作居之據王大古巽為手艮為股據俞琰坤為衲據干寳震為驤據鄭虞周禮車人作宣髪據俞琰離冐下從目據爾雅朱子發艮作豹據鄭氏作黚兊據鄭氏魯詩羊作陽九家震依吴氏玉作圭鵠作鶴巽據吴氏鸛作鴻艮據吴氏狐作豹兊據宋衷常作虎雜卦據孫奕示兒編明夷誅作昩據朱義大壯止作已仝上證音三十八卦遺八音乾據項平甫時舍之舍去讀蒙據王晦叔為寇之為去讀需據鄭氏位乎之位音涖據荀爽雖不當位之當以平聲讀否據俞氏正當之當平讀隨據何氏告蒙約舍音捨蠱據俞氏先後皆去聲觀據陸德明彖辭傳觀平讀者二爻平讀者五去讀者一噬嗑據何氏告蒙約不當得當俱平讀剝據俞氏易剥也之剥音撲大畜據俞氏上從上聲讀據陸氏利己之已夷止讀暌據劉績惡人去讀家人據馬融假古雅反蹇據義當位依廣韻平讀解據卦義作上讀據釋文且乗之乗平讀姤據俞琰舍命之舎去讀升據陸氏亨于平讀井據程傳時舎上讀革據朱子發已者作紀讀震據荀氏作隊平讀歸妹據李氏當平讀豐據馬假作古雅反巽據陸俞先後俱去讀繋辭據孟喜霆音蜒讀據朱語類其要作平讀據吴幼清勞卦讀證句二十六卦遺五句坤據虞翻後得主為句履據俞琰視履為句考祥其旋為句否據俞琰以匪人不利為句據楊氏包承小人為句隨據爻辭象傳功也二字為句復據陸氏以剛反動為句无妄據簡氏以不耕不菑為句據王閏玉以物與為句大畜據鄭𤣥管輅日新絶句坎據象尊酒簋貳句明夷據項氏疾貞之貞自為句損據晁氏客語九二弗損句據舊讀及横渠或益之為句益據九五六三有孚句困據龍困而不失其所為句井據彖傳汔至亦未繘井為句旅據俞氏六三貞自為句據六二爻辭喪童僕貞為句兊據俞氏介讀為句渙據象傳渙其血為讀去逖出為讀无咎為句小過據王深甫胡一桂九三弗過為句據俞琰九四十四字七句繋辭據漢書及說文其稱名也雜為句證脫字七十九卦遺四脫字謙據說苑有終下脫吉字賁據郭京天文下脫剛柔交錯四字咸據荀卿咸感下脫以髙下下四字蹇據鄭氏宜待下脫時字解據李鼎祚彖傳其來復上脫無所往三字井據郭京徐氏王昭素彖傳不改井下脫无䘮无得往來井井八字漸據郭京俗上脫風字歸妹據陸氏所下脫以字豐據九四傳行也上脫志以二字巽據郭晁何申命下脫命乃行也四字渙據郭京乗木上脫利貞二字小過據郭京是以下脫可字繫辭據虞翻是故吉㓙下脫悔吝二字據荀恱漢紀蔡氏立成器下脫象字據漢藝文志弦木上脫古者二字據范不威下脫小字不懲下脫大字序卦㨿郭京蒙也上脫蒙字比也上脫親字據王弼畧例履下脫履者禮也四字據一行易纂可觀上脫隂陽養萬物必訟而成之君臣養萬民亦訟而成之二十字據王昭素麗也下脫麗必有所感故受之以咸咸者感也十四字雜卦據荀本多故下脫也字證衍文三十卦遺五衍文觀據陸晁衍以字離據卦體中下衍正字據古文鄭薛晁不嗟下衍㓙字夬據宋咸本未光上衍中字萃據陸朱末光上衍志字鼎據郭京上帝下衍而大亨三字艮據朱語録中正之正羨文豐據說苑人乎下衍而况於鬼神乎六字旅據石磵易衍下小亨二字渙渙王居之渙衍中孚據郭京信及下衍豚魚二字小過據俞氏吉上衍大字據郭京小事下衍吉字繫辭據郭京吕氏事業下衍是故夫象四字據王弼畧例研諸下衍侯之二字序卦據鄭氏履下衍而泰二字證誤今移置三十二小過據程傳有飛鳥之象焉誤入彖傳咸據荀卿男下女上柔上而剛下之繋辭據班氏程朱天一二十字改韓康伯本移天數上據朱義天數五四十四字改韓康伯本移大衍上據俞琰是故易者象也三十五字移取夬之下十六卦十八爻據吴幼清以上下經序卦之次定其先後為諸爻文言以上繋否九五繼坤卦文言後為次一同人九五為次二大有上九為次三謙九三為次四豫六二為次五噬嗑初九為次六上九為次七復初九為次八大過初六為次九上經八卦九爻正其次者一取於下繋者五咸九四次十解六三次十一上六次十二損六三次十三益上九次十四困六三次十五鼎九四次十六節初九次十七中孚九二次十八下經八卦九爻正其次者三取於上繫者三說卦據郭雍為曳移輿也下據郭雍多眚移心病下以巽離例為月依簡輔在為水之下雜卦據蔡氏頥養正也移大過顛也下既濟定也次之未濟男之窮也歸妹女之終也次之漸女歸待男行也次之姤遇也柔遇剛也次之夬决也剛决柔也君子道長小人道憂也次之舊以為誤今證還其舊三據李鼎祚乾九四重剛非衍據孔疏開而當名非誤據韓康伯其出入以度外内非脫舊分段不明今正之十傳附經一據俞氏君子以成德為行日可見之行也當分釋一日問先生子之取升陽子也以易為無不有而施由身始也今位諸畢簡何也曰漢儒言經而傳諸䜟希世之陋也吾敢也乎哉雖然猶班班乎錯出汰而未盡也孔竅其辭而括其密爾問曰程朱二先生何為不及象數也程先生陋漢儒而過者也朱先生有其意矣事無實證虚理易差先生常以詔門人故曰先見象數方說得理然而有所遺者將無待我後之人乎希聖造學禮侍先生曰日吾授朴也易盖至頥而悟古之學也蒙言養正而頥舉其功盖不出於言語飲食矣良知之法莫先於此矣故欲食則鮑魚不進能言則行人授辭然則象㫖増入乎曰古之教者引而不發三隅之反將在讀者乎問曰子言無象之象也于何而觀象乎曰古之人盖有矣不出牖窺天道古之人盖有矣曰不觀象則于何而自作元命乎古之人盖有矣先天而天弗違天且弗違是也是故移星易宿龍蛇起陸天反地覆者此夫宇宙在手萬化生心者耶又何觀也曰子謂古人也者古何人也曰聖而不可知之神也夫神與聖亦少異矣故曰乃聖乃神混而一之儒者之過也鼓之舞之而後盡神周公之材藝孔子之多能鼓舞盡神者也故曰禹入聖域而不優混而一之儒者之過也周易象㫖决録原序伏羲作易始畫八卦有畫無文盖造化之影堪輿之鏡也其曰易者取諸廬􅫢􅫢之首日十二變象十二時易主變故取諸此卦字從圭圭有六十四撮卦亦六十有四故從圭從卜而曰卦曰爻者取諸囱文囱有六一囱六十四孔六囱則三百八十四孔故曰爻爻之字有效囱疏也文王繋卦下之辭曰彖取諸茅犀之牙利能㫁物彖者㫁也孔子作象傳象之名也取諸毛獸而意則想像也故曰易者象也象也者像也又曰立象以盡意又曰制噐尚象又曰象事知噐象也者吾夫子一言盡前聖易云卦云彖云爻云之㫖矣陸澄云易自商瞿之後雖有異家之學同以象數為宗王弼出而象之說􅀈矣李鼎祚云鄭康成多參天象王輔嗣全釋人事易道尚偏滯於天人哉宋世程氏之傳專主理義而朱子本義兼論象㫖其曰本義盖易本象數而兼理義學者廢一不可然而朱子精矣或尚猶頗有餘藴不能無望於後人之引伸觸類也吾友南沙熊子叔仁乃作周易象㫖一書兼採衆家之說而多象數為主亦北海考亭之遺意也既本易之藴而摧陷廓清焉而繼絶表微焉條入葉貫焉視房審權王應麟齊履謙鄭合沙可以分鑣並馳擇精語詳矣或曰今之易傳義之家已足何以復有異說乎是不然經猶正鵠也一人射之不若衆人射之有一之或中也若守師而固執舉一而廢百是漢人膏肓墨守之習宋代黄茅白葦之說也尚敢以望於通儒乎楚之確菴曽公以名進士出宰富順政成教興嘉此書而斥清俸攻諸梓余特為序而傳之嘉靖丁巳秋七月朔成都楊慎序過年十三所則受易通其讀其義稱程先生朱先生尚矣自惟闇愚繹所存典册鮮有啓悟者就易家私問之或說過閩人蔡清先生善為易購得其書其開陳宗義不及象也於是稍記疑者為贅言兄公安令伯乆見曰毋庸輕為之然不能忘也後十一年舉進士試當就讀中秘書欲因盡求諸易說忽罷去又時方尚文無有言學經者暇語山東李伯華伯華數能致予易說東海唐應德欲共求其義唐君意在自得不暇象也時時私草其事緒正之維揚葛子東雅所喜愜㑹辛丑謫入滇稍頓安寧楊君用修數語予當遂成書迺益考前聞精思其義加折衷焉經下輙申象㫖以通之而分註其所革除之語於下書迄就仲敬劉子以數相參伍具登紀之漢學官至博士得一經聚五經諸儒共讀求其詁以示不輕今文字模於科斗篆籕者轉而傳訛不啻數變劉向以中古文易校施孟梁丘經許慎說文稱孟氏易其文多異矣至蜀李譔又嘗著古文易盖其慎也今乃尠傳者於是以象為主據他書以證今文合象則從焉證字者一百一漢校經者不去本字今則之稱某當作某晁氏經有齊楚異音俞氏曰東原之人入則去讀發叶大害實叶巽順極叶正有魯音據孔子魯人則晁氏說疎矣證音者三十八易文古奥無助一辭間若可上下讀後人不省其指歸妄意不得其讀矣證句者二十六傳言劉向以中古文校施孟梁丘或脫去无咎字唯費氏與古文合按史記秦焚書周易獨以卜筮存漢募書易獨完說文序曰其稱易孟氏皆古文何子元謂古文不知誰氏傳者何耶證脫字者七十九證衍文者三十彖象文言附入卦中錯簡不能無誤應移置者三十二舊以為誤今證還其舊者三舊分段不明今正之十傳附經者一餘皆如乾坤不復還舊以省兩讀大抵如費直易而已意主明象可得畧者因畧焉嵗辛亥書成定著都為三卷而各從類標之曰易象㫖後遂加决録名之義迺私竊取矣過自序曰易之始終獨有象爾學者猥稱畫前易豈非祇以為異哉昔者聖人類萬物之情象其物宜物有萬不出陽物隂物竒偶之畫也是謂儀象故生八卦以象吉㓙是故易者象也八卦成列象在其中奚啻天地風雷山澤水火哉即隂陽消長盛衰之間觀其所乗而吉㓙大業莫能違也樸斵風漓後聖乃廣為之象以開物開而正名當物因其自然故曰象者像也象有數故曰極其數遂定天下之象象有辭故曰彖者言乎其象聖人設卦觀象繋辭焉是數與辭皆出於象也辭有吉㓙悔吝皆謂之象吉㓙者失得之象也悔吝者憂虞之象也彖爻所同也四者不為象而為占何其不察聖人之言耶其所謂變化者進退之象也其所謂剛柔者晝夜之象也爻所獨也異哉後世之説曰此為象此為占既又曰戒占嘻亦已支矣或又曰此為意此為言為象為數豈不益甚哉昔韓宣子適魯見易象明古統彖爻為象也居則觀其象而玩其辭居則本卦不變言故曰所居而安者易之象古為象今為序繇字誤也動則觀變玩占動謂之卦故曰所變而玩爻之辭亦縁字誤轉變為樂矣得其不變者則占彖得其變者則占爻辭皆象也象皆占也占皆象也又可分象占哉有不得其說者則曰有占無象象在占中有象無占占在象中嘻支矣是故易非獨言與數其意亦皆生於象而已故得稱象之意象之言象之數書不能盡言言不能盡意立象盡意則辭可畧矣今夫象㫖者猶為因辭求象之道耳是故有一卦之象有一爻之象自其變者觀剥彖傳曰觀象觀也者觀卦也二陽之卦剥五所自變也一卦論變之例也蒙六五童蒙之吉順以巽也巽者巽卦也五變則上體巽一爻論變之例也在履而當夬位曰夬履在兊而當剝位曰孚剝否九五稱大人與乾同中孚九五稱孿孚與小畜同此四爻者皆曰位正當兼取兩卦相當之例也歸妹以恒用恒之道以初三易位者也乾九四乾之小畜小畜之中又有兊離故曰革是變之又變也萃六三上巽三五互一卦之例也泰六五歸妹中四爻互二體之例也雜物撰德非其中爻不備之謂也於是而正名百物亦足矣商瞿始受易孔子瞿所為學今即無知者史稱瞿後有數家皆以象數為宗而王同始為書丁寛服生皆著象數篇亦以費氏廢矣惜哉王弼尚名理隋興遂為中原師邢恕等益欲忘卦棄畫王濟有言弼所誤者多何能頓廢先儒濟言是矣然本先儒自淮南九師虞荀崔陸之徒煩瑣猥曲億而時獲非能盡合卦爻隂陽之義顔氏庭誥乃云馬陸得其象數此亦耳食何異李鼎祚集解及釋文詩二禮春秋義疏後漢書文選註康成說往往散見朱子發郭子和丁易東吴幼清及道家者流周易鈎深圗等世多傳有其書皆得失參半黄楚望最後出最以象學自名其言曰古者占筮書即卦爻取物類懸象虚其義以㫁吉㓙上古聖神所為自然之理也立辭者時取以明教九簭法亾簭人所掌者不復可見而象義遂不可復通如楚望言是古未嘗無類例矣今沿辭而求翼說廣八卦之象具在在學者引信觸類耳雙湖胡氏乃云孔子取八卦象有括文王周公彖爻例者有自括大象例者又有於說卦别取者胡氏於象豈可謂㑹通於簭人所掌之遺乎若楚望象外之象竊意謂隂陽盛衰即所乗而生大業者本無言之易盖今象之源亦時露其微不欲比同而語使讀者更増塗轍程朱易學官盛行童而習之當二先生時其為工力深矣要其舍象非易之全也豈惟非易之全將使人如燕相說郢書者矣故在讀焉而擇之或曰象一定則裁成何寓哉曰天人一也鄭顓天王乃顓人學徒病之乆矣有能類萬物之情㑹其一源出入以度外内使知懼者是易之道斯其為已易也道術裂百家出多縁起於隂陽可推而通易為無害也者與始近而末遂逺者亦間附焉以見易藴猶曰在學者引信觸類以辯之耳乃若道噐太極說有不同古先者約文申奥據易證焉庶明達省之有以相發其要不越於類物之情象其物宜云爾其升陽子數四則本易外别傳然道貫物我施由身始亦不可廢也援類例推而麗之共諸里師具訓蒙士有罪我者期其諒只若俟來今以求知則黙而成之非夫古人其孰能獲我心者乎嘉靖辛亥二月後學蜀人南沙熊過叔仁序
