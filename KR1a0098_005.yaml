body:
  text: 周易象旨決録卷五明熊過撰繫辭葉正則曰學者於孔氏易之成書無所得惟大傳以下之為信雖非淫誣幻怪者然依於神以夸其表耀於文以逞其流於易之道猶曰出入焉於是釐拆其大旨決哉葉氏因歐陽氏而更張大之吾何敢哉吾所不能無疑者乃在序卦韓康伯曰序卦非易之藴橫渠張先生晦菴朱先生皆謂非易之精不謂非其藴也天尊地卑乾坤定矣卑髙以陳貴賤位矣動靜有常剛柔斷矣方以類聚物以羣分吉凶生矣在天成象在地成形變化見矣天尊地卑何以定乾坤太卜三易之法其經卦皆八其别皆六十四然連山首艮歸藏首坤惟周易先乾後坤因於天尊地卑之分也自荀爽以否卦立義郭雍而下無議矣鈎深圖曰自一至十天尊於上地卑於下祗以異耳卑何以先髙史氏曰卦畫自下之序也動靜何以斷剛柔剛非不靜其常在動柔非不動其常在靜斷者虞翻云分也置陰陽言剛柔俞氏琰曰質可見氣不可見也龔氏曰坎在北震在東西北則乾東北則艮皆陽也離在南兌在西東南則巽西南則坤皆陰也各以其所居之方此之謂類聚陽物也而與陽為羣陰物也而與陰為羣各以其所名之物此之謂羣分方其各止於一而不相與則無失無得貞而已矣或類聚或羣分則得失隨之此吉凶所以因其動而生以為得失之報也方曰事情所向物曰事物善惡以言乎陰陽實體則朱先生未若龔氏之切乎九師曰姤卦陽爻聚於午為類聚復卦陰爻羣於子為羣分虞翻曰乾生故吉坤殺故凶之數言皆非也在天成象按虞翻説曰震象出庚兌象見丁乾象盈甲巽象伏辛艮象消丙坤象喪乙坎象流戊離象就已於文日月為易虞説當是輔嗣注以為况日月星辰非也在地成形震竹巽木坎水離火艮山兌澤乾金坤土也物極謂之變變然後成象物生謂之化化然後成形天地一物也陰陽一氣也在云者明其一也朱子發曰乾坤貴賤兩者聖人觀天地而畫卦剛柔吉凶變化三者聖人觀萬物而生爻是故剛柔相摩八卦相蕩鼓之以雷霆潤之以風雨日月運行一寒一暑是故接上以起下之辭剛柔謂爻畫竒耦也馬融云摩切也蕩除也剛摩柔為震坎艮柔摩剛為巽離兌虞翻謂剛柔相摩則八卦相蕩者是也其言二摩四四摩八八蕩六十四揆之上下起接不屬矣然則八卦之蕩奈何胡瑗言一陽生則推去一陰一陰生則推去一陽頗為近之然蕩陰入陽蕩陽入陰京房義精矣此言夫天道卦象之流行非以畫卦也録其事故下遂以雷電風雨繼之鼓之以雷霆雷震也霆離也蜀才疑霆為電淮南子曰陰陽相薄為雷激而為霆孟云音霆則為雷音蜓則為電春秋榖梁稱電為霆是也風巽雨坎吳幼清曰羲皇卦圖左起震而次以離鼓以雷霆右起巽而次以坎潤以風雨也潤依樂記作奮陳騤文則曰氣和潤生非也運行寒暑五經通義云日在牽牛則寒在東井則暑吳幼清曰艮山在西北嚴凝之方為寒兌澤在東南為暑左離次以兑者日之運行而為暑右坎次以艮者月之運行為寒也修江王玠曰吸神觀心煉精化氣逆上泥丸即鼓以雷霆槖籥動浩氣沖虛通身發汗即潤以風雨水上升火下降即日月運行進陽火退陰符即一寒一暑乾道成男坤道成女乾知大始坤作成物乾以易知坤以簡能乾交坤而震坎艮得乾道成男坤交乾而巽離兑得坤道成女乾男為父者以其始物之氣坤女為母者以其成物之質易象數鉤深圖曰一陽生於子乾位在西北居子之前故知大始一陰生於午而坤位西南作於申成於酉故曰作成物皇極通變以為乾位在亥知大始坤位在未作成物文王後天之用二説相通也乾以易知坤以簡能姚信朝説之皆曰能當作從葉正則謂健順所以為易簡是也乃又自疑健順不足以盡乾坤至并疑成男成女之説則滋惑矣易則易知簡則易從易知則有親易從則有功有親則可久有功則可大可久則賢人之德可大則賢人之業易簡而天下之理得矣天下之理得而成位乎其中矣可久可大與盛德大業無異也而稱賢人者項氏曰明乾坤之德業人皆可充而至吳幼清指為賢人别曰易簡理得者聖人也殆不然乎湛子曰理一而已易簡非二體久大非二功德業非二事以其類而分言之耳成位乎其中荀爽曰陽位成於五陰位成於二五為上中二為下中蓋緣馬融本而誤融本作易成位乎中非也朱先生謂與天地參是已證音據穀梁及孟氏霆音蜓證字據樂記潤作奮姚信朝説之能作從右第一章言作易之本聖人設卦觀象繫辭焉而明吉凶剛柔相推而生變化聖人設卦觀象而明吉凶言卦之貞虞本吉凶下有悔吝字剛柔相推而生變化言卦之悔剛柔兩盛則為摩剛柔迭勝則為推也朱子分設卦觀象者羲易繫彖辭者文易然生變化而有爻辭亦文易耳謂周公之易非也易乾鑿度曰陰陽有盛衰人道有得失聖人因其象隨其變為之設卦方盛則託吉將衰則寄凶陰陽不正皆為失位其應實而有之皆失義善雖微細必見吉端惡雖纖芥必有悔吝所以極天地之變明王事也是故吉凶者失得之象也悔吝者憂虞之象也變化者進退之象也剛柔者晝夜之象也六爻之動三極之道也易言吉凶在人為得失之象易言悔吝在人為憂虞之象楊用修云虞與憂對當讀如歡虞之虞言樂也柔變為剛進之象剛化為柔退之象剛屬陽明晝象柔屬陰暗夜象吉凶失得悔吝憂虞之象即剛柔相推之變未始一也變化進退剛柔晝夜之象即剛柔屈信之交未始非一也吳幼清専指爻辭者非蘇氏曰變化生而吉凶之理無定不知變化而一之以為無定而兩之此二者皆過也聖人以進退觀變化以晝夜觀剛柔二觀立無往而不一也極陸德明訓至是也爻不極則不動二老變二少不變也然則六位而配三極者何也十有八變而成卦每爻正得三變其曰極者猶所謂道有變動故曰爻也朱子發引震之究為健巽之究為躁欲以例餘卦而曰一生二二生三以三為易之貞數非此章本旨馬融指三統於爻位無當如鄭韓三才王肅陰陽剛柔仁義之説也則聖人何以稱爻動乎蘇氏曰未極則為三既極則動動則為六三六無異道也如蘇氏則必讀動為重乎是故君子所居而安者易之序也所樂而玩者爻之辭也序依虞翻本作象樂依虞翻本作變葉氏曰謂易有成序君子之所當居則泛濫而無擇謂君子於易有當居之序則移徙而難常疑之是矣不知字誤也按虞翻曰舊讀象誤作厚或誤作序樂作變云舊作樂者誤與下文觀象觀變義應得之是故君子居則觀其象而玩其辭動則觀其變而玩其占是以自天祐之吉無不利也居指本卦動指之卦右第二章言繫辭之卦證字據虞翻本吉凶下有悔吝字據虞翻本易之序作象字據虞翻本樂而玩作變而玩彖者言乎象者也爻者言乎變者也吉凶者言乎其失得也悔吝者言乎其小疵也無咎者善補過也彖言象即設卦觀象也爻因揲蓍之變即剛柔相推而生也説文曰豕走之謂彖字從勻音計彚頭也象其鋭而上見比諸卦辭列於爻上彖者蘇氏謂彖豕羅泌曰茅犀名豨神者彖犀形獨角知幾知祥彖蓋取於幾非也或謂彖六牙象有六爻之意亦非也爻木經云交疏之窗蘇謂折爼要之彖爻物形字義或偶參同矣然聖人奚瑣瑣焉剽模哉大傳言材效動已明之矣蔓説枝辭胡為哉補過稱善善言相近而誤從劉績作言是故列貴賤者存乎位齊小大者存乎卦辨吉凶者存乎辭憂悔吝者存乎介震無咎者存乎悔是故卦有小大辭有險易辭也者各指其所之陰陽各有所統御謂之齊陽大陰小陰卦多陽陽卦多陰辭専取主爻陽大陰小語其常分耳當其為卦主則無異也五存者應五言而為文卦有小大辭有險易俞氏曰卦以陽爻之大者為主則其辭平易如復謙之類卦以陰爻之小者為主則其辭艱險如小畜夬之類各指其所之漢上朱氏曰之者動爻虛齋趙氏曰之變卦也言本爻之辭正指之卦之義右第三章此承上章釋彖爻繫辭之旨證字據劉績本及本章上文善字例作言易與天地凖故能彌綸天地之道謂聖人凖天地作易也吳幼清曰彌如開弓愈開愈滿綸如合繩漸合漸大充而廣之與天地一道其言似矣然彌本弛弓以為張弓斯害也已曷不曰彌如弛弓反之愈合乎蓋彌以反本言綸以致用言也仰以觀於天文俯以察於地理是故知幽明之故原始反終故知死生之説精氣為物遊魂為變是故知鬼神之情狀此皆聖人用易彌綸之事以者用易也故幽明始終鬼神皆就易言之原始反終依鄭虞本當讀原始及終若曰推原其始則知未來反摺其終則知已往又或以為於其終而反求其始則固已辭費矣朱子發曰一變者卦之始也謂之一世六變者卦之終也謂之遊魂七變而反者卦體復也謂之歸魂始者生也終者死也反則死而復生故知此則知死生之説其以初上為始終而始終為生死是也其指六爻之變而謂遊魂歸魂者非也物者陰物陽物蓋爻也變者用九用六也少陰少陽伸者為神老陰老陽屈者為鬼張子有言精氣自無而有故顯而為物遊魂自有而無故隱而為變鄭玄曰精氣為物者七八遊魂為變者九六皆是也然曰木火用事而物生金水用事而物變文義違反亦倐合遽離矣鮑景翔曰推幽明可以知死生推死生可以知鬼神吳幼清曰天地之道幽明之故皆言天地也而知幽明三言者即彌綸天地而申釋之死生之説鬼神之情狀皆言萬物也而知鬼神三言者即知死生而申釋之兩節各二句者言故兩節各三句者言是故申釋之意亦近之矣而不知幽明死生鬼神之指卦畫耳達其指一貫之學也乎與天地相似故不違知周乎萬物而道濟天下故不過旁行而不流樂天知命故不憂安土敦乎仁故能愛範圍天地之化而不過曲成萬物而不遺通乎晝夜之道而知故神無方而易無體謂易與天地兩相似也蓋天地一陰陽易之幽明死生鬼神亦莫非陰陽者聖人作易仰觀俯察而其故説情狀皆與天地之陰陽相似故天地不能違也鄭玄虞翻舊與鬼神情狀連解者非萬物者荀爽曰二篇之策萬有一千五百二十當萬物之數故曰知周萬物是也以萬有一千五百二十當萬物餘千五百二十不用者三之積而又虛其一顯仁藏用也天下者萬物之會顯仁藏用以濟之寧有過哉旁猶旁燭之旁非避礙之意不流依京房本作不留朱子發曰易之用者近是矣朱義行權守正非本旨也易旁行不流故玩辭者變通天道以知天命亦周物不憂似天也樂天依虞翻作變天安居易象是為安土安土則心存理得故亦道濟天下似地也變天知命則智迹泯安土敦仁則生意發天地萬物皆就易言之晝夜者剛柔之象剛或化柔柔或變剛陰中有陽陽中有陰貫通為一則不為變化之所亂而可以知範圍曲成之道矣神者何易之道也隨物而在故無方也何以為易理之變化也易何以無體變化故無體也葉少藴謂凡易見於有為者皆言用用之者體而易不以體對用故别而論之曰無體朝景迂云體用本乎釋氏聖人未嘗有體用並言者項氏玩辭曰三知者易之所知與天地凖也四故者易之所能與天地凖也範圍至無體三而者言彌綸之功也右第四章證字據鄭虞本反終作及終據京房本不流作不留據虞翻本樂天作變天一陰一陽之謂道言陰陽得中者為道也今夫聖人之明民示諸有而儒者之髙論乃欲引而淪諸無大傳云一陰一陽謂道矣今乃復云陰陽氣也其理則謂之道然則陰陽不足謂道乎易稱乾道稱坤道又稱乾陽物坤陰物以明陰陽即道道者所由之路陰陽即羣有之所由出入也今云然者豈非其誤解形下之器哉古老曰偏陰偏陽之謂疾此豈獨命家之説也陳氏新話云道在陰而隂得其一在陽而陽得其一當别説如仁知所見也繼之者善也成之者性也此明陰陽謂道之義繼指流行言萬物資始繼貞以元元為善長故曰繼善屬一陽之分貞而成終物各有則故曰成性屬一陰之分北溪陳氏曰繼成字與陰陽字應善性字與道字應為得經義而復云指氣指理則亦過矣近世敬軒薛氏之言亦出於此繼善者即性善意猶言吉之先見為良心之本體成性者即性相近意蓋有纍於氣之不中正者矣仁者見之謂之仁知者見之謂之知百姓日用而不知故君子之道鮮矣顯諸仁藏諸用鼓萬物而不與聖人同憂盛德大業至矣哉富有之謂大業日新之謂盛德仁知即性之成者人受天地之中以生仁知皆得其偏耳仁者見陽而不見陰知者見陰而不見陽非一陰一陽之道顯諸仁則不可固曰知藏諸用則不可固曰仁張文饒曰易明變六十四不變者八變者五十六體少用多以用為主因用以顯其體故曰顯諸仁暗變六十四變者八不變者五十六體多用少以體為主因體以藏其用故曰藏諸用見者為顯仁則用無非體不見者為藏用則體無非用邵氏經世之用即周易暗藏之數此言是矣然此承上言君子之道即一陰一陽之道耳非以卦變言也鼓萬物則顯仁不同憂則藏用是天地之德業也已富有者冒天下之道開物成務顯仁也日新者惟變所適根本盛大藏用也蘇氏曰我未嘗有即物而有日新者未嘗新吾心一也新者物耳此聖人之德業也已上陰陽自在天在人者言之生生之謂易成象之謂乾效法之謂坤極數知來之謂占通變之謂事此以易之陰陽言生生者生陰生陽也申一陰一陽謂道之意一陽生而成象之謂乾一陰生而效法之謂坤效法者依成象而代有終也成象為朕兆耳申繼善成性之意占者窮過扐之數遂知來物事則貫十有八變因變以成務矣吳幼清曰數者變之已成變者數之未定陰陽不測之謂神蓍初揲卦猶未成或陰或陽不為典要矧可度思故曰神語在俞琰劉績解此言乎陰陽之道用於蓍數也在天在人謂之道在易在占謂之神龔氏曰初言道以一陰一陽為宗中言易以乾坤為序未言神以陰陽不測為妙則易果道陰陽而為理氣之别者亦太刻畫矣業德易乾坤占事神是一陰一陽之道隨所在而得名者非二理也右第五章夫易廣矣大矣以言乎逺則不禦以言乎邇則靜而正以言乎天地之間則備矣易書廣大故為道亦廣大虞翻曰乾象動直故大坤形動闢故廣乾天高故不禦坤地靜而德方故正天地之間則備深居馮氏曰人事也屯蒙而下六十二卦也然則乾坤獨無人事乎哉夫乾其靜也専其動也直是以大生焉夫坤其靜也翕其動也闢是以廣生焉不雜故専俞氏曰乾畫竒而實不變則其靜也専變則其動也直直者坤之德坤畫偶而虛不變則其靜也翕變則其動也闢闢乃乾之德是也乾天道無所不包故大坤地道無所不受故廣然氣未嘗不貫是天地非二物廣大非二事也廣大配天地變通配四時陰陽之義配日月易簡之善配至德廣大配天地坤廣乾大也變通配四時虞翻曰變通趨時謂十二月消息蓋乾坤之變也陰陽配日月者荀爽曰乾舍於離配日而居坤舍於坎配月而居深居馮氏止以復臨明之湛子因曰陰陽交迭升降合日月往來代明恐與變通義復也蘇氏曰天地得其廣大四時得其變通日月得陰陽之義至德得其易簡之善明乾坤非専以為天地也右第六章誠齋楊氏曰此章言聖人所以贊易之道其極主於廣大之二言其原生於乾坤之二卦也子曰易其至矣乎夫易聖人所以崇德而廣業也知崇禮卑崇效天卑法地天地設位而易行乎其中矣成性存存道義之門稱道義之門明業由德廣也敬軒薛氏曰成性即天地存存即設位道義之門即易行其中天之生生不已理之生生不已也右第七章聖人有以見天下之賾而擬諸其形容象其物宜是故謂之象剛柔各有其體故曰形容聖人有以見天下之動而觀其會通以行其典禮繫辭焉以斷其吉凶是故謂之爻於衆理所聚而觀之求所通利而典禮行所謂擇乎中庸也言天下之至賾而不可惡也言天下之至動而不可亂也擬之而後言議之而後動擬議以成其變化鳴鶴在陰其子和之我有好爵吾與爾靡之子曰君子居其室出其言善則千里之外應之况其邇者乎居其室出其言不善則千里之外違之况其邇者乎言出乎身加乎民行發乎邇見乎逺言行君子之樞機樞機之發榮辱之主也言行君子之所以動天地也可不慎乎據吳幼清此下經中孚九二文言在節初九文言下第十八同人先號咷而後笑子曰君子之道或出或處或默或語二人同心其利斷金同心之言其臭如蘭據吳幼清此同人九五文言在否九五文言下第二初六藉用白茅無咎子曰苟錯諸地而可矣藉之用茅何咎之有慎之至也夫茅之為物薄而用可重也慎斯術也以往其無所失矣據吳幼清此大過初六文言在復初九文言下第九勞謙君子有終吉子曰勞而不伐有功而不德厚之至也語以其功下人者也德言盛禮言恭謙也者致恭以存其位者也據吳幼清此謙九三文言在大有上九文言下第四亢龍有悔子曰貴而無位髙而無民賢人在下位而無輔是以動而有悔也重出不出户庭無咎子曰亂之所生也則言語以為階君不密則失臣臣不密則失身幾事不密則害成是以君子慎密而不出也據吳幼清此下經節初九文言在鼐九四文言下第十七子曰作易者其知盜乎易曰負且乘致寇至負也者小人之事也乘也者君子之器也小人而乘君子之器盜思奪之矣上慢下暴盜思伐之矣慢藏誨盜冶容誨淫易曰負且乘致寇至盜之招也據吳幼清本此解六三文言在憧憧往來文言下第十一右第八章天一地二天三地四天五地六天七地八天九地十此二十字韓康伯本在夫易何為者也之上按班固律厯志在天數五上伊川同朱義遂移在此天數五地數五五位相得而各有合天數二十有五地數三十凡天地之數五十有五此所以成變化而行鬼神也此四十四字韓康伯本在再扐後挂之下朱義移置在此簡輔曰一二三四五生數也化之漸也當謂之變六七八九十成數也變之成也當謂之化不可以奇耦分也成變化者數也行鬼神指卜筮而言所以求數者也故下文遂以筮法言之大衍之數五十其用四十有九分而為二以象兩挂一以象三揲之以四以象四時歸竒於扐以象閏五嵗再閏故再扐而後挂大衍曷為不盡天地之數宋咸易難曰天地是自然之數大衍則推衍之數也衍數曷以用四十九劉仲敬為豫述邵先生之意曰小成之卦以六而變八大成之卦以三十六而變六十四蓋三十六者六六也然則天地之用極於六耳大衍用四十九其餘分七七之數也五者蓍之小衍故五十者蓍之大衍衍母之一數之所起故大衍五十之數虛其一而不用今為河圖衍母之説恐其不然張文饒云地之三數即是四用故四十八者在十六為三在十二為四也龔夬謂大衍之數五十總四十有九之成數又合而為一此蓍之體也其用四十有九自分而為二言此蓍之用也以蓍之體合蓍之用四十有九則五十也故一為虛數四十九為實數而一者四十九之所生也夬號傳邵學又别立意解何也此與王弼子夏傳太極不用之語何異耶京房説十日十二辰二十八宿其一不用者天之生數乾鑿度勦焉太極兩儀日月四時五行十二月二十四氣北辰馬融説也八卦各六爻加乾坤二用為五十乾初九勿用荀爽説也五行減五大衍又減一鄭玄説也五十有五減六以象六爻姚董説也李鼎祚附之斯六家者既牽合矣八卦陰陽配五十數艮三坎五震七乾九兑二離十巽八坤六餘其天一地四無所稟承崔憬説也而云八卦之外在衍之所不管斯則李氏所譏未免小疵談何容易關朗曰蓍以五行運於中大耦而言則五十小奇而言則五五十五者奇耦小大具言之耳舉大而去小盈奇而虛耦則小奇之五大耦之一皆盈而不用蓋以歲閏明焉舍卦而逺取義於日月虛盈入有去無之間寧足謂本實乎關蓋因歸奇之語而誤者鄭武子揲蓍古法云大衍不盡天地五十五數蓋太極生兩儀兩儀生四象四象生八卦所衍數不及五於五十中虛一不用也説者曰太極生兩儀則陽一陰二衍而為三兩儀生四象則太陽一少陰二少陽三太陰四衍而為十四象生八卦則乾一兑二離三震四巽五坎六艮七坤八衍而為三十六通太極之一兩儀之三四象之十八卦之三十六則其數五十然其歷數兩儀四象八卦皆連本數則已復矣吳幼清言天地數共十而起於一其對為二一參之為三兩儀之為四有一二三四而十數具四者正位十者積數以正位之四衍積數之十每一加算以四謂之衍如數家因法焉即天地數本一支四之推故自一而衍四至四而衍十總得五十既曰本一支四則五矣又曰大衍之母至四而具亦若湊合哉劉用熙吕仲木直謂地不可過天五十數方去一圓而為用則亦疑迂逺矯強矣挂一以象三俞氏曰於所分右邊蓍中取一蓍懸於前鼎立而為三也舊法挂於小指間則與扐同矣既有中指兩扐又加以小指則為五扐是五嵗之中乃有三閏矣蓋挂自挂扐自扐詎可以在前之挂雜於指間之扐哉再扐而後挂不言揲而獨言挂者以明十有八變皆當挂張文饒皇極通變云雖名挂一然三揲實挂者三俞氏説蓋本是矣先儒有謂二變三變不挂者雖初揲五與九再揲四與八其數亦同然其三變之餘為老陽少陰皆二十七為少陽者九為老陰者一其於陰陽多寡既已乖戾而所謂老陰蓋絶無僅有若用三變皆挂之説則六十四變而為老陽者十二為少陰者二十八為少陽者二十為老陰者四老則陽多而陰少少則陽少而陰多然而陰陽之變皆三十二而其數適平以此論之三變皆當挂一除去三蓍在蓍總數其策九千二百一十六者存坎離乾坤所得之本數也吳幼清曰五年之間置閏者再故以挂一揲右揲左象不閏之嵗三初扐再扐象有閏之嵗二再扐而後挂言第一變再扐畢則第二變又挂一第二變再扐畢則三變又挂一也後挂陸氏曰京作挂再扐而後布挂京陸皆失兹義矣葉正則曰易之始有三而已自然而成八有六而已自然而成六十四一成一反象類曉然而名義出焉非四十九所能用非挂非扐非再扐所能通也然則自乾而至未濟皆已具矣已具則必有起數故筮人自是以起之云得某爻當成某卦某爻當變變當之某卦而已此易之淺事也易立在先卦起在後今傳之言者是是不知易之所成而即筮人之所起為易無惑乎是之不章也又謂象三才四時一閏再閏愈淺未矣以為筮人之所起是也而遂以淺未不求其説亦過矣乾之策二百一十有六坤之策百四十有四凡三百有六十當期之日二篇之策萬有一千五百二十當萬物之數也乾坤二篇九六之策韓康伯謂三十六策四分之而九二十四策四分之而六皆取過揲若得五八八或九四八通計二十一則過揲得四七二十八亦乾策也若得九與四四或五與四八通計一十七則過揲得四八三十二亦坤策也合十八變乾坤之策亦三百六十若併七八九六為三十以因乾坤十二爻亦為三百六十蓋天有四時時有四月月有四十者得六百四十以應卦天地之全數也時去一月月去十日藏其體而存用正得三百六十之數耳又以十計之陽常盈於數得六故二百一十六隂常乏於數得四故百四十四四其四而得一百二十合為三百六十其以四乘者隂陽太少無出於四故三百六十者首元之嵗數也然陽數於三百六十上盈嵗太陽也故三百六空空空空七七七七不盡之積首嵗所長約為三釐三六故首運平法長二十八刻加一倍法為消長蓋三百六空空空空七七七七不盡之積積八百八十餘而得今元今之嵗實乃有三百六十五日二四二五之數也引而後之極於三百六十六則又馴得首元之數然則三百六十者聖人舉大數置餘分不言實非三百六十也故會之卦六世弱運之卦六嵗弱運世嵗日月時皆然關朗曰日月軌度積於餘分六十出六以六五行所以成閏三百六十者嵗功之用竒六者虛一之義生於一成於六一六相虛二五為用自然之道也聖人立策衍數必舉其三兩於六行於五合於十推萬而變無出乎此蓋一五而變七十二候二五而變三十六旬三五而變二十四氣凡三百六十五周而復始不周於六而周於五關氏豈不大謬哉萬物之生數一十三萬八千二百四十分不滿二千八百八十者通閏之數止於是也萬有一千五百二十者一月生物八八相索之數也張文饒謂天用元之一者殆指此為一會之數乎道樞易成子每刻得一百五十息十二時共得一萬一千五百二十息之凖當别詮也是故四營而成易十有八變而成卦八卦而小成引而伸之觸類而長之天下之能事畢矣顯道神德行是故可與酬酢可與佑神矣子曰知變化之道者其知神之所為乎四營成易童溪王氏曰營求也用蓍之法以四而揲之成易之數以四而成之正義因陸績舊説云四度經營蓍策乃成易之一變朱先生祖其説曰分二挂一揲四歸竒誤也若如陸績之舊則歸竒於扐者再併分二挂一揲四是為五營矣豈得謂為四哉十有八變而成卦八卦而小成唐一行之學曰十有八變之間有八卦焉變之扐有多少其一變也不五則九其二與三也不四則八八與九為多五與四為少少多者竒耦之數也三變皆少則乾之象也乾所以為老陽而四數其餘得九故以九名之三變皆多則坤之象也坤所以為老陰四數其餘得六故以六名之三變而少者一則震坎艮之數也震坎艮所以為少陽而四數其餘得七故以七名之三變而多者一則巽離兑之象也巽離兑所以為少陰而四數其餘得八故以八名之故七八九六者因餘數以明陰陽而陰陽之所以為老少者不在是而在乎三變之間八卦之象也然豫常括之凡蓍四揲之九揲而得三十六為老陽八揲得三十二為少陰七揲得二十八為少陽六揲得二十四為老陰皆可通也唐六典易策四十九其變四單拆交重十八而成卦內貞朝占用外悔暮占用法異古矣八者天地之體故小成之卦八大成之卦八八也天地之用六故爻止於六六十卦除四正體卦六六三百六也而策亦極於三百六所以象之也今曰四千九十六卦則仍焦氏臆見而不察於自然之數矣豈不贅哉卦立則道見卦用則德行神妙變指陽化指陰爻者卦畫自然之妙用也吳幼清曰自大衍至能事畢言蓍變之神顯道佑神言蓍占之神凡此皆神之所為然變占者惟陰陽三畫而已即天地陰陽之變化也崔子鍾曰舊以五行釋變化者荒誕無稽以屈伸釋鬼神者疏謬無據且無關於生蓍之義也右第九章易有聖人之道四焉以言者尚其辭彖辭以動者尚其變爻變以制器者尚其象卦象以卜筮者尚其占占辭是以君子將有為也將有行也問焉而以言其受命也如響無有逺近幽深遂知來物非天下之至精其孰能與於此參伍以變錯綜其數通其變遂成天地之文極其數遂定天下之象非天下之至變其孰能與於此參伍以變者四營也錯綜其數十有八變之事也通其變參伍之變也尚變之事極其數錯綜之數也尚象之事朱義有脫簡吳幼清曰參以變者初揲之餘左四右四再揲三揲之餘左四右三左三右四合挂一及左右之餘得九得八而為耦者凡三也伍以變謂初揲之餘左三右一左一右三左二右一再揲三揲之餘左二右一左一右二合挂一及左右之餘得五得四而為竒者凡五也通五之變五四皆為奇則參天而成天之文通參之變九八皆為耦則兩地而成地之文此尚變之事也每以三變挂扐之數錯而綜之究竟至窮盡則參參參凡九者十二定為乾之象參參兩凡八者十二為兑象參兩參凡八者十二為離象參兩兩為七者十二為震象兩參參為八者凡四為巽象兩參兩為七者四為坎象兩兩參為七者四為艮象兩兩兩為六者四為坤象定此六十四象與重卦六十四之數相符觀之可以制器三句尚象者也朱先生曰三數之五數之既而曰揲蓍本無三數五數之法交互參考而已俞氏從而附之曰參伍非數不過以分挂揲扐之餘數驗過揲之正數參雜也伍辟諸行伍之成列也一以為初揲一以為過揲小變其説參伍皆不為數而義終晦陸子靜雜著三者變數之始五者變終又為虛數而未切朱子發曰三畫之卦三變而反六畫之卦三變而通陳髙因例以乾坎演説之曰乾一變為兑再為震為坤為坎為巽為艮七則為離坎一變為巽再為艮為離為乾為兑為震七則為坤皆參以變反復乎三畫乾一變為姤再為遁為否為觀為剝為晉為大有坎一變為節再為屯為既濟為革為豐為明夷為師皆五以變反復乎六畫然曰八卦天其變上而下重卦人其變下而上張文饒頗有斯意豫疑其矯強至曰天道尚變固無不變者人道體常上爻不變猶大衍虛一則辭益費且支矣一病一瘳孰甚乎夫參伍變之所生也故文曰以不曰其以本用辭其即事辭不正其稱即事辭故從用為義謂用此數以成卦變通數者又或以洛書縱橫皆三五論之蘇氏謂九宫緯書不經見雖異一行學而不可廢虞翻解則曰逆上稱錯綜理也謂五歲再閏再扐後挂以成一爻之變而倚六畫數卦從下升故錯綜其數則參天兩地而倚數也虞蓋通數再扐挂為三以五歲再閏為五猶未章明也夫吳説可謂明暢矣然不察一變十有八變之别而謂三變挂推之數是幼清亦未能引伸乎易無思也無為也寂然不動感而遂通天下之故非天下之至神其孰能與於此朱先生曰無思無為寂然不動者言在册象在畫蓍在櫝而變未形也至於玩辭觀象揲蓍以變則感而遂通天下之故矣夫易聖人所以極深而研幾也唯深也故能通天下之志唯幾也故能成天下之務唯神也故不疾而速不行而至子曰易有聖人之道四焉者此之謂也右第十章子曰夫易何為者也夫易開物成務冒天下之道如斯而已者也是故聖人以通天下之志以定天下之業以斷天下之疑龔深甫曰易開物也故以通天下之志易成務也故以定天下之業易冒天下之道故以斷天下之疑以者用也用易也是故蓍之德圓而神卦之德方以知六爻之義易以貢聖人以此洗心退藏於密吉凶與民同患神以知來知以藏往其孰能與於此哉古之聰明睿知神武而不殺者夫是以明於天之道而察於民之故是興神物以前民用聖人以此齊戒以神明其德夫蓍數七七四十九象陽圓變通不定可知來物卦數八八六十四象陰方爻位有分可藏往事易變也張氏曰圓神故能通志方知故能定業易貢故能斷疑洗心猶春秋傳灑濯其心之意聖人體具三者而開物成務韓康伯關朗言洗濯物心使人無所瀆汙藏晦於密無所間然密猶言未始出吾宗也以此洗心則無思以此藏密則無為矣陸績謂受龜蓍之報應決而藏之於心殆淺見也吉凶與民同患者指聖人作易初志而言知來以神者蓍之神藏往以知者卦之知以吉凶未至之事已定之理言之關朗曰知之可及藏之不可及非也洗心則志通同患則業定知來藏往則疑斷神武不殺者蓋得其理而不假其物之義言聖人之資耳明天道以興神物察民故而開其先有思則與物雜故齋以齋之有為則與物敵故戒以警之醫書言洗心日齋防患日戒薛河東取之為此也龔氏曰齋可入而致一故德神戒可出而蒞衆故聽明吳幼清曰天道謂卦之知其德即上蓍卦之德也神而明之在乎聖人不然則枯草朽莖何神物之有是故闔户謂之坤闢户謂之乾一闔一闢謂之變往來不窮謂之通見乃謂之象形乃謂之器制而用之謂之法利用出入民咸用之謂之神户一也闔闢之則二陰陽之動靜亦一氣耳蔡介夫謂闔户之坤統言則為陰靜分陰陽而言則乾之靜専坤之靜翕也闢户之乾統言則為陽動分陰陽而言則乾之動直坤之動闢是也變者動靜相生郭子和謂能闢又能闔也通者闔闢不已也象謂知大始器謂作成物法者聖人成能神者百姓與能也蘇氏曰闔闢之間二物出焉故變者兩之通者一之茍不能一則往者窮於伸來者窮於屈矣是故易有太極是生兩儀兩儀生四象四象生八卦易何以有太極乾鑿度孔子曰易始於太極太極分而為二故生天地此緯書也猶周官辟名之書與實不應者而後儒紛紛為之解至朱先生曰易者陰陽之變太極者其理也夫正明目而視之盈天地者氣而已故曰一陰一陽之謂道又曰立天之道曰陰與陽今求之浚深有塞焉者有帥焉者茍焉以離經為學者歟夫陰陽謂分所謂易也一動一靜之間者也一靜一動之間者也中也所謂一陰一陽之道也陰趨於太極則生陽陽趨於太極則生陰相迭為用運而不積者屈信相感之自然也故極也者即周氏靜極動極之極猶言太過不以理訓也朱子發曰太極動而生陽陽極動而生陰陰極復動而生陽始動靜者少也極動靜者老也其為説似矣或疑陰陽變易類有一物主之者整菴羅氏以為不然是也既而曰易兩儀四象八卦之總名太極衆理之總名易有太極名萬殊原一本也則復仍舊貫矣而何以稱太生乎兩儀之生四象也四象之生八卦也皆太極之故也鍾離雲房曰陽到天而難升太極生陰陰到地而難入太極生陽斯所謂禮失而求諸野者乎張文饒曰乾為一太極也上爻當初變得二類為兩儀五爻當再變得四類為四象四爻當三變得八類為八象三爻當四變得十六類為十六象二爻當五變得三十二為三十象初爻當六變得六十四乃成六十四卦矣六十四卦實得八卦餘皆重卦也故曰易有太極是生兩儀兩儀生四象四象生八卦也自坤為一以當元氣其變亦然太極元氣天地之配也而以天主之言變卦而昧于生卦失本旨矣房氏傳云非有太極方有兩儀方有四象八卦又非有兩儀太極遁有四象兩儀亡有八卦四象隱也四象者孔氏謂金木水火莊氏謂實象假象義象用象劉牧既已譏之然曰五上駕天一而下生地六下駕地二而上生天七右駕天三而左生地八左駕地四而右生天九則又以河圖四十九數為二儀所生之象彼哉可謂斯言之玷矣朱先生主陰陽太少然乎哉八卦定吉凶吉凶生大業是故法象莫大乎天地變通莫大乎四時縣象著明莫大乎日月崇髙莫大乎冨貴備物致用立成器以為天下利莫大乎聖人探賾索隱鈎深致逺以定天下之吉凶成天下之亹亹者莫大乎蓍龜平菴項氏曰凡繫辭之稱八卦者即六十四卦也八卦更相上下為六十四卦故例以八卦稱之其言伏羲始作八卦者亦謂六十四卦也立下朱義疑有闕文蔡氏謂當有象字按荀悅漢紀作立象成器漢書翟方進傳又作立功據文義立象勝矣富貴聖人蓍龜而繼於天地四時日月之後何也蘇氏曰天地四時日月天事也天時所不及富貴者制之富貴者所不制聖人通之聖人所不通蓍龜決之是故天生神物聖人則之天地變化聖人效之天垂象見吉凶聖人象之河出圖洛出書聖人則之神物者何蓍龜也或曰蓍叢生百莖半之應大衍數五十龜背文段五兩旁各四周二十四腹十二應大衍用數四十九爻也者效也效天地之變化也象者像也不言而以象告也吳幼清曰效天地四時以畫乾坤震巽艮兌象日月以畫坎離亦多端矣乎羅泌路史真原賦廣成子以八卦鎮方籙及卜法授羲故或疑河圖亦人所授非也關朗曰五十五者為河圖四十五者為洛書劉牧兩易而朱震因之説者黨同非劉牧是關朗焉俞琰又異略曰四十五數者子華子大戴禮乾鑿度言之易不言蓋非易數也孔安國注洪範乃曰禹時神龜負文禹因第成九數禹貢但言導洛不言出書安國何據耶今觀易之圖書羲時具有也劉班皆循安國之説則羲時未有洛書不亦謬乎夫河圖洛書之有數安國之徒曷從而知之而圖之數十書之數九又果何所據耶書顧命曰天球河圖在東序河圖赤玉也河圖玉之有文洛書石之有文聖人則其文以畫卦耳無五十五與四十五之數也過按三墳書言伏羲三十二易草木草生月雨降日河泛時龍馬負圖始畫卦禮含文嘉云伏羲德洽上下天應以鳥獸文章地應以河圖洛書乃則象而作易又寰宇記伏羲於蔡水得龜因畫八卦有壇若是則豈必待圖書哉况觀取以通德類情大傳有明文也或曰鈎深圖河圖合四象之數可以定八方之位洛書有五行之數可以備八卦之象亦通易有四象所以示也繫辭焉所以告也定之以吉凶所以斷也易四象陰陽太少伏羲先天也繫辭而定吉凶則文王周公之易也橫渠謂吉凶變化進退剛柔為四象侯果指神物變化垂象圖書然不足稱象矣白雲郭氏以易有四象以下與前文不相屬又非别章疑其錯簡俞氏欲移於晝夜象也之下者非右第十一章脫簡據荀悅漢紀立下脫象字易曰自天祐之吉無不利子曰祐者助也天之所助者順也人之所助者信也履信思乎順又以尚賢也是以自天祐之吉無不利也據吳幼清此大有上九文言移在同人九五文言下第三郭白雲移憧憧往來之前非也子曰書不盡言言不盡意然則聖人之意其不可見乎子曰聖人立象以盡意設卦以盡情偽繫辭焉以盡其言變而通之以盡利鼓之舞之以盡神晉陽秋荀粲曰理之微者非物象所舉立象以盡意非通乎意外者也繫辭以盡言非言乎係表者也象外之意係表之言固緼而不出矣是其意欲忘象忘言矣其猶王弼之遺乎陰陽之老者必窮窮則變陸績曰變三百八十四爻使相交通以盡天下之利虞翻曰神易也陽息震為鼓陰消陽為舞故鼓之舞之以盡神盡利盡神則聖人之意寧復緼而不出哉朱義就事言者恐未盡也乾坤其易之緼邪乾坤成列而易立乎其中矣乾坤毁則無以見易易不可見則乾坤或幾乎息矣乾坤謂奇耦之畫緼謂其周流六虛俞氏曰乾坤緼於六十四卦之中非謂易緼於乾坤兩卦是也緼衣中絮胎也成列者二篇之策奇耦散布得三百八十四爻而本立吳氏獨指奇耦相對言非也易吳氏謂奇耦交相易者是謂兩儀一易成四象再易成八卦非也朱氏曰除日則無歲故乾坤毁則易不可見易不可見則乾為獨陽坤為獨陰生生之功息矣姚令威叢語吳天用所藏易書云乾坤毁無以見易乾坤有毁時故終之以未濟水災多在東南火災多在西北彼哉非正論也是故形而上者謂之道形而下者謂之器化而裁之謂之變推而行之謂之通舉而措之天下之民謂之事業是故者承上辭形即上文乾坤形上者乾坤所藴之易一陰一陽之謂道也形下者成列之乾坤也道可共繇而通所藴之易未定也器則方體不可易者裁猶除也自卦變言也陰陽之道以漸化其舊者而除去之乃卦之變推變者而行之所謂變則通也二用周流六虛占用其變也於是舉而措之天下矣自道而言謂之變通自器而言謂之事業今謂陰陽為形下而其理乃道者有遺論矣蘇氏曰道者器之上達器者道之下見其本一也化之者道也裁之者器也推而行之者一也龔夬謂形上即乾成象形下即坤效法以分道器誤矣然曰剛柔有體奇耦有數左右有方者形也形而上則為一陰一陽以至一剛一柔故謂之道形而下則為仁義為禮樂以分則有守以實則有名故謂之器愚謂循其言得陰陽謂道之義矣葉正則曰一陰一陽之謂道雖兼陰猶可言也若夫形上則無下而道愈隱夫道奚為不可兼陰耶形上下者發語如此辨而稱以喻諸人耳奚至於隱道耶乃知葉氏之語太過矣吕仲木曰易之事不過立象盡意繫辭盡言而已情偽皆出於意利神皆出於神故立乾坤之象立之意可盡繫乾坤之辭易之言可盡乾坤者包六十四卦而言也夫易在象外者也故形而上者謂之道言在象後者也故形而下者謂之器蓋仲木之所謂形亦即易象之著形者言之是故夫象聖人有以見天下之賾而擬諸其形容象其物宜是故謂之象聖人有以見天下之動而觀其會通以行其典禮繫辭焉以斷其吉凶是故謂之爻典禮依姚信本作典體會通典體體用之謂也既曰易無體矣又何以行其典體乎無體者著神變之妙典體者著天則之常是故夫象四字依郭京吕氏作衍文極天下之賾者存乎卦鼓天下之動者存乎辭化而裁之存乎變推而行之存乎通神而明之存乎其人默而成之不言而信存乎德行象者聖人立象盡意爻者聖人繫辭盡言欲明設卦盡情偽故又變象言卦賾形而上者動形而下者在卦變剛柔相推在卦通出入互用也象立可以盡其道之意繫辭可以盡其器之言變通神明學形上之道裁有定體行無定用皆所謂意德行則以學形下之器所謂言也不言乃所以盡言故曰不言而信也自形上而放諸事業由微而達於著也自至賾而極於德行由著而歸於微也體用一原顯微無間微矣哉右第十二章誠齋楊氏曰此章言聖人作易之意其散在六十四卦之爻象其聚在乾坤之二卦聖人用易之道其散在天下之事業其聚在一身之德行也證衍文據郭京吕氏本是故夫象四字衍文證誤據姚信本典禮作典體周易象指決録卷五
