body:
  text: 周易象㫖决録卷一明熊過撰上經分易為上下杜預左傳解序載汲冡古易與今正同然繋辭明稱二篇之策自郭白雲吕東萊胥知之所從來乆逺矣分經所繇孔頴達胡翼之晁以道皆謂竹簡重大分二篇焉今朱易本之若縁袠大則㫁自咸恒屬上而作三十二卦均分豈不可哉俞玉吾本邵子之意以覆體對體言之曰上經本十八卦反覆得三十卦下經亦十八卦反覆得三十四卦予深韙之盖嵗有四時時有四月月有四十日總之一嵗得十六月六百四十日者六十四卦之數也體數四而用者三時去一月月去十日故一嵗止十二月三百六十日是上經十八卦下經十八卦正變三十六之數也上經反覆不變者二十四為本而六為用下經反覆不變者三十二為本而二為用易乾鑿度孔子曰陽三隂四位之正也故易卦六十四分為上下而象隂陽也夫陽道純而竒故上篇三十所以象陽隂道不純而耦故下篇三十四所以法隂是殆有遺說乎學者察其原而聖人或㡬乎見其藴矣乾乾下乾上乾元亨利貞此繋卦之辭馮椅即以為彖辭是已初九潛龍勿用此繋爻之辭馮椅以為象是已九何以為老陽隂陽老少皆具十者也陽進隂退去其位太陽居一而用九又參天而三之數也僧一行曰乾所以為老陽而四數其餘得九故以九名之荀爽九家易解乾為龍沈麟士云假象陸德明云喻陽氣也易通卦騐曰立夏清風至而龍升天則初正其潛時也項氏玩辭以乾動自震始故不稱乾馬而稱震龍者非初九則曷為勿用以其時與位耳二見五飛皆初之潛者耳賈誼以為潛龍入而不能出誼非能識易者也九二見龍在田利見大人鄭康成曰二於三才為地道盖以六畫卦言之地上即田也陽大隂小故大謂九以三畫卦言二於三才為人道得稱大人矣九三君子終日乾乾夕惕若厲无咎以六畫卦言三於三才為人道有乾德而在人道君子之象也龍神不測而人跡可據三四皆明人故不言龍三變則二三四互成離日在下卦之終故曰終日下乾終而上乾繼故曰乾乾夕者日過中之時也九三重剛而不中之地也乾乾可矣而復夕惕過中之事也惕陸氏謂悚惕鄭𤣥曰懼也有所恐懼則累其本體不得正矣非謂地危抑心所謂危也淮南子曰終日乾乾以陽動也夕惕若厲以隂息也因日以動因夜以息惟有道者能之九三方為動心忍性之學而非无畔援歆羨之于物而不化也故厲厲說文作夤敬惕也无咎者操心危慮患深故達矣九四或躍在淵无咎躍廣雅云上也潛者至是躍上矣四變體巽進退躍象也干寶曰四以初為應淵為初九也守柔順則逆天人之應通權變則違經常之教聖人不得已而為之其辭疑矣其无咎者何也躍而在淵處卑而不犯上也九五飛龍在天利見大人六畫之卦五為天三畫之卦五為人蘇氏曰飛者龍之正行天者龍之正處九二者龍之安九五者龍之正也上九亢龍有悔爻止於六何也天之體數四而用者三地之體四而用者三凡天地之數六故爻止於六也亢吴幼清曰人之喉骨剛而在上者故剛而居髙曰亢用九見羣龍无首吉上以健極為成卦之主能用九者也故其象占如此羣龍謂潛見躍飛者凡卦以初為足以上為首臨川鄒湛曰自初至五皆以无首而吉上九則為首矣能見羣龍之无首而不敢為首故悔亡而反吉也今按易參同契云二用無爻位宋衷劉瓛誤因立論今歐陽朱氏實襲其說然九者老陽之數動之所占自崔憬發之非始歐陽矣栁子厚與劉禹錫論九六書祇稱韓氏亦未究其原大抵易惟六爻可以言占六爻之外不屬爻位不係占卜矣不因居卦之成而值爻上何得言羣龍无首且六爻皆變則是當占之卦何為又發此例哉昔王介甫常欲繋用九於亢龍下程先生不謂然也意或疑蔡墨語而實不然若六爻皆變而不占悔則六十四卦外應皆有辭而乾坤發凡起例不可通於他卦盖六十二卦之變視乾坤尤賾不可厭也何獨於乾坤發凡而遺六十二卦哉然則蔡墨已失易本意矣如鄒氏所演之言則介甫之意犂然經始可通參同所云為彼符火以言易固有礙矣代淵述先儒云諸爻龍皆賢人之象君能謙下納用則能見而為輔上九亢龍是下能用之者故因以為戒雖與鄒說小異而皆以用九繫亢龍之下况象傳大人造下直以用九繼之不言亢龍有悔文言明稱聖人知進退存亡於亢之下而不别衍用九之義則固以為一條矣或曰吴仁傑古易費直易也乾坤二用則覆畫六畫而繋以辭無二用九六等爻名以為自康成始然則去用九之文以從古而繋見羣龍无首於亢龍有悔之下可乎曰文言有其文不可去也楊敬仲曰居九而為九所用不能用九故至于亢居六而為六所用不能用六故至于戰識斯義也可以語易矣彖曰大哉乾元萬物資始乃統天雲行雨施品物流形據淳于俊對髙貴鄉公康成合彖象于經欲學者尋蔡墨已失易本意矣如鄒氏所演之言則介甫之意犂然經始可通參同所云為彼符火以言易固有礙矣代淵述先儒云諸爻龍皆賢人之象君能謙下納用則能見而為輔上九亢龍是下能用之者故因以為戒雖與鄒說小異而皆以用九繫亢龍之下况象傳大人造下直以用九繼之不言亢龍有悔文言明稱聖人知進退存亡於亢之下而不别衍用九之義則固以為一條矣或曰吴仁傑古易費直易也乾坤二用則覆畫六畫而繋以辭無二用九六等爻名以為自康成始然則去用九之文以從古而繋見羣龍无首於亢龍有悔之下可乎曰文言有其文不可去也楊敬仲曰居九而為九所用不能用九故至于亢居六而為六所用不能用六故至于戰識斯義也可以語易矣彖曰大哉乾元萬物資始乃統天雲行雨施品物流形據淳于俊對髙貴鄉公康成合彖象于經欲學者尋省易了盖縁馬融註周禮例省學者兩讀故連經文注之今主於明象不别為篇後倣此彖下脫傳字俱王弼誤加時脫馮椅并欲改為贊不須爾也俞玉吾曰元為稟氣之始未可區别故總曰萬亨則流動形見各有區别故特曰品節齋蔡氏曰雲行雨施亨見乎氣品物流形亨見乎形荀氏謂乾升於坤為雲行坤降於乾為雨施非也大明終始六位時成時乗六龍以御天終謂末爻始謂初爻也六位時成者六爻相雜惟其時物故言時大明重乾之終始以時淺深畫成六位六位諸卦所同六龍乾之所獨也聖人乗六陽深淺之時以行天道與天同一亨矣統者總治綱領御者分治條目故於元亨分言之荀爽曰乾起坎而終於離坤起離而終於坎非也此自言乾耳何為漫及坤與坎離哉程朱二先生以為元始貞終則又自四德言之與六位時成文不屬俞玉吾曰終謂九三下乾之終始謂九四上乾之始一乾方終一乾又始生意續而不絶故不曰始終而特曰終始夫俞氏以三四言終始若穩順矣但易繋明文初辭擬之卒成之終又曰原始要終以為質無以三四為終始者終始為初上可也乾道變化各正性命保合太和乃利貞乾道變化不常則性命各正不同天所賦曰命人所受曰性理一分殊夭夀賢愚之異也太和者性命之極至即利者義之和也保之不虧合之不散由是而為利貞在人則主静之學也首出庶物萬國咸寧象曰天行健君子以自强不息據費直易分書上下卦名於天行上象曰二字據俞琰係王弼加馮椅欲改作贊不須爾也健依晁氏作乾趙氏輯聞云集韻乾或作􅹧當是􅹧為健也淮古易象傳分為上下篇者是今主於明象未暇正也後倣此潛龍勿用陽在下也據吕汲公王原叔等分經合傳非古分三百八十四爻象為下卷者是今未暇正見龍在田德施普也終日乾乾反復道也反復者反而復諸道猶復卦反復其道游定夫謂讀如翻復者非也王弼曰居上不驕在下不憂雖本文言傳不知傳體演暢无咎義可究極小象止達乾乾之㫖不得以彼明此或躍在淵進无咎也飛龍在天大人造也亢龍有悔盈不可久也用九天德不可為首也用九者剛而能柔故為天德為首則不能用九矣宋衷曰用九六位皆九故曰見羣龍純陽則天德也萬物之始莫能先之不可為首先之者㓙隨之者吉說與朱義異矣俞玉吾曰用九乾六爻變則與不變異矣九雖天德既變則不可為首非謂乾不可為首也若謂乾不可為首則萬物何所資始而又誰為之首乎宋氏本未瑩俞氏通指六爻亦失本㫖以用九非乾德尤害義矣文言曰元者善之長也亨者嘉之㑹也利者義之和也貞者事之幹也君子體仁足以長人嘉㑹足以合禮利物足以和義貞固足以幹事君子行此四德者故曰乾元亨利貞文者文王言即彖爻之辭陸德明釋文梁武云文王所制是也俞玉吾疑之不知古本言下皆有傳字今脫此孔子傳述文王所言而推廣之故應稱傳也事之幹應事之本也初九潛龍勿用何謂也子曰龍德而隱者也不易乎世不成乎名遯世无悶不見是而无悶樂則行之憂則違之確乎其不可拔潛龍也歐陽氏疑此講師自為問荅之辭今按其義講師不能及苐子曰字其所加也易治也不求治世故遯世无悶言乎業也不求成名故不見是而无悶言乎其德也樂則行之所樂在於潛也行者行勿用之道而无悶也憂則違之所憂在於不潛也違者不易世不成名也初九行而未成既勿用矣若謂可而進難而避豈初之象㫖哉鄒謙之曰不見是其遯世也故其无悶尤難此以下申解爻之藴九二曰見龍在田利見大人何謂也子曰龍德而正中者也庸言之信庸行之謹閑邪存其誠善世而不伐德博而化易曰見龍在田利見大人君德也以下卦言初下三上而二正當其中曰正中非中正之謂也九二何以有邪以九居二非正二臣位而并稱君德俞氏以為人君之子未有君位而有君德者是也父子君臣之際亦難矣故善世而不伐德博而化此聖人所以處人情之極如所謂内文明而外柔順者矣吴幼清正中釋見田善世以下釋利見之意九三曰君子終日乾乾夕惕若厲无咎何謂也子曰君子進德修業忠信所以進德也修辭立其誠所以居業也知至至之可與㡬也知終終之可與存義也是故居上位而不驕在下位而不憂故乾乾因其時而惕雖危无咎矣三動約體互巽有進象體兊為辭修者修省非修飭也互離為知知至知終者知也至之終之者行也㡬動之微始條理之事致其良知而止至善研㡬之學也致其良能終條理之事集義之學也始終一知知行合也三居下之上有至義居下之終有終義故别而言之也以下體言三居上畫故曰上位以二體言三居下體故曰下位德進而已不有故不驕業修而上不忌故不憂九四曰或躍在淵无咎何謂也子曰上下无常非為邪也進退无恒非離羣也君子進德修業欲及時也故无咎唐孔氏曰上下據位進退據爻盖曰而重之故云然所謂乾道革也羣者下三陽也俞氏曰上進釋躍字下退釋在淵義无常无恒釋或義非為邪非離羣欲及時以申進无咎義九五曰飛龍在天利見大人何謂也子曰同聲相應同氣相求水流濕火就燥雲從龍風從虎聖人作而萬物覩本乎天者親上本乎地者親下則各從其類也升陽子援此明還丹之㫖今附録之見方技之始皆本於陽隂而用異矣二以陽居隂為虎之龍五以陽居陽為龍之龍皆大人故曰同以聲氣相求築基栽接舎濁求清也水濕火燥就近追鉛過鵲橋於元武追永以迎之也雲龍風虎二弦之氣明二為虎一隂一陽之謂道也親上親下進藥之象也華池神水首經至寳謂是矣上九曰亢龍有悔何謂也子曰貴而无位髙而无民賢人在下位而无輔是以動而有悔也位程先生謂尊位王弼以為无隂陽之位非也爻言悔孔子言動悔吉㓙悔吝生乎動不動則无悔矣潛龍勿用下也見龍在田時舎也項平甫舎讀去聲止也猶傳舎之舎謂龍初出潛時寓於此朱義未為時用則德施豈能普哉此以下申解爻藴之情終日乾乾行事也或躍在淵自試也俞氏曰試與月試之試同君子謹失時之戒欲自試其所學也飛龍在天上治也亢龍有悔窮之災也乾元用九天下治也體乾之元用乾之九不剛不柔敷政優游故治也潛龍勿用陽氣潛藏見龍在田天下文明終日乾乾與時偕行三居下卦之上時既進故其德亦隨時而進也或躍在淵乾道乃革此乾之小畜小畜之中又互離兊故曰革飛龍在天乃位乎天德亢龍有悔與時偕極乾元用九乃見天則天則剛而不過也乾元者始而亨者也此以下申解彖之藴利貞者性情也情効動於利貞言之此謂貞下起元盖兼乎動静者也代淵曰性為本體情為應用必常以性照察於情使用不離體體不離用是謂性其情也彖傳曰性命此曰性情言命以見性之本乎言情以見性之用乎吴幼清依鄭元本作情性非是乾始能以美利利天下不言所利大矣哉隂符經曰天之无恩而大恩生即此意也大哉乾乎剛健中正純粹精也六爻發揮旁通情也剛質健性也中正自三畫卦言之二得剛中而初上皆正也揮廣雅云動王肅云散言動而散於諸卦故曰旁通不但乾之六爻也情也者三畫純陽已盡乾義重為六爻隨乾陽所在而發揮所以曲盡乾之用也横渠所謂徧被六十四是已隂亦然不言耳時乗六龍以御天也雲行兩施天下平也君子以成德為行日可見之行也潛之為言也隱而未見行而未成是以君子弗用也成德為行申首章行此四德之義總一卦言行而未成單言初九義各有取舊混而一之據俞氏分釋為是初九非不行時當潛而所行未著耳此以下申解爻藴之至精君子學以聚之問以辯之寛以居之仁以行之易曰見龍在田利見大人君德也之者正中也民受天地之中以生也學者覺也覺之則存存所謂聚也問以辯文理密察也皆非外鑠我也吴幼清曰寛以居學之所聚仁以行問之所辯九三重剛而不中上不在天下不在田故乾乾因其時而惕雖危无咎矣九四重剛而不中上不在天下不在田中不在人故或之或之者疑之也故无咎虞翻曰以乾接乾故重剛位非二五故不中李鼎祚曰九三乃下卦之上九四乃上卦之下俱非得中盖謂重卦至此二爻始三非下卦中四亦非上卦之中也朱義謂陽爻陽位為重剛而以九四之重剛為衍文失象㫖矣夫大人者與天地合其德與日月合其明與四時合其序與鬼神合其吉凶先天而天弗違後天而奉天時天且弗違而况於人乎况於鬼神乎升陽子曰此諸天日月星宿璿璣玉衡一時停輪之後天人合發之事也故不於二言而於五言五純陽也天罡所指斗極居前日有合月有合也鬼神隂陽之謂受氣吉防成凶也先天後天先天氣後天氣也其殆窺此乎一說聖人别搆乾坤重生造化得丹之月為嵗首其日為朔日進火於子時為朔旦不在天道之嵗時月日而實合德合明合吉凶也亢之為言也知進而不知退知存而不知亡知得而不知喪其惟聖人乎知進退存亡而不失其正者其惟聖人乎證字據趙氏健作􅹧證音據項平甫時舍之舎作去聲讀證誤據俞氏君子以成德為行至行也當分章坤坤下坤上坤元亨利牝馬之貞君子有攸往先迷後得主利西南得朋東北喪朋安貞吉坤順乾之健故亦為元亨牝馬貞於牡以隂從陽也說卦傳曰乾為馬坤言利牝馬明其配乾也陽明隂暗先乾而行則迷而失道後乎乾則得乾為主而利吴幼清謂主爻在卦終故後乃得主非也虞翻盧氏得主為句者是利即有常得常意以屬下則非也西南得朋後天卦位坤居於西南也記曰陽氣始於東北而盛於東南隂氣始於西南而盛於西北盖西南坤之本鄉兊離巽三女同坤居之是為得朋出而從乾震艮坎三男同居矣故喪朋龍昌期謂陽朋隂朋者得之程朱二先生皆言西南隂方東北陽方而不言其故虞翻謂月三日變成震出庚八日成兊見丁庚西丁南故西南得朋二陽為朋友講習晦日消乙入癸乙東癸北故東北喪朋此盖納申之說與古文龍虎參同其㫖相類耳乃斥馬融隂氣著申消寅荀爽卦爻成申消寅之說乎崔憬又謂西方坤兊南方巽離二方皆隂與坤同類謂南為隂何其戾也吴幼清以卦位四為西三為南六四六三二隂相比故為得朋初為東上為北初六上六二隂相逺故為喪朋其言亦无所據藝經捐悶三不能比兩者孔子所造布十干於其方戊巳在西南其殆斯義乎方技家取之顧人无知者耳彖曰至哉坤元萬物資生乃順承天坤厚載物德合无疆含𢎞光大品物咸亨牝馬地類行地无疆柔順利貞君子攸行先迷失道後順得常得常釋利字西南得朋乃與類行東北喪朋乃終有慶隂當從陽喪朋則有後順得常之慶故程先生亦以從陽生物為功朱義反之西南以類聚為慶疑非坤道矣安貞之吉應地无疆方其在西南則安於西南及其往東北則安於東北此无入而不自得焉者或者乃謂惟當貞於陽方不當貞於隂方則與應地无疆之義背馳矣蔡介夫曰君子攸行因言地之德而及夫君子之德也應地无疆因言君子之德而證其有合於地德也在地則為安而且貞在君子則為安於貞象曰地勢坤君子以厚德載物初六履霜堅氷至象曰履霜堅氷隂始凝也馴至其道至堅氷也據魏文帝當作初六履霜隂始凝也六二直方大不習无不利象曰六二之動直以方也不習无不利地道光也朱先生曰德合无疆坤之大也以六居二得坤道之正則无私曲故直居坤之中則无偏黨故方楊敬仲以為坤之至與乾之大非有異无所優劣荀爽之徒以大為陽不識坤道矣不習无不利此所謂不學而能不慮而知者盖良知之學也諸儒皆循王弼謂不假修營而功自成夫直内方外但不習耳豈无修營哉吴氏說曰直之厚上下相去三萬里方之廣輪各三萬里有形之物其大无可與比訓習為冉言不再有非六二動象矣項氏指為重習曰二不習初二雖坤道之純其不習初則无所據也六二之動指君子言地道亦以人事言六二之道即地之道也六二獨言地以見坤之主爻不釋大者直方則能不孤不孤者大也六三含章可貞或從王事无成有終象曰含章可貞以時發也或從王事知光大也三有陽德為章以六居之含章之象是其可貞之道也以其位陽而居下卦之上故不專於含章而或從王事三五同功而非正應稱或材柔故從而不造不敢居其成功以居下卦之終故代終也龍昌期以成訓制終訓就義為近之朱先生謂始雖无成後必有終殆非也唐一行曰乾盈九隱於龍戰之中故不見其首坤虚十以導潛龍之氣故不見其成則於象義鑿矣六四括囊无咎无譽象曰括囊无咎慎不害也坤體虚而容物囊象也四變而竒以居其上猶囊之結上口也五以人臣而處君位四適比近此其所不幸也故括囊而隱劉瑋曰隂爻得位不可妄咎妄譽戒其作威福也陸氏謂四居多懼之地譽則有逼上之嫌咎則有敗事之累惟慎所出納二義精矣六五黄裳元吉象曰黄裳元吉文在中也黄而非裳則垂衣之君也裳而非黄則具臣非賢也左氏曰黄中之色明其為地裳下之飾明其配衣衣者乾也今以羿莽媧武當之恐非矣吉謂事吉元吉則於事盡美矣上六龍戰于野其血𤣥黄象曰龍戰于野其道窮也上六非龍龍者乾也說卦曰戰乎乾戰於卦外故曰野窮者極也上六隂之極也嘉禾朱綬曰十月隂極必交於陽謂之野戰言非常度也含陽而孕長男先天之象吴幼清曰且𤣥且黄上六之血也用六利永貞象曰用六永貞以大終也上以順極為成卦之主故其象如此戰則有血故利於永貞貞下起元非不足於元亨也應繋𤣥黄之下而去象曰字以還古大終者陽大隂小隂極陽生也乾主知故言見坤主行故言利永貞文言曰坤至柔而動也剛至静而德方僧曇瑩云動者爻之變也方吴幼清曰即六二之方是也坤之元在六二後得主而有常陸氏及王介甫吴幼清皆以得主㫁句程朱以彖辭主利㫁句謂有缺文獨俞氏以彖傳後順得常證非闕文是也得主者虞翻謂陽出初震為主為常盧氏曰隂以陽為主當後而順之則利二說皆得地道无成之義吴幼清上六主爻之說非也孔疏又别立議謂隂主卑退不為物先即得其主猶有未盡者楊敬仲曰君為臣主夫為妻主後即得主利莫大焉則於人愈切近矣含萬物而化光乾言變化而坤言化得乾之半也含萬物生意於中動闢則化生而有光輝矣横渠先生曰效法故光漢上朱氏曰坤光即乾之光夫道之在天地无有相假借者按彖傳稱含𢎞光大象傳稱地道光稱知光大乾有乾之光坤有坤之光此分殊之辯也坤道其順乎承天而時行積善之家必有餘慶積不善之家必有餘殃臣弑其君子弑其父非一朝一夕之故其所由來者漸矣由辯之不早辯也易曰履霜堅氷至盖言順也順作慎者非也文言曰坤道其順乎堅氷馴至亦以順積漸難辨聖人將使人察於順也蘇子瞻曰惟其順故能濟其剛如其不順則辯之乆矣直其正也方其義也君子敬以直内義以方外敬義立而德不孤直方大不習无不利則不疑其所行也直其正鄒志完曰當作直其敬敬以直内劉噐之改為正以直内者非禮深衣曰直其政也政乃敬之訛敬訛為政政又訛為正正以直内之功不若敬有所持循也敬之直内義之方外非有二也隨處而得名耳大抵敬之至者外必方外不方不足謂之敬義之至者内必直内不直不足謂之義故聖人曰修已以敬如斯而已矣隂雖有美含之以從王事弗敢成也地道也妻道也臣道也地道无成而代有終也地道既曰无成而曰代有終何也俞氏曰天數止乎九是无終也地數終於十則有終矣是故乾能始物而不能終物坤繼其後而終之則坤之所以為有終者終乾之所未終也坤不有其成而有其終故曰地道无成而代有終也天地變化草木蕃天地閉賢人隱易曰括囊无咎无譽盖言謹也君子黄中通理正位居體美在其中而暢於四支發於事業美之至也黄中故能正位坤正位在六二也通理故能居體坤體宜居下也坤六爻皆承乾五一君坤五雖君位實臣道不取君義也隂疑於陽必戰為其嫌於无陽也故稱龍焉猶未離其類也故稱血焉夫𤣥黄者天地之雜也天𤣥而地黄隂鄭云上六疑依荀虞姚信蜀才作凝晁云疑古云凝字是也凝謂凝沍陽鄭謂今消息用事乾也其指用事之乾嫌依九家作兼无陽謂亥地也九家云隂陽合居故曰兼坤行至亥下有伏乾隂陽變化盖以變化可象者非龍不能也證句據虞翻盧氏言後得主句證字據鄒志完禮深衣言直其敬也疑依荀虞姚信蜀才作凝嫌依九家作兼屯震下坎上屯蒙何以繼乾坤上下體之有震坎艮也傳經之家以為坤交乾而成者也乾坤之交震其始也故先焉屯元亨利貞勿用有攸往利建侯震動故元亨遇坎故利貞勿用者不可輕用非不利也取坎義建侯取震義一君居内而主二民也屯勿用有攸往而利建侯何也因屯而必往以求功則已勞而物且争故衆建諸侯而少其力與天下同利而民有成主難與為亂善建者不拔謂是也吴幼清曰卦變艮三往五為勿往艮上來初為建侯非也彖言建侯爻亦言建侯即所建之侯也彖曰屯剛柔始交而難生動乎險中大亨貞雷雨之動滿盈天造草昩宜建侯而不寧屯之主爻在初九故始交指震崔憬以先天圓圖言之謂十二月陽始浸長交隂萬物萌芽有寒氷之難非也湛先生言震始一交于上艮始一交于中與大傳再索之義背矣草指震震為蕃昩指坎水内景不明于外也象曰雲雷屯君子以經綸彖言雷雨象言雲雷彖言其動象著其體也上坎為雲故曰雲雷屯下坎為雨故曰雷雨解初九磐桓利居貞利建侯象曰雖磐桓志行正也以貴下賤大得民也磐桓以盤旋釋者自馬融始横渠先生獨曰磐桓猶言柱石按字書磐大石也猶漸之磐磐桓柱也猶檀弓之所謂桓楹故曰柱石陽隱於坤土之象震本於大塗而有磐桓是始交難生矣故利居貞初長子為成卦之主德剛而能濟險故利建以為侯一爻而有兩利也春秋傳孔成子遇此占以示史朝曰各以所利然曰弱足者居侯主社稷臨祭祀奉民人事鬼神從朝㑹又焉得居然則磐桓非終不動也吴幼清曰磐桓居貞以剛變柔取義建侯以不變取義非矣以貴下賤萬世濟屯之常道也六二屯如邅如乗馬班如匪宼婚媾女子貞不字十年乃字象曰六二之難乗剛也十年乃字反常也屯如邅如者二乗馬班如匪寇婚媾者五屯難之世正應之志未定二比得民之侯而不進震馬作足而五乗之為車迎之禮者亦般還不前也吴幼清以坎二隂足四馬之數而云五隔四馬分散殆不必然也虞翻曰坎為寇盜應在坎故明其匪寇隂陽德正故婚媾朱義初非為寇求與已為婚媾非也女子者二變為兊字者互坤為母十年互坤之數也過坤十數則逢五正應故字翻不知而曰三爻位變後體離離為女子為大腹今爻位為坤離象不見故不字此方占二詎可言三之變乎六三即鹿无虞惟入于林中君子㡬不如舎徃吝象曰即鹿无虞以從禽也君子舎之往吝窮也鹿虞翻王肅作麓三互艮下畫山之足也虞謂虞人四也四當三前在艮山之間虞人之象然應初比五不為之鄉導故入林中吴幼清曰互坤平地互艮木震竹為林中幾鄭作機如商書虞機之機設械取禽獸之通稱楚辭矰弋機而在上是也君子幾不如舎三居下體震動之極而互艮止故象占如此也六三非陽而居於三无德而有求民之心上六莫之從也而豈如舍之哉六四乗馬班如求婚媾往吉无不利象曰求而往明也初方在難中乗作足之馬班如求四四往吉无不利者初能得民可與有為也湛先生主四往五言者非俞氏曰六二不為初九所逼故爻辭稱其貞六四雖與初九正應必待其求而後往故爻傳稱其明九五屯其膏小貞吉大貞凶象曰屯其膏施未光也膏者坎為雨也詩謂隂雨膏之是其義也卦坎在上為雲而不為雨屯膏之象也陽大隂小六居二九居五皆其正故稱貞孟康言小貞臣大貞君吴幼清曰小貞謂二大貞謂五得之二體震動而正應五有小貞之象屯難之世而有助故吉然五居坎陷未能自拔有大貞之象故凶孟康以出納之吝為小貞非也上六乗馬班如泣血漣如象曰泣血漣如何可長也上乗五坎馬而曵班如之象處屯之終三舍已而五亦非應且在坎中皆不足歸又去得民之初最逺也故泣血漣如坎為血卦為隱伏故有泣血之象也證字據虞翻王肅即鹿之鹿作麓據鄭氏君子幾之幾作機蒙坎下艮上蒙承屯以次乾坤之後何也屯言乎其君道主震之一陽蒙言乎其師道主坎之一陽天祐下民作之君師也君師之道皆利於貞蒙亨匪我求童蒙童蒙求我初筮告再三瀆瀆則不告利貞我謂二童蒙謂五初謂初六再謂四陽一隂二兩其二而為再三指六三崔憬曰三應於上四隔於三與二為瀆故二不告荀爽曰再三三與四也皆乗陽不敬按卦以二為治蒙之主崔荀說是也諸儒自王弼而下指上九失象㫖矣利貞者虞翻曰二五失位利變之正故利貞此於卦體灼然有見蓋如是則大觀在上作之君作之師矣蒙之師猶在下也陽也者宜上者也程先生獨指二似少偏矣彖曰蒙山下有險險而止蒙蒙亨以亨行時中也匪我求童蒙童蒙求我志應也初筮告以剛中也再三瀆瀆則不告瀆蒙也蒙以養正聖功也象曰山下出泉蒙君子以果行育德平菴項氏曰果行象泉之出育德象山之深初六發蒙利用刑人用說桎梏以徃吝象曰利用刑人以正法也初六斂閉之隂得九二之陽開發吴氏謂如撤覆是也坎本為律初動成兊兊為毁折以律而毁折刑人之象謂初承禀於二以施刑於四用說桎梏虞翻曰坎為穿木互震為足艮為手互與坎連故稱桎梏初變成兊兊為說坎象毁壊故曰用說桎梏也之應歴險故以徃吝吝小疵也爻之言二用用刑人者說桎梏之反利者吝之反反者小懲而大戒小人之福治蒙者當於初圖之遽而脫其桎梏則无忌矣寧不吝乎九二包蒙吉納婦吉子克家象曰子克家剛柔接也九二包蒙納婦克家三事也九二剛而得中故能包六五在上之蒙乗初隂有納婦之象又剛處於内五柔志應蓋震長男之幹母蠱者代淵曰上九為國師有利禦寇之象九二為家師有子克家之象六三勿用取女見金夫不有躬无攸利象曰勿用取女行不順也三變則巽為長女勿用取者三雖應上然隂性本柔而又坎體趨下舎上正應近見九二納婦而從之此女子之不有躬者金夫九二乾爻也乾為金故稱金夫六四困蒙吝象曰困蒙之吝獨逺實也四與九二上九並不相近又非其應也易謂陽實隂虚六五童蒙吉象曰童蒙之吉順以巽也艮為少男故稱童蒙劉牧意卦有九二上九兩剛爻六五本互坤仰承上九為順動而俯應九二為巽愚按二者幼學之師故包蒙上者國師先攻其邪心故擊蒙孔子於爻中見其象如此故特發之與彖辭少異彖傳以二為治蒙之主耳上九擊蒙不利為寇利禦寇象曰利用禦寇上下順也為依王晦叔以去聲讀之蓋蒙之卦内險與外止合者也三為坎盜而上九應之則險與止合而蒙德成矣故不利於為之所以散其蒙也利用禦之者艮德本止内惡不萌而外誘不入蒙之利莫大焉者也上為國師夏楚示威二為人師道德為範按周易鈎深圖曰童蒙在五擊之在上是外學也耳目所入雖足以資吾見適足以賊吾之真性故不利為宼包蒙在二發之在初是内學也心之所造貴於幾先一着於心便成機械所以脫桎梏吝也利者吾心之桎梏乎謂初發二非象㫖矣然言有可取者姑附見之上以剛禦三三以柔從上上下皆順也證音據王晦叔不利為宼之為以去聲讀需乾下坎上需有孚光亨貞吉利涉大川五為成卦主爻有孚光亨貞吉皆言五也利涉大川乾知險也大川坎象蘇氏曰乾之欲進凡為坎者皆不樂也是故四與之抗傷而後避上六知不可抗而敬以求免夫敬以求免猶有疑也物之不相疑者亦不以敬相攝矣至於五知乾之不吾害知己之足以禦是以内之不疑故曰有孚光亨貞吉光者物之神蓋出於形噐之表矣或說曰需而无實无光且亨之時需而非正无吉且利之理彖曰需須也險在前也剛健而不陷其義不困窮矣需有孚光亨貞吉位乎天位以正中也利涉大川往有功也位乎之位據鄭氏位音涖象曰雲上於天需君子以飲食宴樂項氏曰飲食以養陽象坎宴樂以養隂象乾蘇氏曰乾之於坎逺之則无咎近之則致宼坎之於乾敬之則吉抗之則傷二皆莫能相懐也惟廣大樂易之君則可以兼據而兩有之初九需于郊利用恒无咎象曰需于郊不犯難行也利用恒无咎未失常也坰外曰郊恒卦名吴幼清曰初變成巽得恒下體四五變而上不變則成震得恒上體初雖變而終不變故曰用恒愚按初變則巽入而不健决三四變則為震塗而無坎陷意或然也苐象系以未失常作常解亦自得也初九以剛居剛故有此象九三需于沙小有言終吉象曰需于沙衍在中也雖小有言以吉終也荀爽虞翻皆曰水中之陽稱沙謂與五應也二變之隂稱小言謂六四兊為口舌二之四互兊也二何以致言當是時知其前險者責之以潔身知其不陷者責之以拯溺拯溺者失於見幾潔身至於亂倫而二之終吉以陽德平衍易以知險又在下卦之中而能需也九三需于泥致宼至象曰需于泥災在外也自我致寇敬慎不敗也自我致寇蓋謂其才位俱剛進不顧前邇於坎盜也九三得其正有乾乾惕若之象故曰敬慎不敗非占外之占也六四需于血出自穴象曰需于血順以聴也坎為血卦需血者抗陽而見傷之象也坎兩偶之畫象穴徃順于五而聴三陽之進是自穴而出在外矣朱義以需而不進為出穴簡輔疑之是矣古註云以戰鬭言其出則為血以居處言其處則為穴各隨事義也嘉禾朱綬曰需言天道人惟當養其氣足而後交不使陷於隂險之中血即申龍戰之血言三陽進交於四隂四需於血順陽而聴其進出自坎穴以待之蓋莫非先天一氣也是方技家之說非易本㫖矣九五需于酒食貞吉象曰酒食貞吉以中正也坎水為酒二三四互兊為食五撤備而為具於三陽之進无復忌心也中者五也正者陽居五也五為險主而位天位鈎深圖所謂下三陽之援者胡仲虎曰民生之欲莫大於飲食男女屯蒙卦爻既於婚媾之正三致意焉此復以飲食之正言之上六入于穴有不速之客三人來敬之終吉象曰不速之客來敬之終吉雖不當位未大失也隂爻之虚故亦為穴居卦之極故曰入與六四有淺深之辨也需以五為主凡飲食主人請客羮定而又速賓上六雖不當主人之位然與人恭有禮故雖不如五之當位愈於四之大失也程先生曰隂居上不當位朱先生曰隂居上當位不知不當之義荀爽以去聲讀之而曰需極成訟上降居三亦豈本爻之㫖哉大抵當自噬嗑彖傳之外當位之當皆當作平聲讀之四順聴矣而何以為失血出而聴以為聴之晚矣崔子鍾曰六四貪而以位為安防人之路故教之出上六卦終則變進无所之則教之入安小人亦所以安君子也證音據鄭氏位乎之位音涖據荀爽上六雖不當位之當以平聲讀訟坎下乾上訟有孚窒惕中吉終凶利見大人不利涉大川訟有孚窒陽陷於隂也惕中吉坎為加憂故惕需訟皆以坎中實為孚需上坎五中正居尊故云光亨訟下坎二中而不正故窒而不光惕而不亨非特相待相持之異也彖曰訟上剛下險險而健訟訟有孚窒惕中吉剛來而得中也湛先生曰陽本上物故以居下為來伏羲畫卦因而重之各因自然非相假借非相互變是也王輔嗣滅棄象學故其㫖未明程先生變古說止主乾坤潛室陳氏指三畫隂陽不等者推之不通虞翻范長生訟九二皆從遯三來朱先生從之何子元不見二家謂從朱始誤矣又舉節齋蔡氏乾自外來交坤為坎諸卦往來皆主本卦剛柔相交而言惟訟无妄上皆乾下為坎震一剛自外來非由本卦來徃故訟曰剛來无妄曰剛自外來此其為言則固已異於虞范朱氏之舊而謂諸卦之變多主本卦剛柔相交則如泰否之類多是總指卦之兩體往來且不盡如虞范朱氏之說子元乃信雙湖謂變例無適不可似當有遺議矣按宋李舜臣易本傳謂舍本卦論他卦為不然又以某卦從某卦來者是妄是不信卦變圖者本卦圖始出宋世未必古法也終凶訟不可成也利見大人尚中正也不利涉大川入于淵也入于淵坎在下也象曰天與水違行訟君子以作事謀始鈎深圖曰乾居亥位坎起子方亥子皆北皆屬於水始无所争也一離於形則天西傾水東注天上蟠水下潤於是而訟起矣初六不永所事小有言終吉象曰不永所事訟不可長也雖小有言其辯明也吴幼清曰不永所事此邵子所謂意象謂意象者是但易之意象不止是也盧植曰初欲應四而二據之暫争事不至永蓋二為强求應在四故不永事也小謂初隂初變則成兊為口舌雖小有言其辯則明矣需以其變為小訟以其不變為小需以其變成兊訟以其不變成兊易之取義非可一端定者九二不克訟歸而逋其邑人三百戸无眚象曰不克訟歸逋竄也自下訟上患至掇也九二與四争初上争三而五元吉之主故不克訟歸而逋坎為隱伏也故曰自下訟上四上皆二之上也虞翻獨謂與四訟非矣吴幼清曰訟由遯變遯以六居二訟以九居二二不克訟變剛為柔以避五則九還為遯之六二故曰歸而逋意疑其紆鑿矣二變成坤荀爽曰坤稱邑二者邑中之陽人也稱三百户虞翻曰二變應五乾為百坤為戸三爻故三百户下大夫制猶駢邑三百云爾或曰屯蒙需訟凡四坎一坎得乾坤之策八十四四坎三百三十有六也歸而逋其本爻三十六策其餘三百當三百户之象坎為眚坎化坤故无眚周禮慿弱犯寡則眚之眚四面削其地也九二成訟之主逋竄二隂之間隱微其迹以避咎剛來而得中人將哀而歸之故免於眚此亦不終訟之福故象曰患至掇掇鄭本作惙患至而憂之坎為加憂也今本掇而朱先生遂謂自取非象㫖矣六三食舊德貞厲終吉或從王事无成象曰食舊德從上吉也三與上正應其舊德也二四强施德焉三外柔内剛故食舊德而已貞厲者乗二負四正於剛厲之間剛不能侵故終吉凡物各有定主五為王本非三之正應故稱或而有无成之象從上謂從上九朱義槩指隨人者不然或曰舊者六本居二九歸逋於三則二可以食其舊德始在三而厲終居二則吉二應五有從王事之象於象傳從上之義相背矣或又曰訟三之貞與坤六三正同其從王无成又同故云舊德益非象㫖也九四不克訟復即命渝安貞吉象曰復即命渝安貞不失也四變成巽為命九四之命當得初六而已以剛居柔故不克永三之訟退而就初自改而安於貞之象正應者合故曰不失也二與四皆不克訟九二坎體其心本險識時勢能反而安其分之小九四明義理能變而安於命之正九五訟元吉象曰訟元吉以中正也項氏曰中則我不終訟正則人不克訟上九或錫之鞶帶終朝三褫之象曰以訟受服亦不足敬也鞶帶吴幼清曰三四五互巽為股上九一畫連亘當股上鞶帶錫之者五也荀爽曰三應于上上為宗廟故曰鞶帶上為宗廟說不經見六三上九之配二與四常欲有之元吉之主明其分所當得而授之也終朝乾為日也三褫者歴三位也褫康成本作拖晁以道曰如拖紳之拖乃得象意吴幼清以褫與搋通訓拽蓋上剛之極本以訟得三不勝其矜而終朝三拖之以誇於人也象曰受服二先生從荀虞本曰褫服豈象義哉三上相應者三之從王曰或上之錫帶曰或居訟之時不必之辭也証字據鄭氏患至掇之掇作惙又鄭氏終朝三褫之褫作拖師坎下坤上師貞文人吉无咎師衆也師以一陽統五隂有師之象蓋古者五人為伍五伍為兩五兩為卒五卒為旅皆自五起數也丈人崔憬子夏傳作大人吴幼清曰此彖貞大人與困卦貞大人同皆以内卦坎中畫九二為大人論語莊子等書稱丈人皆以老扶杖取義是也康成謂天子諸侯主軍者失之矣彖曰師衆也貞正也能以衆正可以王矣剛中而應行險而順以此毒天下而民從之吉又何咎矣毒崔憬訓于亭毒毒謂成其質與容畜義合何子元曰古毒督通程朱之謂毒害者非行險而順矣安得民從陸德明釋文本輔嗣以役訓之馬季長又以為治此為異於程朱但於師象未安茍後世不明行險而順之理便謂以義動民雖毒天下亦可為之則遺害豈小哉象曰地中有水師君子以容民畜衆初六師出以律否臧凶象曰師出以律失律凶也在師之初故曰師出以六居初柔邪不中又在險陷之始故有否臧之象否臧即失律謂不和也九家易曰坎為律或曰法也師主人和故周禮太師執同律以聴軍聲宫則軍和士卒同心商則戰勝士卒强角則軍擾多變失士心徵則將急數怒軍士勞羽則兵弱少威明坎方黄鍾之本故云然也若必謂紀律云者末矣九二在師中吉无咎王三錫命象曰在師中吉承天寵也王三錫命懐萬邦也王謂五自五之二歴三位故稱三錫李鼎祚云二互體震木數三王三錫命之象非也命猶詩命仲山甫之命或曰一命受爵再命受服三命受車亦非九二剛中而應故象如此六三師或輿尸凶象曰師或輿尸大无功也或者疑辭六三體坎加憂故多疑用人不一也大陽謂九二九二雖賢將而以六三參之動有所制亦何功哉盧植曰坎為車多眚朱先生因之而程先生謂衆主也按古語曰輿論輿人之誦皆衆也詩誰其尸之尸主也而又與象傳義合從程先生可也六四師左次无咎象曰左次无咎未失常也左次謂二崔憬曰偏將軍居左左次常備師故左次以受二命三以輿尸則凶四左次何咎哉凡卦以陽為左如左股左腹皆謂下之陽也右股皆謂上之隂也師以二為帥二與四同功四以隂居隂蓋能順者軍中聞將軍令謂是矣如謂次以避敵師何利焉其何以為无咎也六五田有禽利執言无咎長子帥師弟子輿尸貞凶象曰長子帥師以中行也弟子輿尸使不當也二乾爻為田坎豕為禽言依郭京作之五柔中不為兵端之象虞翻曰長子謂二震為長子在師中故曰帥師弟子謂三三體坎坎震之弟是也五應剛中之象此師旋論功之時上六大君有命開國承家小人勿用象曰大君有命以正功也小人勿用必亂邦也大君謂五此定功行賞之時也坤為地為方有國象上變體艮門闕有家象損艮變為坤故稱无家師坤變為艮故稱承家宋衷曰陽當之五處坤之中故曰開國隂下之二在二承五故曰承家非也大君有命何以正功蘇氏曰小人之所繇入常自不以律始然後能以竒勝夫能以竒勝者其人豈可與安居哉師休之日將録其功而以為諸侯大夫則亂自是始矣聖人之師其始不茍求勝故其終可以正功曰是君子之功耶小人之功耶證字據崔憬子夏傳丈人作大人依郭京執言之言作之比坤下坎上比吉原筮元永貞无咎不寧方來後夫凶彖曰比吉也比輔也下順從也原筮元永貞无咎以剛中也不寧方來上下應也後夫凶其道窮也原再也如禮末有原之原比之初筮下卦得坤再筮下卦得坎坎陽在内剛中為成卦之主所謂元永貞者故无咎厚齋馮氏曰萃比下同體坤萃四有分權勢故元永貞於五言比下无分權者故元永貞於彖言也王應麟曰蒙之剛中陽在下卦初筮得之也比之剛中陽在上卦再筮乃得之也故蒙曰初筮而比曰原筮立言之法各於其當耳朱義再筮自審既非事實干寳以周禮三卜原兆明之此自以筮言謂卜者非也坎勞卦故不寧謂四輔五也坎憂坤迷之際歸附方新四不遑寧通上下之情而三隂方來上與五相比也來者五為卦主故内辭後夫謂上六以九五為夫凡卦以下畫為前陽為夫上六後於九五之象也虞翻云水性流動故不寧坤隂為方上下應故方來然坤體下卦乃可言上應无所取義於下應虞說非也比吉下郭京云也誤増比輔謂四下順從指三隂上下應子夏傳地得水而柔水得土而流乃盡比義干寳謂天下歸德不惟一方是矣程朱本輔嗣之舊謂不安者託焉似不若干氏於上下應之語為明暢也象曰地上有水比先王以建萬國親諸侯制民五家為比建國之原也初六有孚比之无咎有孚盈缶終來有它吉象曰比之初六有它吉也初有孚比之比二也蓋比暱之世與卦主逺故比之无咎次言有孚謂五坎之所以為水者盈缶猶言貫盈在五比二因可通五也虞翻曰坤噐為缶坎水流坤初動成屯屯盈者故盈缶康成以爻辰在未值東井缶為汲噐鑿矣盈者謂非正應五是也吴氏指四三二者則失坎所以為水者矣江夏劉績指初比四相信四牽初比五言似而非比以暱近為義四則稱應不為比也俞氏始孚言四次孚言二益非六二比之自内貞吉象曰比之自内不自失也六三比之匪人象曰比之匪人不亦傷乎六四外比之貞吉象曰外比於賢以從上也内謂内卦外謂外卦上指五在四之上也九五顯比王用三驅失前禽邑人不誡吉象曰顯比之吉位正中也舍逆取順失前禽也邑人不誡上使中也二五正應之理驅謂獵而驅逆坎馬駕坤輿之象自五至二歴三位三驅立三表之象前禽初也五雖周而不比然初本不與五接顯比之主亦不以為心也虞翻曰驅下三隂不及於初故失前禽是也坤為邑人誡期約也舍逆謂驅逆在表外者舍之即初也指坤順也石守道吴幼清俞玉吾以前禽即為後夫而指上六則於前後之訓强辭大凡卦指下畫為前陽謂夫上在五後對五故可言後自五而可言前禽乎上六比之无首凶象曰比之无首无所終也上六自五言謂之後夫自上言謂之无首比卦五隂下四隂皆順從一陽惟上居隂外而不内嚮上體不完猶人无首之象觀比上稱首則乾之羣龍无首果上九爻辭而非六爻通變之占矣句字音无誤小畜乾下巽上胡仲虎曰自乾而下屯蒙需訟師比皆三男陽卦用事至此方見巽之一隂用事而以小畜名焉尊陽也小畜亨密雲不雨自我西郊彖曰小畜柔得位而上下應之曰小畜健而巽剛中而志行乃亨密雲不雨尚徃也自我西郊施未行也密雲邇也王氷曰氣上為雲象三陽之在下而進也我與西郊皆謂四成卦之主故内辭也乾為郊又互成兊主西方詩蝃蝀云朝隮於西崇朝其雨小畜乾雲密邇互兊之西郊而不雨者則以四微不足畜陽之進而體巽風以散之則陽又乗之以徃也大抵四雖成卦之主爻必上合志於九五之剛中而後志乃可行孤隂畜陽之難如此故陽尚徃而隂未行也上合則雲同而終亦雨矣象曰風行天上小畜君子以懿文德懿取巽體柔順之象德取乾體剛健之象文象互離文明初九復自道何其咎吉象曰復自道其義吉也九二牽復吉象曰牽復在中亦不自失也初復自道其義雖吉然與四正應終於進有所疑故必待二之牽復而後進初進則二之勢益昌蓋一隂得位之時喜陽復升如此九三輿說輻夫妻反目象曰夫妻反目不能正室也馬融及諸儒皆以乾為車輻依說文陸氏作輹與大畜輹同車下縛木也輹指二輿三自謂也虞翻曰逸坤為車為輹按乾居象是大有而必稱逸坤亦既大紆曲矣三邇四雖不畜而情有所眷三徃趣上二下牽初說輻之象朱先生曰隂陽相說為所繋畜不能自進殆亦非也三乾為夫四巽長女婦象初四正應為妻初能自復而相絶三以相比而遂妻之然四上合志離目不下視三又陽性不可終畜而四體巽雖志畜而性入故多白眼而反目也以妻乗夫而出在外是何能正室者哉六四有孚血去惕出无咎象曰有孚惕出上合志也孚者孚五血依馬融作恤晁以道曰血古文恤字憂也四為畜主憂三陽之去巳惕懼釋位出以孚五得陽之助因人成事善處功名之際矣夫巽性善入故以惕出為補過或曰隂陽交必有血亦通九五有孚攣如富以其鄰象曰有孚攣如不獨富也孚俞胡指四虞翻曰孚二者非也朱義從九家易指下三爻廣而不切矣巽為繩攣如之象以由也鄰謂四柔得位而上下應故與五合志則五富也陸氏云九五親四委四畜物蓋能窺斯意朱先生讀以為左右之恐非也象不獨富猶曰不獨其力之能富云耳上九既雨既處尚德載婦貞厲月幾望君子征凶象曰既雨既處德積載也君子征凶有所疑也上變坎為水水在天上雨之象也不雨故徃既雨則不徃故云處也尚德載下三陽為德坎為輿載需所謂不速之客三人來敬之者也故曰德積載積三陽而載之也婦貞厲虞翻曰巽為婦坎成巽壊也巽婦畜乾夫以順為正變坎失順有畜而正於剛厲之象月幾望孟荀一行作既變坎成月與九三互離相對卦之離主在四故上之應三稱幾望猶曰非正望也吴幼清以納甲巽象既望之月今按參同契云十六轉受統巽辛見平明月幾望者隂之盛易象月幾望者皆隂為主之卦此謂六四謂卦主也三處人道而有乾德故稱君子上以進退之資又變為坎險擬陽之進而終畜之故征者必凶疑簡輔讀作礙與載叶或曰三疑上體巽順而不察其進退險阻亦通胡仲虎曰四之畜道成於終故示戒密雲不雨為隂言也今既雨矣剛中志行為陽言也今既處而不行矣尚德載婦貞厲又為隂言月幾望君子征凶又為陽言隂畜陽至此成隂雖貞亦厲陽有動必凶隂陽兩不利之象證字據說文陸氏輿說輻之輻作輹據馬融血去之血作恤據孟荀一行幾望之幾作既據簡輔疑作礙與載叶履兊下乾上履虎尾不咥人亨彖曰履柔履剛也說而應乎乾是以履虎尾不咥人亨剛中正履帝位而不疚光明也履者三柔能履二也虞翻曰明兊不履乾故言應二虎也三履之莫咥以三為說主與五同功而應之三者權在斯須五者尊有定位也九家易曰承上以巽據下以恱其何不亨哉二五正位兩剛不能相下今授以巽順之三而二受其履二為三用而三為五用五无病矣光明者二互離之主而見用于五也程先生曰疚夬履也夫五既夬履矣又安稱於无咎耶象曰上天下澤履君子以辯上下定民志初九素履徃无咎象曰素履之徃獨行願也素空也凡履皆以上履下初則无履矣所以為履道者行其素所願而已九二履道坦坦幽人貞吉象曰幽人貞吉中不自亂也變震大塗履道坦坦之象剛中无應互離之下明而未融幽人之象幽人固多行怪為高者坦坦所以為貞吉也中不自亂依乎中庸之謂也六三眇能視跛能履履虎尾咥人凶武人為于大君象曰眇能視不足以有明也跛能履不足以與行也咥人之凶位不當也武人為于大君志剛也六三居兊之成互離之目互巽之股皆為毁折故稱眇跛人身以下為履卦位以初為下虎尾者古九家易兊為常蓋虎常相近而文誤宋衷註革謂兊為白虎是即其義三為成卦之主而兊有虎象三虎首也下臨二剛自履其尾虎之力在尾用尾則咥人倚剛為用也朱說兊柔履乾剛兊為剛鹵何得以柔稱乎奈何為柔履剛是兊履乾而遂以為履虎尾之象也且又自下而上安得謂之履哉虞氏求而不得又以為與謙旁通則兊不履乾之說若出二人矣本易之㫖不論旁通彖言虎不咥人爻言之何也蘇氏曰三與五合則不見咥而五不病五與三離則五至於危而三見咥卦統而論之故言其合之吉爻别而觀之故見其離之凶三五離合之故求之不得殆出臆說也詳彖統言一卦則上為虎首一而不折故象不咥爻即本位言之則於三才為人又為兊虎之首口虚而開如人在虎口故為咥人也以六居三才雖柔而志則剛武人之象大君謂九五為于大君言其能宣力也即彖傳說而應乾之義或曰三以一隂統五陽位履主爻大謂陽言三為五陽之君更詳九四履虎尾愬愬終吉象曰愬愬終吉志行也四下應初履虎之尾矣侯果曰四履乎兊主蓋以三為虎尾非象㫖矣愬愬四多懼也以剛居柔故能懼初曰獨行願逺君也四曰志行近君也以位為志故六三之志徒剛九四之志則行九五夬履貞厲象曰夬履貞厲位正當也夬與履乾兊相易之卦夬履者在履而當夬位也六三成卦之主以柔履剛五與二德同位應欲為二决去之故云夬履劉牧曰厲嚴也剛而居尊故嚴非危也或曰在下者不患其不憂患其不能樂故喜其坦坦在上者不患其不樂患其不能憂故戒其夬順竟可懼也上九視履考詳其旋元吉象曰元吉在上大有慶也據俞氏視履句考詳其旋句祥依荀爽作詳旋者復也石介曰以髙應下有旋反之象先儒所謂初徃者始上旋者終昔徃而今旋是也上以重剛居履之成健而不息能視其所履加考詳之功詳審其所周旋元吉之象也證音據俞氏當平讀證句據俞氏視履為句考詳其旋為句證字依荀爽祥作詳泰乾下坤上泰小徃大來吉亨彖曰泰小徃大來吉亨則是天地交而萬物通也上下交而其志同也内陽而外隂内健而外順内君子而外小人君子道長小人道消也言消長者邵子所謂乾四十八而四分之一分為所尅之隂也象曰天地交泰后以財成天地之道輔相天地之宜以左右民乾坤而後隂陽各三十畫而後為泰无過不及矣乾陽左也坤隂右也左右之使无過不及也初九拔茅茹以其彚征吉象曰拔茅征吉志在外也初變巽為草木陽爻木隂爻草初六故為茅也茅根曰茹初在下得稱根以佐也傅氏云彚古偉字美也謂其應猶詩言予美舊指同類非也鄭指茅潔白為君尤非四坤而順下應於乾已去則納故征吉外者外卦九二包荒用馮河不遐遺朋亡得尚于中行象曰包荒得尚于中行以光大也二變坎為水㐬則三為成卦之主而二包之者也河所以界三隂陽之限其象也二雖麗隂尚逺然當内君子之時剛中體離能辯於早故有包荒用馮河之象然上下本交故有不遐遺三隂之象初三剛失中正故二有朋亡之象尚配也中行謂五所謂中以行願者是也卦以上下交為泰故繇以尚中行為辭得尚者慶辭也荒漢書陸德明作㐬虞翻曰㐬大川說文水廣也何子元曰象數无田穢之荒包荒馮河一事是已吴幼清以易中言包者皆指陽畫㐬與􅀢通血也二變坎為血卦九三陽畫在外包之二之交五猶包裹祭天之血以達誠於上以㐬為􅀢不知所出俞氏指荒為初朋為外三隂象數自然之變卦爻徃來之情逺矣九三无平不陂无徃不復艱貞无咎勿恤其孚于食有福象曰无徃不復天地際也陂偏也言隂陽浸勝无平等而不偏陂者徃小徃也復陽復至三以交隂也乾三君子終日乾乾夕惕若厲三艱貞无咎之象孚二與初然體重剛健不阿黨有能止其進銳之象食猶食舊德之食三變兊口有食象三隂居外柔可茹故曰有福自乾坤而後歴六坎險阻備嘗然後至泰而陂復之幾又將變矣六四翩翩不富以其鄰不戒以孚象曰翩翩不富皆失實也不戒以孚中心願也翩翩者飛而向下也失依郭京作反俞氏曰泰之時上下交而其志同君子小人兩不相疑又何戒備之有三陽以其類交乎上故三隂亦以其鄰交于下三交于上勿恤其孚故四交于下亦不戒以孚象之言反實者易以陽為實隂之從陽猶貧依富今三陽在位皆内向也六五帝乙歸妹以祉元吉象曰以祉元吉中以行願也帝乙微子父也祉謂四上二隂六五下嫁九二而二隂從之也卦互歸妹故象占如此湯天乙也非帝乙也其後帝祖乙非帝乙也程子不據多士而蔓延及之非也或曰緯書孔子曰易之帝乙為成湯書之帝乙六世王同名不害以明功漢京房傳乃有湯歸妹之辭辭雖不淳古不可謂无本矣然則歸妹者是湯荀爽對策張說作銘亦皆因之是果湯乎按左傳晋趙鞅救鄭筮遇泰之需曰微子啓帝乙之元子也緯文偽不足信春秋去古甚近且其言即為泰九五而發者明有證據故知其非湯也王昭素曰商王多以十干為名甲為陽首六五隂爻故以名乙之主為象此非大義然學者亦可知也以祉元吉帝女之歸非以求勝其夫將以祉之坤之下復非以奪乾將以輔之故曰中以行願如是而後元吉也二言尚而五言歸義主於上下之交乎上六城復于隍勿用師自邑告命貞吝象曰城復于隍其命亂也虞翻曰艮為城不知何出按同人乗墉言於乾則城者乾也坤為積土子夏云基土倍扶乃得為城今崩而復隍明下之不交上也勿用師坤為師也上六變為剛則坤體不完衆散邑削泰極乆安之民狃於習而不可輕動動則胥動浮言故自邑告命坤為邑兊口在四為告也邑非所以出命播告之修亦王綱之不振矣坤為吝嗇故貞吝證字據漢書陸德明包荒之荒作㐬否坤下乾上否之匪人不利君子貞大徃小來不利依俞玉吾斷句舊讀曰不利君子貞者非君子之正道未有不利者正道无常形居泰與否曰不相為謀矣易中之例以不利斷句者否以无不利斷句者謙否之象聖人不為小人謀也石介曰否之者匪人也天也匪人非為致否者言為君子遇否者言之也彖曰否之匪人不利君子貞大徃小來則是天地不交而萬物不通也上下不交而天下无邦也内隂而外陽内柔而外剛内小人而外君子小人道長君子道消也節齋蔡氏曰泰言健順之德否言剛柔剛其質也否者氣藏乎質而不交故不可以德言但言其質而已言消長者邵子所謂坤四十八而四分之一分為所尅之陽也象曰天地不交否君子以儉德辟難不可榮以祿紫巖張氏曰坤吝嗇為儉德三陽在外為辟難坤邑為祿愚謂儉德辟難是彖所謂君子之貞者初六拔茅茹以其彚貞吉亨象曰拔茅貞吉志在君也乾稱茅矣今坤何以復稱茅初變成震為蕃震蕃自坤得之故坤曰草木蕃茅草類也李鼎祚苐以巽言失其指矣以佐也彚傅氏云古偉字美也變征言貞而加亨坤之安貞貞於乾也朱先生曰小人而變為君子夫初方拔其彚豈盡其彚為君子乎且既曰初惡未形而遽曰變為君子亦疑若自不相蒙矣初處最下而逺于陽然位本陽也孔子觀象而得之故曰志在君變外言君泰五柔中不如否五剛中也剛中者君德也六二包承小人吉大人否亨象曰大人否亨不亂羣也據龜山楊氏包承小人為句二包三初承二上下皆隂隂為小故言小人卦明有此象朱先生乃疑之謂包容承順乎君子非象㫖也二柔而得正當上下不交之際不敢自異以取疑故吉九五大人亦以其柔順應已故能休否也然則六二雖與上下二隂同體而羣不亂矣六三包羞象曰包羞位不當也簡氏輔曰六二否過乎中承應皆陽小人之道漸消矣故謂包羞之象吴幼清以包承作包脀謂坤為牛牲二當正體小人當否求通以包苴為事六三羞為加食膗胾膾炙醢醬之屬非食之正品饋非正饌又非六二中正可比當更詳也九四有命无咎疇離祉象曰有命无咎志行也四變巽為命命謂五所命也四本近而多凶又當否時則尤易獲咎今體巽能順不敢自專則在已无咎而同類並受其福也吕仲木曰若歸諸天命則不可言志行又豈君子所以持否之心哉九五休否大人吉其亡其亡繫于苞桑象曰大人之吉位正當也人依木息曰休九五陽剛中正可依如五互三四巽木之象故曰大人吉其亡其亡五雖休否而未離故有此儆戒之象繋于苞桑則上下交矣二在五巽之下乃桑柔之方苞茅者如詩相苞杞之苞舊說固者非正當依俞氏平讀謂正當六二之應卦體雖不交而應則固在矣三不言當而五言貴陽之先倡也上九傾否先否後喜象曰否終則傾何可長也傾者倒也否者泰之倒體否極則倒而成泰矣證句據俞琰以匪人不利為句據楊氏包承小人句證音據俞氏正當之當平讀周易象㫖决録卷一
