body:
  text: 周易象㫖决録卷四明熊過撰下經井巽下坎上井改邑不改井無喪無得往來井井汔至亦未繘井羸其瓶凶周禮四井為邑春秋井田記曰因井而市交易而退是邑有改象以井困倒體明之巽為邑升下卦無妄互體見之向在上之兌今改為巽邑然在上在下皆此坎爾是井不改也即井為革者浚其泉而已所謂我固有之也六三往上九四來下則坎水在上六四來下九三往上則坎水在下故曰往來井井汔幾也巽象木進退為桔橰入兌暗澤之中泉口有互離為瓶巽木入而進退則九二陽泉幾出亦與未嘗繘汲者同于無功耳羸者大索謂拘纍纒繞而未能以互離在巽繩之上其象又為羸瓶朱先生讀汔至絶句亦未繘井羸其瓶别絶今按彖傳文求之非是彖曰巽乎水而上水井井養而不窮也改邑不改井乃以剛中也汔至亦未繘井未有功也羸其瓶是以凶也不改井下郭京徐氏王昭素本俱云脫無喪無得往來井井二句象曰木上有水井君子以勞民勸相初六井泥不食舊井無禽象曰井泥不食下也舊井無禽時舍也此陰柔居下而無應之象泥干寶曰體本土爻舊井在下未浚不能汲而日新是以為舊井也坎失前禽故無禽長寧周氏謂井旁餘瀝禽來飲者禽無飲井其言是矣崔憬云禽古擒獲非湛先生以為井欄之禽二亦無井欄象不食者逺于兊口其始無人其終無禽則所以為井者亡矣故時皆舍之謂時舍者明非初罪時止在此耳程先生作上讀與乾時舍義異是矣三泄而四甃非他井也井亦未嘗變變者時耳九二井谷射鮒甕敝漏象曰井谷射鮒無與也無應于上而下比之象井二自謂谷鮒皆指初谷說文泉出通川之稱鄭𤣥曰艮為山山下有井必因谷水所生是也鮒魚陰蟲巽為魚初處井下體又陰爻鮒之象也初在陰為泥二陽爻剛土在井甓象也井底周圍障土儲水如甕然鄭云停器也說文謂汲瓶非敝漏者九二剛畫象水實甕中初偶象甕之敝舊下漏又互兌為毁折二也九三井泄不食為我心惻可用汲王明並受其福象曰井泄不食行惻也求王明受福也九三居得其正巽入之功已畢故泄然在下之上不得其中上雖有應而非用事既井井邑所㑹之地又居兌口之下有不食之象我三自謂為我惻者上坎加憂也王謂五離為明行謂四也五在坎中四汲三而成互離為求王明也以非正應故稱行稱求井何以求食不食存乎人所以為井者存乎己行人惻之非自惻並者普物之稱也六四井甃無咎象曰井甃無咎修井也四柔得其正承乘皆剛故為甃象居近臣之位巽木上水之始甃以助三為五求文明之治如此王介甫曰井之道以不求求之是子貢所謂異乎人之求者不達於卦爻之情以人事君之義矣九五井冽寒泉食象曰寒泉之食中正也五變坤作甘故冽剛居剛故潔坎正北方之卦為寒泉居兌口之上食象也寒泉之食何以中正吕仲木曰居德而不中正則貴戚有優渥之耗疏遠無沾濡之益是斜口井也惟中正則四方皆被其澤詩云池之竭矣不云自中是也上六井收勿幕有孚元吉象曰元吉在上大成也收俞氏謂汲之訛良是虞翻指鹿盧收繘者朝氏依之朱義因取焉非也四上皆陰故曰孚上雖無位四能汲三之泄而出于井口上遂收井之成功矣胡仲虎曰改邑不改井井之體性靜而定也無喪無得往來井井井之用也性動亦定也汔至亦未繘井而羸其瓶人之于性知之行之有未盡也其猶是乎證音據程傳時舍讀上聲證句據彖傳汔至亦未繘井為句羸其瓶為句證誤據俞玉吾井收作沒脫遺據郭京徐氏王昭素彖傳不改井上脫無喪無得往來井井二句革離下兑上革巳日乃孚元亨利貞悔亡爻至三為終日過三為已日當革之初文明以說之際乃能孚信于人也漢書曰理紀於己得已則可孚矣朱子發曰十干自甲至己然後為庚庚革也自庚至己十日浹矣己日浹日也例以先庚先甲此為近之蔡氏云一爻一日過初為已彖統一卦謂過初爻者非王氏以離納己然納甲雖易所有而非古僧曇瑩作似讀十二辰至巳陽數極當變謂辰則與日異乖經義矣易之彖未有言悔亡者革獨言之重改革也彖曰革水火相息二女同居其志不相得曰革已日乃孚革而信之文明以說大亨以正革而當其悔乃亡天地革而四時成湯武革命順乎天而應乎人革之時大矣哉水火相息兊在火下則自成澤在火上則兌金成水朝以道曰兌無為水之義必字誤何子元引漢律歷志易金火相革明之皆信字誤不知象矣胡雙湖云夫子欲論相息之象以水火為言亦非二女何以不相得兌在上而性潤下離在下而性炎上也文明則人知悅則人從正則人服革命者隨其德建以改嵗命厯洪偃云劉歆作三統厯及諸稱革彖湯武其前又引逸書先其革命之語顔師古云王者統業先立算數以命百事是也所云革命非取天下洪氏之論與象治厯明時相通矣象曰澤中有火革君子以治厯明時敬軒薛氏曰澤沒火則火滅火燥澤則澤涸相革之義也朱子發曰牽牛火位星紀水位日月交㑹于此澤中有火之象也此上元太初起厯之元耳洪偃史繩祖上以大衍明之謂革居序卦四十九當大衍之數此于澤火之象何關耶至若虞氏坎離蒙艮之論益成曲學矣初九鞏用黃牛之革象曰鞏用黃牛不可以有為也初體離明以陽居下而無應故其象如此離為牛黃謂二也離之二曰黃離初何以鞏二之黃牛蘇氏曰六爻皆以陽革陰初九九三九四九五四者所以革人而六二上六者人革之初九九三所以為革者火也而六二者火之所附火以有所附為利而所附者以得火為災故初九九三常願六二之留而不去也六二已日乃革之征吉無咎象曰已日革之行有嘉也彖言已日乃孚爻言已日乃革之何也卦以六二為主文明之賢而上應剛中之君待上之革而從之俞氏指侯國以别于王朝是也乃革必已日然後可革離日方中蓋未已也故未可遽革九三征凶貞厲革言三就有孚象曰革言三就又何之矣九三乘二捨之而征則二去而三與初無所施其革二陽相灼而喪所附故凶九三爻位俱陽有貞於威厲之象革言三就革以言也崔憬曰未可預革以言就之也離為言明夷見之言揚火也三就者九位三故曰三翟𤣥曰三就上二陽王弼曰自四至上從命而變按就說文云髙也以卦繇觀王義為優且于就義不悖說之指也今讀如一就再就之就非卦爻之情矣三居離之成火盛則金流然革之以言視四之改命則異矣九四悔亡有孚改命吉象曰改命之吉信志也有孚者孚于二也有孚改命虞翻曰互巽為命四動互坎改巽故改命吉將革而謀謂之言革而行之謂之命三議革而後孚四有孚而后改淺深之序也四當二女同居之際其志本不相得然四體兌說而引二之互巽以是為革也又四動成坎有信志義蘇氏曰下之二陽以火為革故見革者為欲去之德不足而革則所革者亡革者亦凶故初九九三皆以六二之留為吉上之二陽則不言革以說革人而人莫不說也九五大人虎變未占有孚象曰大人虎變其文炳也陽稱大五以陽居中故曰大人宋衷曰兌為白虎此吾所謂兌為常之誤也三四五同互乾體故皆言有孚上六君子豹變小人革面征凶居貞吉象曰君子豹變其文蔚也小人革面順以從君也陸績曰兌之陽爻稱虎陰爻稱豹豹虎類而小者王德卿曰虎文疏而著曰炳豹文密而理曰蔚蘇氏曰易稱風從虎虎有文而能神豹有文而不能神其别虎豹悉矣然革貴於變變豈終不同乎揚子雲曰貍變則豹豹變則虎善言革之情物矣陰稱小人卦之上猶人首也故以面言上六以陰居兌之上髙而無位貴而無民其𤣥德若豹之澤霧而同類小人猶感而革面以從五蓋變之達于聲音笑貌者如此說之極革之成雖無位者猶足以化民成俗又何面從之疑哉下之二陽體察而德不足故二以征為吉上之二陽大人也故上以征為凶證音已日據朱漢上音紀鼎巽下離上鼎元亨彖曰鼎象也以木巽火亨飪也聖人亨以享上帝而大亨以養聖賢鼎大亨郭氏舉正聖人亨以享上帝以養聖賢今本正文多而大亨三字故注文亦誤增大亨二字孔頴達曰享帝尚質特牲而已故直言亨聖賢既多養須飽飫故亨上加大朱先生從之非也巽而耳目聰明柔進而上行得中而應乎剛是以元亨離為目自常言之也巽為耳自鼎象言之子夏傳中虛為耳朱先生之說是也五得中而應乎剛則所以為耳自巽也虞翻曰三在巽上動成坎離有兩坎兩離乃稱聰明眇能視不足以有明聞言不信聰不明皆一離一坎非也象曰木上有火鼎君子以正位凝命初六鼎顛趾利出否得妾以其子無咎象曰鼎顛趾未悖也利出否以從貴也初在巽股之下稱趾鼎既重器而又上應陽爻益非陰弱所勝故顛當以木巽火之初而巽入不已則積薪鬱而火不揚莊生云薪窮火傳故須出否否者燼之餘也鼎始建用趾以受火非能受實也故利出否以作火亦去故取新之義楊用修說沈括云古鼎空三足以受濁滓鬲煎和法欲清在下體在上則易熟不偏爛及升鼎則濁滓皆歸足中蓋初六洗鼎也豫以顛趾出否為二義沈為一義再詳巽長女君也應互兌有妾象子指所應互兌之四四陽爻乾道成男得稱子又鼎中實象女子之孕女子孕者亦必去故取新醫術者知之巽無子而兌有子者巽逺君而兌方居用事之地故君不如娣也出否則鼎致用以子則鼎有主故無咎貴謂九四陽爻九二鼎有實我讐有疾不我能即吉象曰鼎有實慎所之也我讐有疾終無尤也九二陽爻為實讐謂初相比而有陰惡之疾也九二剛中故不我能即王弼曰六五困于乘剛之疾不能就我則我不溢乘剛之疾殆輔嗣鑿空耳鄭𤣥怨耦曰讐虞翻以讐為三不見其㢲鄭氏誤矣不曰君子好讐乎九三鼎耳革其行塞雉膏不食方雨虧悔終吉象曰鼎耳革失其義也子夏傳曰次實腹也則非耳矣耳五而言于三俞氏所謂耳雖出於鼎口而根于鼎腹三為鼎腹者是也革謂變異三五異體非應之象塞不通謂革于四也三變互離為雉互坎成膏九三實而可食者而其行廢莫之舉矣雖有雉膏安得食哉互兌為澤當以木巽火之際陽入於陰九六相合致雨之象虧悔者三與上不應故三有所缺而悔也終吉者俞氏所謂三五同功五受上鉉而行三亦與之俱行是也失其義者漢五行志及虞翻并曰鼎以耳行耳革行塞也朱義以越五從上為失非象㫖矣九四鼎折足覆公餗其形渥凶象曰覆公餗信如何也足謂初四為諸侯上公之位餗者李鼎祚曰雉膏之屬是也亨以享帝養聖賢非適其私故曰公餗周禮醢人糝食注菜餗又筍菹注鄭氏云竹萌曰筍筍者餗之為芽八珍所用馬云䭈也按陳留謂䭈為鬻鬻非公鼎之珍矣形渥如程先生說與覆餗相連讀之四居大臣之位剛而不中下應陰柔故其象如此鼎量極于四其上則耳矣受實必有餘量以為溢地故三憂不食明不可復加也至四則溢而覆矣初未實鼎則顛趾利出否四已實鼎故折足為凶語其位也信如何以其應初非所信而信也六五鼎黃耳金鉉利貞象曰鼎黃耳中以為實也六五中而不亢柔而有容故曰黃耳五變體乾為金鉉所以扛鼎者宋衷互兌非也虞翻謂三貫鼎兩耳乾為金朱先生因謂下應九二之堅剛非也三非鉉二亦非鉉也九二之實利在于行而不食故六五之耳利在于貞而不行上九鼎玉鉉大吉無不利象曰玉鉉在上剛柔節也九家震為玉上變體震為玉鉉或曰乾為金玉五下應二三互乾故有金玉之象宋衷曰玉貴于金上尊於五故以别之然二三非鉉也吳俞皆曰五謂上為金鉉上乃自為玉鉉滋不達於義矣上九離成炎極鉉者玉而後可三以不食為憂故上耳得玉鉉則大吉無不利或曰鼎象也全體一鼎分上下體則為二鼎上體之鼎有耳而無足故曰折足下有足而無耳故曰耳革證衍文據郭京舉正彖傳衍而大亨三字震震下震上震亨震來虩虩笑言啞啞震驚百里不喪匕鬯吳氏曰乾陽君也坤地國邑也分乾之一陽以主坤國邑諸侯之君也一陽象雷二陰象百里之地下震象匕互坎象鬯互艮象手執之鄭康成曰人君于祭之禮親匕牲為鬯而已其餘不親為也彖曰震亨震來虩虩恐致福也笑言啞啞後有則也震驚百里驚逺而懼邇也出可以守宗廟社稷以為祭主也俞氏曰遠謂卦之外體邇謂卦之內體內外皆震有遠邇驚懼之象象曰洊雷震君子以恐懼修省初九震來虩虩後笑言啞啞吉象曰震來虩虩恐致福也笑言啞啞後有則也成震之主故爻辭與彖同六二震來厲億喪貝躋于九陵勿逐七日得象曰震來厲乘剛也二雖乘剛然柔順中正足以自守故其象如此億余氏云大也謂􅀈辭億度皆非占用其變則互離億螺蚌貝也躋于九陵在互艮之下故稱陵震為足足乘初九故稱九陵虞氏說是也勿逐七日得胡氏云二至上上至二七數困學記薛氏云易以初爻為七日舉前卦而言也震之七日得亦初爻蓋得之虞氏乃曰四已體復故喪貝勿逐此自謂二何關於四哉至謂震數七離為日故七日則震數之七亦未了然見其所出若干寶以書誕保受命七年之語因為七年之日益于卦象不相謀矣蘇氏曰初九之威不可犯也來則未危故雖喪貝而勿逐躋於九陵以避之初不遂其震而繼之笑言故七日可以得所喪喪貝以明初之威七日得以明初之不以威窮物也六三震蘇蘇震行無眚象曰震蘇蘇位不當也四震則近上蘇言下震之聲將盡下蘇言上震之聲復生位在二震之間故其象如此互坎疑于多眚然居震動之上又動則坎象不見逺於敵應居外而震不能及故無眚矣九四震遂泥象曰震遂泥未光也遂依荀氏本作隊泥虞氏曰坤土得雨也位在於陰坎中而震隊泥之象與屯五同故未光陸氏以去聲讀泥非也六五震往來厲億無喪有事象曰震往來厲危行也其事在中大無喪也初始震為往四洊雷為來五當震往復來之時厲雷聲之厲也億大也余氏象以大無喪釋之則億喪貝亦大也六五雖往來皆厲而隊泥之威不復如二之喪貝黃東發稱鄒氏之說而不知自蘇氏出也上六震索索視矍矍征凶震不于其躬于其鄰無咎婚媾有言象曰震索索中未得也雖凶無咎畏鄰戒也重震之極雷聲漸小而消散故曰索索上變體離故曰視然本自震來故矍矍不定以陰柔處震衰懾其餘威而征以避之則四將益張故凶無九四墜泥之威止可及五而不能及上可以戒而無咎勿庸征也六爻皆無應四得據二陰而有之則四上之婚媾也四始欲以威克然墜泥而不能繼則及於上六有言而已震為善鳴故有言象蘇氏曰六二喪貝而五無喪六三震行無眚而上六征凶九四之不及初也逺矣證字據荀氏遂泥作墜泥證音據荀氏泥作平聲讀艮艮下艮上艮其背不獲其身行其庭不見其人無咎背北堂身所隱息也在庭之後謂上九身謂六四虞翻李鼎祚曰艮為多節故稱背非也艮為門闕門闕之間乃庭中之象謂三也三當人位坎為隱伏故行其庭不見其人虞翻以觀坤為身觀五之三折坤為背故艮其背坤象不見故不獲其身則亦見曲學大甚矣朱先生為動靜各止其所而皆主夫靜所以無咎夫茍動靜各止其所則是傳所謂光明之道矣何但無咎哉且既各止其所則主靜之云似為剩語矣彖曰艮止也時止則止時行則行動靜不失其時其道光明艮其止止其所也上下敵應不相與也是以不獲其身行其庭不見其人無咎也艮雖以止為義而卦象一於止者上當陽窮故止三體互震為行此光明之道也孔子於釋彖辭之象别贊艮道如此與文王彖㫖少異止其所下乃釋文王之辭背乃止之所上下敵應釋不獲身行庭不見人之義八純皆敵應而獨艮言不相與者艮主乎止也艮其背則其止有所矣艮止之義廣艮背之義狹也或曰易背為止之說何如曰朱先生本王弼謂易背為止明背即止而項氏玩辭曰弼以前無艮其止之說按古文背字為北有訛為止之理然則朝氏謂依卦辭作背是也故必察光明與無咎之分而背止之義乃可以别矣象曰兼山艮君子以思不出其位初六艮其趾無咎利永貞象曰艮其趾未失正也六隂柔居下而能靜者蘇氏曰趾能靜而聽於腓者也艮趾不害於腓之動止而聽腓之行止以為節艮之正也故利永貞非朱義戒辭之意利永貞之為言即傳未失正之意也六二艮其腓不拯其隨其心不快象曰不拯其隨未退聽也拯依一行作拯馬云舉也二以陰居陰而材本柔有上下敵應有不能舉五之象二之所隨謂五也其心不快坎有心加憂之象二下而五上故云退未退聽坎為耳也虞翻王弼俱指初為隨程朱二先生俱曰三非九三艮其限列其夤厲薰心象曰艮其限危薰心也馬虞云腰束帶處為限謂三居二體之間如戶限列當依孟喜作裂夤當依荀氏作腎互坎象艮三本止之主然互震而動故有裂夤之象也薰依虞翻作閽閽守門人艮象坎盜動門故厲閽心古閽熏通荀氏為勳或作動皆非今按公羊閽殺吳子作熏殺則虞說是也熏說文訓火上出出馬因言熏說其心未聞易道以坎水熏灼人者震以動為主而所主之四互坎故中未得艮以止為主而所主之三互震故為熏心易之所貴時止時行耳六四艮其身無咎象曰艮其身止諸躬也爾雅身紳也總括百骸止諸身則無方矣舊讀為大妊有身之身不然止諸躬王伯厚云偃身為躬見躬而不見面說文躬從吕從身吕背膂也猶言艮諸其背耳爻言艮身則其義不止無咎也而僅曰無咎故象以止躬明之以四之位正可當背故也或曰股上膈下前臍腹後腰膂腎所在處乃生身之所由始呼吸之根氣所從生止其身則氣住而神亦住四以柔居柔專氣致柔者所以止其身也亦通六五艮其輔言有序悔亡象曰艮其輔以中正也以柔居中故其象如此虞翻曰艮為止在坎車中故艮其輔輔車相依猶輔頰也言有序互震為言也正依朱義作羡文以上下叶韻得之胡仲虎曰咸多象面艮多象背上九敦艮吉象曰敦艮之吉以厚終也證字據朝項并古文彖傳艮止作艮背據子夏一行拯隨作隨據孟喜列夤之列作裂據荀氏裂夤之夤作腎據公羊及虞氏薰心作閽心證衍文據朱語録中正之正羡文漸艮下巽上漸女歸吉利貞彖曰漸之進也女歸吉也進得位往有功也進以正可以正邦也其位剛得中也止而巽動不窮也吉下依王肅本也字羡文下脫利貞二字漸之進也女歸吉也進得位往有功也此明女歸之吉也進得位者巽往居外得長女代母之位橫渠指為六四是也朱義以渙九進三女九進五者非女歸之義矣若湛子謂二以柔順居中以上承陽則於進義不明又艮為少男亦難取女義俞氏指為歸妹倒體三進為四則雖近似然易之倒體多列正卦於先而後著倒體之象今漸在歸妹之先疑非其義矣進以正可以正邦其位剛得中此明利貞之義也謂女進以正刑于之化可成因可正邦其位剛得中明婦道無成正邦之功因九五剛中非四所能專也前明漸之意故曰進得位後明漸之貞故曰剛得中所指各不同也止而巽動不窮內不止非漸之道外不巽非進之道楊敬仲曰止者寂然不動巽者隨時順理止非强止道心無體本無可動變化進退巽動無窮雖動猶不動也朱先生曰自二至五皆得正又曰自渙九進三旅九進五皆得正殆不然矣象曰山上有木漸君子以居賢德善俗居賢德善俗郭京舉正云注曰賢德以止巽則居風俗以止巽乃善今本正文脫風字也初六鴻漸于干小子厲有言無咎象曰小子之厲義無咎也初稱鴻婚禮納采用鴈鴻鴈之大者彖言女歸吉故爻因之以取象也李鼎祚曰自二至五體有坎離離為飛鳥而居坎水鴻之象也干者虞翻曰小水從山流下之稱艮為山為小徑坎水流下山故鴻漸于干也小子厲有言艮三索得男為小子艮又為言也初六遠則無應近則遇二兩陰不能相容故小子厲有言然漸道當然非志于利者故無咎也六三鴻漸于磐飲食衎衎吉象曰飲食衎衎不素飽也磐依漢郊祀志作般孟康云般水涯堆二當互坎可稱水涯之堆虞馬謂艮為山石非也互坎為飲二變互兌為食朱義漸遠于水進于干而益安夫鴻水鳥也據于石則又何飲食乎楊敬仲曰人情大抵好進惟有道者不然飲食衎衎疑于不事事而素飽故象釋人之疑曰不素飽也九三鴻漸于陸夫征不復婦孕不育凶利禦寇象曰夫征不復離羣醜也婦孕不育失其道也利用禦寇順相保也爾雅高平曰陸水中平地三動則成坤故為陸夫指三鄭𤣥云坎為丈夫水流而去虞翻曰三動陽死坤中坎象不見也陽本上物艮止于下之象婦指四巽為婦離為孕三動成坤離毁失位亦三近比四無以正室孕子之象利禦寇離為兵戈甲胄坎為寇盜秀巖李氏曰四非婚乃寇是也自下禦上三動坤順坎象不見而又艮體而止巽順物莫能違故利用禦寇也蓋動與不動皆有其象矣六四鴻漸于木或得其桷無咎象曰或得其桷順以巽也四巽體為木之餘去艮山髙而遇工為繩直方斫有梴桷之象也巽為進退故漸木而或得其桷李鼎祚謂四爻陰位正象桷是也俞氏指三非矣卦以漸為義漸木者進得位卦之正也爻以巽為主得桷者所以成巽也故象獨曰順以㢲九五鴻漸于陵婦三嵗不孕終莫之勝吉象曰終莫之勝吉得所願也爾雅大陸曰阜大阜曰陵釋名謂體崇髙以其在艮之上虞氏曰四體半艮山故稱陵非也巽為婦離為孕坎為嵗二歷三四至五為三嵗虞翻謂三動此自言五耳何與三哉三與五皆言婦三凶而五吉何也俞氏曰五與二應乃夫婦之正配故吉三與四比乃夫婦之邪匹故凶也上六鴻漸于陸其羽可用為儀吉象曰其羽可用為儀吉不可亂也范諤昌證墜簡疑陸字誤胡氏程氏遂作逵楊敬仲曰非也上九之應在三三為陸上爻體巽之極故降而處陸退巽如此故其羽可以為人之儀則其曰不可亂者人心為進退得失所亂則貪進不克退巽能退巽則其心不為進退得失所亂矣證字據郭京善俗脫風字證字據朝氏磐作般證字據楊氏上六陸仍作陸歸妹兌下震上歸妹征凶無攸利彖曰歸妹天地之大義也天地不交而萬物不興歸妹人之終始也歸妹震長兄出而用事將嫁在內兌之少女也吳氏指六五在女家為震兄所歸之妹九二在夫家為兌女所從之夫然非卦義也漸女歸巽外之辭歸妹兌內之辭也天地不交俞氏曰九四陽爻在上卦二陰爻之下六三陰爻在下卦二陽爻之上人之終始胡氏曰兌為少女女之終震為長男男之始也說以動所歸妹也征凶位不當也無攸利柔乘剛也依陸氏所下脫以字恆情歸妹與嫁女巽說以動所以歸妹之道也或誤指震為兌夫失卦名義且就震言說兌色而不知說非震就兌言動於欲而不知動非兌也象曰澤上有雷歸妹君子以永終知敝俞氏曰歸妹女之終兌毁折敝也互離為明所以知其敝而永其終也初九歸妹以娣跛能履征吉象曰歸妹以娣以恆也跛能履吉相承也以如江汜不我以之以三反而以娣也虞翻曰震為兄故嫁妹謂三是也初在三下動而應四故稱以娣恆卦名以恆者初三易位則成恆言三能用恆之道以下逮也跛能履初動成坎則三為曳跛三雖能履有初之助象所謂相承之道也九二眇能視利幽人之貞象曰利幽人之貞未變常也九二剛中非眇者眇謂六三也虞翻曰震上兌下離目不正故眇能視蘇氏曰六三不中居非其位跛眇者也初二屈為之娣而各致其能使三得之以履且視蓋上下之常分故象曰以恆曰未變常曰吉相承皆妹之道也已有能而不用使無能者享其名則九二幽人也六三歸妹以須反歸以娣象曰歸妹以須未當也天官書須女四星賤妾之稱故子夏孟宗皆作娣媵之妾上六陰爻無位須女也三以說主而應之故稱以須虞翻謂自初至五體需象非也鄭𤣥有才智之稱亦非也震為反反歸歸馬也初二處三之下三忽其剛而乘之蘇氏曰六三不知托行借明于初二自謂能履視也是以棄娣而用須須未足當娣也失二娣之助則以跛眇見黜宜矣歸然後知用娣故曰反歸以娣當依秀巖李氏作平讀九四歸妹愆期遲歸有時象曰愆期之志有待而行也四互坎月離日為期四變日月不見故愆期虞翻謂三非本爻占變也坎為曳震為行行曳故遲歸震春兌秋坎冬離夏四時體故歸有時四長男為歸妹之主將為三擇配而上無正應此其志不無有所待矣諸家指四為賢女失卦名義矣六五帝乙歸妹其君之袂不如其娣之袂良月幾望吉象曰帝乙歸妹不如其娣之袂良也其位在中以貴行也帝乙謂震主九四所歸之妹乃五蓋王姬也又别取義虞翻謂震帝神乙者大妄君女君亦謂五乾為衣一衣二袂乾三畫皆奇變其外一奇為偶者袂之象下卦六三娣之𬒮也六五變為奇則上六女君之袂裁改而成不如六三之袂自成者之良也娣以容為悅非制遇之謂月幾望坎月離日兌西震東日月相望故曰幾望幾望而光未足柔德居中而謙也上六女承筐無實士刲羊無血無攸利象曰上六無實承虛筐也女指兌之三震竹為筐三承上筐變則火動而上筐無實也震長男為士上自謂上變離為兵戈兌為羊上刲三之羊卦三至五為坎血在羊上刺無血之象謂無應也按宗廟之禮主婦執筐米房中之俎后夫人職而言女不成為婦也士刲羊無血禮君親割牲取血今無婦不成為祭故不稱夫也卦無攸利指三四位不當言爻無攸利指三上無應言證脫文據陸氏所下脫以字證音據秀巖李氏當作平讀豐離下震上豐亨王假之勿憂宜日中彖曰豐大也明以動故豐王假之尚大也勿憂宜日中宜照天下也日中則昃月盈則食天地盈虛與時消息而況於人乎況於鬼神乎故豐之豐據林栗蔡抗作亨假大也楊敬仲云孔子有言古之治天下者必聖人上則天下則地中則人人之聖者為王王者代天理物日月所照霜露所墜皆王者所統周官職方氏盡長天下極于四夷八蠻七閩九貉五戎六狄之人民與其財用九榖六畜之數要周知其利害王者之職乃如此其大也是故王者惟恐其不大故象曰尚大也然則假當如馬融作古雅反讀之以應傳尚大之義勿憂其智力不足給宜如日之中天日無思無為自無所不照也朱先生曰王者至此盛極當衰則又有憂道若此者苟以示戒焉可也而非處豐之道矣月盈則食者世之卦六月弱得其交㑹之真數可占食分淺深矣盈虛消息三六積而極於六其解詳見繫辭況于鬼神疑羡文易稱三才之道至天地人止矣乾文言以天地日月四時鬼神並列之謙彖傳以天地鬼神並列之此所謂二氣之良能者别而言之則天地日月鬼神可悉數合而言之則天地日月消息盈虛之幾即鬼神也而于三才之後復列鬼神不既贅乎劉向說苑引孔子告子夏曰豐明而動故能大茍大則虛矣日中則昃月盈則食天地盈虛與時消息即繼之以聖人不敢當盛而已無人與鬼神之語向號博極羣書豈見古易耶虞翻不知以人謀鬼謀明之既已不協而程先生遂以造物之迹為言不復玩其上下辭㫖矣象曰雷電皆至豐君子以折獄致刑初九遇其配主雖旬無咎往有尚象曰雖旬無咎過旬災也俞氏曰陰乃陽之配以九遇六配也六二乃下卦離之主爻故言主是也諸家皆指為四非以其非應故曰遇雖朝以道云當作惟古文本作惟何子六云惟易中作唯從口因誤作雖或然也旬十日也按鄭氏十日者朝聘之禮止於王國以為限禮畢歸禮曰旬而稍旬之外為稍久留非常也豐以明動相資為義二於初非正應久留無益故過旬則災也古文旬從勻從日說文云偏十日不以訓均陸氏謂旬均程先生從之不然也尚與得尚中行之尚同言其所配之四也六二豐其蔀日中見斗往得疑疾有孚發若吉象曰有孚發若信以發志也蔀􅫟蔀草名馬云小也蔀雖豐亦小矣二成離之主而上應陰暗無以相資故有此象六九相比故曰遇二五相應故曰見斗孟作主說卦震為主六二當日中明盛之時而見五之主五暗故往得疑疾二虛明不雜故者孚信以發五之蒙而居也朝以道曰主古文斗字不然離雖六二而成豐之所資也縱遇暗主何遽至日中見斗哉吳氏以震仰盂有斗象而四蔽五光為斗見雖因劉牧日君斗臣而演之然亦鑿矣九三豐其沛日中見沫折其右肱無咎象曰豐其沛不可大事也折其右肱終不可用也公羊傳草棘曰沛楊敬仲曰水生之草無有不茂九三所事乃極暗則其所謂豐者如沛而已其小甚于蔀也虞氏曰在震下為沛雲石氏又訓為之水沛然皆非象㫖矣沫韻㑹云微晦也三明極將衰故有微晦之象諸家或改沛為斾改沫為昧謂斗柄後小星非也右肱依姚信作右股互兌為折三變則互艮為股鄭氏曰互巽而便於進退為右股亦非也象㫖辨見說卦按師左次明夷左股左腹皆指陰爻則陽爻右也終為上六蘇氏曰沫小明也上六明暗雜君子不畏其敝而畏其雜以為無時而可發也為之用乎則不可不為之用乎則不敢故折其右股以示必不可用而後免也九四豐其蔀日中見斗遇其夷主吉象曰豐其蔀位不當也日中見斗幽不明也遇其夷主吉行也九四以陽居陰位已不當又明盛而衰之時故亦有豐蔀之象維北有斗于互坎幽陰之方而為帝車運中順晦明以建德故於四近臣之地言之也非正應而相比曰遇同體曰夷如醜夷之夷震為主故云夷主指五也諸家皆謂等夷指初劉牧之言曰初炎上四動以應之為一卦等夷之主陸希聲云初言配主恭四言夷主謙皆非經義虞翻李鼎祚稍窺其意不能明了若朱先生既以初為同德之夷主復云當盛遇暗則又似指五言之矣九四位不中正與六二異豐蔀乃自致故獨言位不當吉行者言近而相得九四剛明之才當有所行又震動為行也郭氏舉正謂行上脫志字理或然矣石守道曰四雖幽暗而遇夷主是以志行而言六五來章有慶譽吉象曰六五之吉有慶也來章指九四者吳曰五柔下求四剛陰陽相間成章也劉牧謂乘四之明四來章明於己非矣有慶譽朱子發所謂五兌為口譽之者是也上六豐其屋蔀其家窺其戶閴其無人三嵗不覿凶象曰豐其屋天際翔也窺其戶閴其無人自藏也豐屋依說文漢書作豐大屋也虞翻曰豐大蔀小以三至上體大壯屋象故豐其屋四五已變上動成家人大壯屋見則家人壞故蔀其家非也震於大壯為棟宇有屋象屋於室為外上以陰處極而最在其外故也家指九三在內者蔀其家吉蔀生其家戶謂九四闢戶六五闔戶戶在家之外而屋之內也離為目目而近戶窺之象也李鼎祚以上應三三互巽為戶易象巽不為戶矣既屋豐家蔀若窺地戶閴其無人上厯位三下窺其應故稱三又適得正木數也際依鄭作瘵翔依鄭王肅作祥藏依鄭作戕謂天病之以惡祥也猶高明之家鬼瞰者以翬飛釋之非也九三剛明之人使之自折其股而莫之用豈真無人哉有其人而不能下以求之蓋上六自戕之也孟子曰不祥之實蔽賢者當之證字據林栗蔡抗豐之豐作亨據姚信九三右肱作股據鄭氏際作瘵字鄭𤣥王肅朔作祥也據鄭氏藏作戕證衍文據說苑彖傳况于鬼神乎衍證脫文據郭氏舉正行也上脫志字證音據馬融假作古雅反旅艮下離上旅小亨旅貞吉小謂陰指五也俞氏曰家人與旅以離外取義內離外巽入而麗乎內家人也內艮外離止而萌乎外旅也旅小亨謂在上者之旅六五是也旅貞吉謂在下者之旅九三是也故彖辭兩言旅以别之俞氏論是也彖曰旅小亨柔得中乎外而順乎剛止而麗乎明是以小亨旅貞吉也旅之時義大矣哉旅以外為義故先以卦外體明之謂六五柔得中乎外與他卦柔得中于內者異順剛五承上也不折不廢是以為亨或謂雖得所托而非應不成大功非也九三本處多凶之地然材雖剛而能止應雖剛而體明止以麗明非妄動者羈孤窮困不足纍之矣石澗易或疑彖傳衍上小亨而俞氏辨其非愚謂正衍上小亨不足辨也辭與旅皆總陳卦義而結之曰是以故知當作二句分說而衍上小亨象曰山上有火旅君子以明慎用刑而不留獄初六旅瑣瑣斯其所取災象曰旅瑣瑣志窮災也瑣瑣鄭𤣥王肅云小也艮為小石故瑣瑣今按朝以道云瑣瑣玉聲亦小石意斯者役之賤者也古謂折薪為斯上應離故取斯義斯者初自謂其指三所取謂二蘇氏曰羈旅之世物無正主近則相依自九三至上九皆陰陽相憐故三之所謂在三初六窮而無依𨽻於六二三焚其次并以及初故曰斯其所取災也六二旅其次懷其資得童僕貞象曰得童僕貞終無尤也九家易曰以陰居二即就其舍承陽有實故懷資懷資不露善處旅而免禍矣童僕謂初艮為小子故僕稱童僕李鼎祚曰六二履正體艮艮為閽寺童僕貞之象也二因三之助以𨽻初故得童僕初雖四之應而四為三所隔終豈有尤之者哉俞氏曰貞當自為句周禮太祝祈永貞貞亦占之美辭愚謂此意象也黃楚望所謂象外之象者必此類他爻放此九三旅焚其次喪其童僕貞厲象曰旅焚其次亦以傷矣以旅與下其義喪也虞翻曰離為火三動艮壞故焚其次艮為童僕坤為喪三動艮滅入坤故喪其童僕旅與下謂初蘇說是也其謂六二我之次非也次指三所處者二即而三焚二去離火稍遠而三近也二得童僕而三喪二去初甚近而三則遠矣其相反者俞氏所謂六二柔得中九三過剛而不中也據六二喪其童僕貞為句程傳是厲謂以嚴厲失之也以依鄱陽胡氏作已傷謂已見傷于上而復不敢以待下也九四旅于處得其資斧我心不快象曰旅于處未得位也得其資斧心未快也處猶詩爰處之處徐氏曰居者已定居處者暫住而已李鼎祚曰九四失位而居艮上艮為山非平坦之地是已四體兊巽巽為木兌為金木貫於金即資斧斫除荆棘之象我心不快四動互坎為心虞翻謂二動非己所乘者剛不得其所而得其資斧之地故其心不快是謂差强于三不及二矣六五射雉一矢亡終以譽命象曰終以譽命上逮也雉謂上焚巢之鳥干寶曰離為雉為矢互兌為決矢決于外射雉之象外上也一矢亡虞翻曰五變乾體矢動雉飛雉象不見故一矢亡程先生所謂發無不中蓋射以一矢而即亡其雉亡之言死也終一卦之終指上也傳曰卒成之終謂是矣象稱上逮明上即終也以用也五成離之主為言而互兌說則其言譽命也上居旅之成而五柔德而能順其剛則上以譽命歸之說㫖以謂無正位之實仲尼旅人近之石守道曰止能逮及于已蓋能承順于人是也虞翻曰譽謂二巽為命六五即次于二二多譽上逮者二之逮五非矣五旅于外順剛之不暇焉能次二者乎上九鳥焚其巢旅人先笑後號咷喪牛于易凶象曰以旅在上其義焚也喪牛于易終莫之聞也鳥焚其巢侯果曰離為鳥為火巽為木為風鳥居木上而遇火焚巢之象也旅人九三也三於六爻居人位兌為笑離號咷也三四五互兌在下離在上是先笑後號咷之象謂震為笑上變則成震象在前故先笑應在巽巽為號咷象在後故後號咷者非也上者三之所次三之焚次亦已傷矣徒以艮狠過剛之資直前而不察蓋至于止而后知之始號咷也離之彖曰畜牝牛吉六五之謂牛矣居卦成處離極炎上驕亢而下不比五故喪失之易者上居一卦之窮疆易之象旅人牽車牛服賈而喪諸境外也終謂卦終莫之聞用離明不用坎順也吳幼清曰卦惟三五為旅人初言其時二四上言其地處旅之道宜柔不宜剛五柔而中三剛而過是以五得材得人而譽命三既無可居又不可行而凶也證句據俞氏六二貞字自為句據六二爻辭及程傳喪童僕貞為句證誤據鄱陽胡以傷已傷證衍文據石澗易彖傳衍下小亨二字巽巽下巽上巽小亨利有攸往利見大人彖曰重巽以申命剛巽乎中正而志行柔皆順乎剛是以小亨利有攸往利見大人重巽以申命朱子發曰內巽者命之始外巽者申前之命也朝以道徐氏新義申命之下有命乃行也一句誤寫入按注唐郭京舉正徐氏同何子元云王弼本注命乃行也未有不巽而命行也今連二句讀之上句在注實贅矣剛巽乎中正而志行者申言之耳陸績曰二得中五得正體兩巽故曰剛巽乎中正皆據陰故志行自王輔嗣而下皆同獨朱義從虞仲翔指九五非也或疑二五象傳得中正中而欲從虞朱豈知象據一爻彖指全體而重申皆論六畫卦哉柔皆順剛統一卦言小亨者陰為卦主陸績言是也所以為巽者初與四也二五雖據用事之地而權不在焉故曰剛巽乎中正而志行言必用初與四而後得也權雖在初與四而非用事之地故曰柔皆順乎剛言必順二五而後亨也利有攸往利見大人見二五也有其權而無其位非二五之大人孰能容之大人如乾二五皆稱焉蘇獨指九五非也項氏玩辭曰重巽以申命是小亨也事必待申命而後行豈大亨之規哉剛巽乎中正而志行是利有攸往也柔皆順乎剛是利見大人也象曰隨風巽君子以申命行事初六進退利武人之貞象曰進退志疑也利武人之貞志治也武人與履武人同皆以陰據陽者虞翻謂乾非也初六柔故疑而進退位剛故志治九二巽在牀下用史巫紛若吉無咎象曰紛若之吉得中也二以陽居隂巽而得中之象如此宋衷曰巽為木二陽在上初陰在下牀之象是也巽義伏二無應于上兌而據初心在於下故曰巽在牀下也用史巫紛若按說卦初兌也史指三巫指四二與四三與五同功而異位而二五兩剛本不相應俞氏所謂非用三四不能達者是也三逺五故為史以達二意于五所謂祝以孝告也四近五為巫以達五意于二所謂嘏以慈告也九三頻巽吝象曰頻巽之吝志窮也三變則互坎艮虞翻曰坎為憂艮為鼻故頻巽無應在險故吝也蘇氏曰九三以陽居陽而非用事之地知權之在初六也下之則心不服制之則力不能故頻蹙以待之也志窮者荀爽所謂乘陽無據為陰所乘號令不行故志窮蓋得之矣六四悔亡田獲三品象曰田獲三品有功也六四居陰得正又在上體之下免於乘剛之悔程先生謂乘剛有悔非巽義矣翟云三品下三爻也初巽為雞二兌為羊三離為雉也四居五下巽順盡事君之禮故初二三皆順之諸家援穀梁乾豆賔客君庖之說非象意也虞翻知取象然狠豕之說牽强不通矣九五貞吉悔亡無不利無初有終先庚三日後庚三日吉象曰九五之吉位正中也五有其位而能以巽乎中正故象如此俞氏曰卦互兌為口所以造命也兌居西方故言庚初在互兌三畫之先先庚三日也五在互兊三畫之後後庚三日也俞庚義取馬融先後義取虞翻而少度之然獨明暢矣先後依陸氏俞氏俱去聲讀馬融曰八卦兌西為金巽互兌而五在兌上故言庚十干戊己土餘八日為萬物終始甲者始之始庚者終之始此其說獨可言庚耳而於先後三日了無所關虞翻謂巽變初至二成離至三成震震主庚離為日震三爻在前故先庚三日變四至五成離終止成震震三爻在後庚三日以震言巽辭益紆曲李氏易傳舍馬而取虞豈為巽究為躁卦耶陸氏曰甲庚者皆申命令之謂甲者德政也蠱以四德創制彖言其正曰先甲後甲所以原始要終也庚者政刑也巽以小亨申命故爻言其變曰先庚後庚所以信而審之也甲出也庚更也以庚變甲天之道也先後三日使知其意審其令也蠱先甲後甲而以為終則有始巽先庚後庚而以為無初有終何也俞氏曰甲者十干之首事之端也既亂而復治則又如其初故于蠱之甲曰終則有始庚者十干之過中事之當更者也始焉不善既更而後善故于巽之庚曰無初有終其義各有所取也上九巽在牀下喪其資斧貞凶象曰巽在牀下上窮也喪其資斧正乎凶也上九不中不正居巽之極巽牀將以圗四也喪其資斧應在三三互離為資斧也兩陽不相入故其資斧喪矣證脫文據郭徐朝何申命下脫命乃行也四字證音據陸氏俞氏先後俱去聲讀兌兌下兌上兌亨利貞兌說也不謂之說而謂兌者胡翼之曰聖賢感天下之心不可以言語口舌故去其言而為兌也彖曰兌說也剛中而柔外說以利貞是以順乎天而應乎人易有天道焉順天謂上兌有人道焉應人謂下兌說以先民民忘其勞說以犯難民忘其死說之大民勸矣哉先民者下兌犯難上兌自三至上若坎也象曰麗澤兌君子以朋友講習敬軒薛氏曰麗澤互相浸灌講習互相益初九和兌吉象曰和兌之吉行未疑也兌六爻以相比取義初和兌者比九二剛中之人兩陽相與和而不流故吉九二孚兌吉悔亡象曰孚兌之吉信志也二剛而得中雖比六三而能下與初九同德相孚說之以道故吉而悔亡蘇氏曰君子之說與小人將以有濟非以為利也初九以遠三為無嫌至九二則初九疑之矣故必有以自信於初九者而后悔亡文與而實不與所以信於初九也六三來兌凶象曰來兑之凶位不當也之內為來六三陰柔不中正以九二不與己比乃來比下以為悅位不當者俞氏曰巽正位在四乾在五坤在二震在初離在二艮在三坎在五兌在六也九四商兌未寧介疾有喜象曰九四之喜有慶也商謂隱度四互巽進退之象石守道取西方金剛斷之義不然也介俞氏讀為句四與三上下異體猶疆介然者矣疾三陰邪朱義介然自守疾惡柔邪是也四位柔而才剛故象如此九五孚于剝有厲象曰孚于剝位正當也剝謂剝卦上六以陰據兌極妄說剝九月屬剝兌之九五正當剝之六五也厲者五以陽剛中正雖孚剝而有威嚴也當依俞氏作平讀上六引兌象曰上六引兌未光也上六成卦之主居說之極引于九五陰不自守說而忘返之象三上皆陰質以說為事也六三履非其位而介二陽以求說為兌劉牧曰兌體趨下是也夫初二不招三而自來兌則其心易知其為害淺故二陽皆吉而六三凶上六超然物外匿其情而託于無求以為兌者故九五引之而後至也其心難知其為害深故九五孚於剝上六有所作好失光明之德矣蘇氏以引而不兌為光失之證句介余氏讀為句渙坎下巽上渙亨王假有廟利涉大川利貞彖曰渙亨剛來而不窮柔得位乎外而上同王假有廟王乃在中也利涉大川乘木有功也坎剛卦也巽柔卦也陽剛本居上今在下體故言來內辭也窮極也陽來在下之中不至窮極也柔得位乎外謂巽居上體當用事之地上同者四成巽之主又與五同德也始朱先生謂卦變自漸來也已復云不見三來居二之為安二之三為得位也于是蔡氏本盧氏虞氏之說云柔得位乎外而上同四也俞氏曰朱義專取兩爻相比相易故失正義賁渙其最著者要當隨地而觀爾彼損益皆卦變固不可用比易之例遂止曰卦體疑皆未然余氏說固亦非也哉乘木上據郭京脫利貞二字象曰風行水上渙先王以享于帝立廟初六用拯馬壯吉象曰初六之吉順也拯子夏作拯字林云舉也唐陽於陵傳拯贍貧民二方在險中初思上舉之也二本以初三為險而當渙之時三已志外渙而去之不成為險故初同病相憐思舉乎二也說卦坎為馬六質柔而履初剛履剛者乘壯馬也吕仲木因傳義謂順九三壯馬夫在險之馬何足稱壯哉蘇氏謂渙之初六有馬不以自乘而以拯九二忠順之至蓋近之矣初不言渙救之早也九三渙奔其機悔亡象曰渙奔其機得願也機二自謂也虞翻曰震為奔坎為棘為矯輮震為足輮棘有足艮股據之憑機之象二體剛中之德雖居渙時而願上同故渙去其杋以就五俞琰謂互震有動而出險之道為庶幾矣朱先生謂九奔二機以九為奔誤因卦變之說若先儒指五為機程先生謂二陽不能同于渙時而指初皆非也六三渙其躬無咎象曰渙其躬志在外也六三渙躬坎體之上險將脫也渙之諸爻獨六二有應于上三能求援而出離乎險象所謂志在外是也六四渙其羣元吉渙有丘匪夷所思象曰渙其羣元吉光大也渙羣者謂既不應初又不比三也丘薛氏朱氏訓聚謂五互艮也六四成巽之主以入為志故渙羣獨往衆知嚮方而聚之五夷者等夷謂初三也蘇洵有言羣者聖人之所欲渙以混一天下者則誠非等夷所能測矣虞氏曰渙羣雖則光大有丘則非平易故有匪夷之思非爻義也九五渙汗其大號渙王居無咎象曰王居無咎正位也九家易二坎水汗之象陽稱大故曰渙汗其大號是也主卦變否體乾為首來下處二成坎水者非或曰散人之疾而使之愈者汗也散天下之難而使之安者號令也汗心液也令出于人君之心而周浹乎四海猶汗出于人心而周浹乎四體也王居虞翻曰五為王艮為居是也彖言王假有廟此言渙王居相發之辭難既散而王假有廟則王有定居矣爻二渙俞氏指王居之渙為衍朱先生謂散其居積黃東發曰六三六四曰渙其躬渙其羣者有所指而散之故朱說為順此爻乃渙汗大號之下獨言王居不成文故再提卦名渙曰渙王居言九五渙之君位也故象曰正位似無散聚之意愚謂東發說近是已自荀爽虞翻王弼莫之有改也上九渙其血去逖出無咎象曰渙其血遠害也據象傳渙其血為讀諸義渙其血去非簡輔逖出無咎亦非虞翻曰應在三坎去逖出言去而遠出即象傳所謂遠害之意上居渙之終去坎遠故象如此凡在險中者貴乎出險在險外者戒乎入險三上之别也程傳血下脫去字者非朱先生欲改逖為惕按陳文友曰遠害是以遠釋逖字也若從小畜經文逖改惕字於此未安證脫文據郭京乘木上脫利貞二字證衍文五王居之渙衍證句據象傳渙其血為讀去逖出為讀無咎為讀節兌下坎上節亨苦節不可貞彖曰節亨剛柔分而剛得中苦節不可貞其道窮也說以行險當位以節中正以通剛柔分坎上兌下坎剛而兌柔一剛一柔分居內外而各為之主也盧氏謂本泰卦分乾三上升五分坤五下處三郭雍馮椅皆祖其說朱先生謂三陰三陽皆不然也說以行險卦之所為節者兌也兌施節于坎故曰說以行險九五居尊能受兌之節而五又成坎之主坎為通故曰當位以節中正以通天地節而四時成節以制度不傷財不害民天地有節則分至啓閉晦朔弦望四時不差而嵗功成史繩祖占畢以序卦定之曰自乾至節六十卦凡三百六十爻應當期之日而謂君子以制數度蓋有為言之是失也疑非易意矣象曰澤上有水節君子以制數度議德行初九不出戶庭無咎象曰不出戶庭知通塞也九二不出門庭凶象曰不出門庭凶失時極也六三不節若則嗟若無咎象曰不節之嗟又誰咎也戶庭李鼎祚曰初九應四四互艮艮為門闕四為內戶戶庭之象也門庭者二應在五五在艮之上而在外說文半門為戶雙扉曰門又外曰門內曰戶楊敬仲以為九二奇爻阻其前戶數奇六三耦爻處其前門數耦參而觀之當得木象但奇知其耦别門戶以為阻前者當之而不知即所居之位則亦未盡也若通釋以初為兌始卯時闢戶之象殆支且巧矣初二皆不出應皆互艮也蘇氏言節以澤節水者虛納滿流其權在澤初九九二六三澤也節人者也六四九五上六水也節于人者也水之未至澤當塞而不通既至當通而不塞故初九以不出戶庭為無咎言當塞也九二以不出門庭為凶言當通也以敵應不相與而不通則失時而至于極是也其言六三不節若以其居說之極溢而不節也則嗟若以其為節之主說以行險三所以說也故能嗟嗟則能節矣故無咎無咎者善補過也其誰咎之哉六四安節亨象曰安節之亨承上道也上謂五上道者五為坎主而能受節之道也吕仲木曰安言順也承而奉行之也九五甘節吉往有尚象曰甘節之吉居位中也土于味為甘五變成坤坤土按說文甘美也從口含一道也傳曰甘受和言五當尊而能受節如甘之受和也往有尚則數度德行自是制定中正以通矣上六苦節貞凶象曰苦節貞凶其道窮也苦讀如苦窳之苦國語辨其功苦韋昭以為脆是也澤以節水而坎之為水者五也上非用事之地坎之權不在焉故苦象傳道窮者是也虞翻乃謂二三變互兩離火炎上作苦故苦節何其紆曲遷就哉彖言苦不可貞故上六苦節而貞則凶也證誤字句音無訛中孚兌下巽上中孚豚魚吉利涉大川利貞中孚蘇氏曰如羽蟲之孚有諸中而後能化朱先生言字從瓜從子如鳥抱子之象蓋中所抱者實有物也豚魚者巽為魚而在兌澤之中以應巽風有江豚之象鄭康成曰三辰在亥為豕爻失正變而從小名言豚四辰在互為斃蟹魚之微爻得正故變而從大名言魚三體兌澤四上值天淵二五皆坎爻為水二侵澤則豚利五以水灌淵故魚利亥互豚魚既強生體例灌淵侵澤以無為有矣盧氏以三至上體遁便為遁魚李鼎祚既知其非虞翻復以互體取之謂艮為山豚所處三為兌澤魚所在少變鄭說而近世吳氏直謂江豚一物豫行江久矣風作則江豚吹浪是澤上有風之祥也大川兌澤之象巽木浮于兌澤之上舟楫之利故可涉大川彖曰中孚柔在內而剛得中說而巽孚乃化邦也豚魚吉信及豚魚也利涉大川乘木舟虛也中孚以利貞乃應乎天也郭京易舉正云豚魚吉信及也今本多一豚魚字俞氏曰及者近似之謂非施及之及也謂人之不失信比及于豚魚之信猶詩序德如羔羊之意乘木舟虛鄭以集板為舟空大木為虛按卦之陰中虛之象王輔嗣以為乘木于川舟之虛則終已無溺蘇氏云無心之謂是也所稱應乎天者何卦惟二陰所應皆陽陽者乾畫乾為天也象曰澤上有風中孚君子以議獄緩死議獄兌象緩死巽象獄成而孚輸而孚皆中孚惻怛之意也初九虞吉有他不燕象曰初九虞吉志未變也虞吉讀如歡虞之虞謂其樂信于四非如朱先生謂其能度也在中孚之象以相孚為義無能度之㫖吳幼清謂如虞人在澤不遠交而求孚于二既非爻義輔嗣以為得專吉亦復微有所不安矣有他不燕繫心于一不燕昵其他孚之志也金君卿曰燕當為變字或然矣九二鳴鶴在陰其子和之我有好爵吾與爾靡之象曰其子和之中心願也鳴鶴者互震為鳴為鶴虞氏謂離為鶴非㫖也在陰者師曠禽經以為鶴愛陰惡陽周書王㑹謂陰羽也朱義稱九居二者是已虞氏謂坎為夜鶴知夜半故鳴在陰今中孚豈坎象而必取訟以成其曲說哉其子和之俞氏曰鶴澤鳥二陰位三二同兌體二鳴三和也朱子發謂四二同體震九二陽大六四陰小有子象二四同志二鳴而四和虞氏曰震巽同聲相應故子和之或曰互艮為小子皆非也二有好爵謂其位得中天爵也爾指三吾我九二自謂也三乃兌之主爻二稱吾我而呼三為爾崇陽抑陰貴中而賤不中也虞氏以為五蘇氏謂為有爵者求我之詞非矣靡子夏傳陸績作縻巽為繩繫之象馮椅曰燕爵俱有飛鳥之象意疑其鑿矣六三得敵或鼓或罷或泣或歌象曰或鼓或罷位不當也敵匹敵謂四也與艮敵應之敵同彼以應言此以比言王輔嗣曰三居少陰之上四居長陰之下對而不相比以為敵朱程二先生謂上九皆非也或鼓者居互震之中欲進而鬬敵也或罷居互艮之下止也或泣不勝而退懼見侵陵震恐懼也或歌者喜敵同類震善鳴也六三才柔位剛半動半靜而又不中不正故有此象六四月幾望馬匹亡無咎象曰馬匹亡絶類上也四動互離虞氏謂月在兌三日在離四日月相對故幾望也王應麟曰幾望者在小畜之上以抗陽凶在歸妹之五以應陽吉中孚之四從陽故無咎也幾郭京作近孟荀一行作既孟云十六日朝以道曰古文讀近為既詩往近王舅是也此實當作近即幾望意孟荀云既不察爻意矣馬互震也四捨三比五有二馬而亡其一故象以為絶類上類謂二上者五也三四本陰類六三自以為得匹敵六四守而不與三比是絶其類于上也九五有孚攣如無咎象曰有孚攣如位正當也孚者五孚四與小畜九五皆得四援故同辭巽繩而艮手有攣象中孚之主當使萬邦作孚而專取六四四能絶類蓋正人也故五得無咎虞氏謂二在坎謂孚攣二使化為邦朱義因之據卦正互變動皆無坎體攣二雖取正應而頗非卦爻象㫖王輔嗣曰居尊主羣物其言亦大而無當矣故蘇俞以得四言上九翰音登于天貞凶象曰翰音登于天何可長也雞為翰音巽象居巽極在卦終登天之象王輔嗣曰音飛而實不從程先生因之朱先生為信極不知變其說皆有礙矣中孚之卦取中之孚飛而求顯鳴而求信非中者之孚蓋侯果所謂窮上失位信不由中者是也九二在陰而子和上九飛鳴而登天其道蓋相反也橫渠張子曰上處中孚之窮不久將變為小過初六故小過初爻曰飛鳥以凶證衍文據郭京舉正彖傳信及下多豚魚二字證字據金君卿不燕之燕作變據子夏陸績靡作縻據京氏朝氏幾望之幾作近小過艮下震上小過亨利貞可小事不可大事飛鳥遺之音不宜上宜下大吉彖曰小過小者過而亨也過以利貞與時行也柔得中是以小事吉也剛失位而不中是以不可大事也有飛鳥之象焉飛鳥遺之音不宜上宜下大吉上逆而下順也小過卦繼中孚中孚肖離離有飛鳥之象變為小過則肖坎坎見離伏見坎不見離則鳥以飛過但聞其遺音也何子元曰二畫鳥股上下四音鳥翼始朱先生今按此說始宋衷虞翻常譏切之自謂離鳥指晉上之三以佐其言則虞固曲說也若朱義緣洞林謂有羽蟲之孽則亦均矣依俞氏吉上衍大字依郭京舉正是以下脫可字事下誤增吉字依程傳有飛鳥之象焉解者之辭誤入彖傳上則乘剛故不宜上下則承陽故宜下輔嗣本㫖出仲翔至王肅直謂四五失位故上逆二三得正故下順兼二氏乃得之若俞氏謂宜艮正不宜震動於順逆之義不明矣象曰山上有雷小過君子以行過乎恭喪過乎哀用過乎儉初六飛鳥以凶象曰飛鳥以凶不可如何也小過有飛鳥之象若卦之初為翼蘇子瞻胡仲虎謂鳥用在翼故初上言之彖言下順而爻言凶項俞謂在艮下當止然上應於四妄徼震動之舉而反飛者是也春秋傳師能左右之曰以飛鳥見以于翼欲左而左欲右而右莫如之何故凶六二過其祖遇其妣不及其君遇其臣無咎象曰不及其君臣不可過也王輔嗣曰祖始為初妣者居內履中而正指二六過初而履二位故曰遇祖遇妣虞氏祖妣指初與三謂坤為妣者非程朱二先生曰二四與五凡爻取象位置各當其物今指曰三父四祖五妣雖義取剛柔然妣居祖上體例位置不明矣遇者春秋家有其語謂非正應而卒然值之也五則正應豈得為遇哉艮震皆一君二民之卦小過之君不在五五徒有其位而已二當艮止之象又居中得正以承九三三者艮主二之君也臣謂初處二之下家臣也二柔順中正而體艮止故不及三而遇初也侁二近三陽之君而自應陰臣亦非經文遇義孔氏正義臣不可自過其位蓋凡所謂過皆就本爻言之九三弗過防之從或戕之凶象曰從或戕之凶如何也弗過防之王深甫曰弗過必有以防之弗過當讀雙湖胡氏曰亦謂讀如弗過遇之二字為句也程朱二先生俱四字斷者非防之㫖防二虞翻謂之防四非也蘇氏曰小過陽失位而不中故其君在三三之所臣者初與二也六二强臣而未之過九三剛而不中莫能容也故或從而戕其君謂之戕者明二本無意於逆咎在三也春秋臣弒其君或曰戕非一朝一夕之故也蘇說得卦爻之情注家謂上六小人三不能防而復與為應者誤從指從三者非為三所從也蘇氏指二弗過者因二不及君遇臣而言非臆說也程朱二先生俱謂三過防乃免恐不然矣九四無咎弗過遇之往厲必戒勿用永貞象曰弗過遇之位不當也往厲必戒終不可長也以剛居柔非過剛而敢為大事者故無咎卦名小過謂小者過大者不過故九三四皆曰弗過程朱先生皆謂剛不過而合宜非也蘇氏曰四之所臣者五六也九四以陽居陰失位自卑臣雖弗過我則開之遇逢也臣未僣而逢其惡故曰遇四體震動居上卦為洊雷之厲故曰往厲震有恐懼之象故為必戒不居初而居四隊泥之威不能久之象俞氏曰此爻皆以兩字為句六五密雲不雨自我西郊公弋取彼在穴象曰密雲不雨已上也虞翻曰兌為密雲坎象半見故不雨西郊亦是互兌言之五而稱公明君方失位在四故五稱公耳吳氏曰公謂四彼謂初俞氏謂小事稱公皆不然也坎為弓弋象小過似厚坎也弋小器僅可射近彼謂二陰在互巽穴中五體震動弋取以自助也小畜以小畜大而諸陽不為六四用小過以小過大而二陽不為六五用也故辭同繇傳曰已上依郭京舉正作止王注陽已止下今本誤作上注亦因誤作陽上故止然則程朱謂已上而不與陽和失之何子元疑韻不叶亦近于固矣凡象故多有不韻者矣上六弗遇過之飛鳥離之凶是謂災眚象曰弗遇過之已亢也上處小過之極超乎六爻之外亢而不可復返蘇氏曰君雖不逢其惡而臣自僣矣朱先生疑當如九三弗過按陸氏釋文以本多誤故特標弗遇之文明非弗過也離猶詩鴻離之離項平甫曰上六居震之極其飛已高動而成離則麗于網罟奈何不凶哉初飛鳥以凶上飛鳥而離之凶可知矣不特曰凶且天災人眚無不有之然則陰之過豈其福哉已止者陰不已亢陰不降互發之辭也證衍文據俞氏吉上衍大字證脫文據郭京是以下脫可字證誤據程傳有飛鳥象焉誤入彖傳據郭京小字下誤增吉字證句據王深甫以弗過為句據俞玉吾九四爻辭皆以兩字為句證字已上據郭京舉正作已止既濟離下坎上既濟亨小利貞初吉終亂彖曰既濟亨小者亨也利貞剛柔正而位當也初吉柔得中也終止則亂其道窮也亨小者謂亨于小小謂三陰三陰得位而三陽下之火珠林曰三陽失位男之窮是也虞翻俞琰皆以為二則與初吉乃若復語王弼曰舉小以見大者之亨非卦象本㫖按程傳濟時不能無小未亨則于本文倒置而又加一未字乃足其義朱義與程伊川無幾異矣蘇氏曰凡陰陽各安其所則靜而不用將發其用必有以愠之者水在火上欲炎而不達火之所以致其怒也陰皆乘陽陽欲進而不遂陽之所以奮其力也火致其怒雖陰必達陽奮其力雖難必遂此所以為既濟也或曰離明在內故始吉坎難在外故不變則終亂三剛三柔皆正而位皆當則六十四卦之中獨此一卦故孔子特贊之也終止則亂侁所謂水返而終于潤下火返而終于炎上者劉牧曰水火之性竟則必復復則為變象曰水在火上既濟君子以思患而豫防之初九曳其輪濡其尾無咎象曰曳其輪義無咎也輪四也說卦傳曰坎為輪四坎體而與初應適當其後故為曳朱先生指初非也坎又為狐初在狐之後有尾象在水之下濡象也初爻位皆剛有濟險之才而其應猶在險故竭力救之俞氏曰輪曳不敗尾濡不溺寧有咎乎六二婦喪其茀勿逐七日得象曰七日得以中道也婦者何也虞翻王肅皆以離為翟茀者翟茀鄭云車蔽離有翟象詩翟茀以朝是也爾雅革輿前謂之艱後謂之茀初曳輪應四則二喪初之後茀鄰于坎道也既濟六爻皆有應六二居二陽之間上不承三下不比初在可疑之地冦之所謀也故竊其茀稱婦者以明繫於五而他人侵之也二本有柔中婦德而他人侵之已而正應者合則妄求者退矣故勿逐也稱七日者胡氏云自二返覆數之厯初數而還值二也今程朱二先生皆謂九五既濟之時不能下賢是臆九五而疑之過矣九三高宗伐鬼方三年克之小人勿用象曰三年克之憊也干寶曰鬼方北方國也離為兵戈故稱伐三與上應上為坎體坎當北方故稱鬼方張說赴朔方軍詩逺靜鬼方人是也楊用修據西羌傳竹書紀年以為西羌靡莫之屬吳幼清曰二離之終南方之窮國也昔在荆楚居國南鄉而楚俗好鬼故名之鬼方豫揆方索象吳楊似違經義矣三年克之虞翻以為變坤為年坤之為年於復見之三至上厯三爻故三年三才位皆剛然近坎易逆既濟之民安于無事而難動故上易以致怨而下易以致疑以是為憊也仁山金氏曰經世圗髙宗三十二祀戊子三十三祀己丑嵗卦皆既濟又運卦為需世卦為旅二卦外卦又為既濟則其年又既濟之聚也六四繻有衣袽終日戒象曰終日戒有所疑也繻錦之盛也袽衣之弊也六四得位名之美也險而乘剛行可疑也猶盛飾而衣有弊袽陸氏之言是也終日者居三十後離明盡而坎月方升之時說文作晝日非也君子不疑在躬而後能濟四方行有所疑而中不為纍者以終日之戒善補其過故聖人許之也九五東鄰殺牛不如西鄰之禴祭實受其福象曰東鄰殺牛不如西鄰之時也實受其福吉大來也東指二西指五崔憬謂五坎月為西二離日為東俞琰因曰離正南而鄰東坎正北而鄰西是也離二隂爻為牛坎之陽爻為豕月令薦麥夏禴之祭也顔師古漢書注煮菜者非程朱二先生皆謂五不如二非爻象之㫖實者九五陽爻為實時所據當事之時嫌與彖異故特表之終亂者道吉來者時時之盛將必有衰者矣上六濡其首厲象曰濡其首厲何可久也未濟坎下離上未濟亨小狐汔濟濡其尾無攸利彖曰未濟亨柔得中也小狐汔濟未出中也濡其尾無攸利不續終也雖不當位剛柔應也小狐者初六六三干寶以為坎狐本九家易虞翻曰艮為小狐非也明在外而險于內狐之疑而心病也陰稱小小者才不足狐者志不果之稱汔干寶引說文曰涸汔坎本不涸坎在離下無火以作之遂為伏險而不溢未濟之象以為涸而可濟耳九二險主不豫也則小狐安能出其中而獨濟小狐汔濟明指下卦柔得中以言離汔濟濡尾以言坎耳朱先生通指一卦非也中者險中不續終指初言下坎象狐初其尾也鄭虞皆訓汔幾何子元因讀如井汔至之汔謂辭有濡尾不當謂涸非矣三征凶初濡尾而二亦病故無攸利象曰火在水上未濟君子以慎辨物居方水火異物辨之使羣分水火異方居之使類聚初六濡其尾吝象曰濡其尾亦不知極也以陰居下方將涉險而尾即濡與既濟登岸者異矣極者終極之謂初知當濟而不自審其續終之難故曰亦不知極蘇氏曰水火相切極乃致用故濟必待極亦通李鼎祚謂極為中四居坎中以濡尾是不知極此自言初耳論其所應非也朱先生或謂敬或謂極亦于繇象無涉九五曳其輪貞吉象曰九二貞吉中以行正也姚信曰坎為曳為輪兩陰夾陽輪之象也二應于五而隔于四止而據初故曳其輪俞氏謂五曳二非矣處中而行故曰貞吉以九居二在他卦為不正然以剛德居中而無過故曰中以行正蓋中勝於正矣曳輪一也既濟僅無咎而未濟吉初不中而二中也陸氏曰既濟之初思未濟之難故曵輪濡尾同在一爻未濟之初陰在下未能自濟故濡尾而退二雖陽爻復未出險坎性趨下未能濟物故曳輪而返六三未濟征凶利涉大川象曰未濟征凶位不當也居下坎之上又有互坎在前蓋欲濟而尚未濟也位不當如此故征凶也利涉大川者荀爽曰利不從坎王輔嗣注二能拯難而已比之棄已委二載二而行不能溺也何憂未濟蓋下卦為坎二者坎成卦主爻為水有大川之象又在互離之中明于幾事下比于二蓄其全力合其同德以擬大難利涉大川之象也初與三情同而凶異者三入險之深故曰位不當九四貞吉悔亡震用伐鬼方三年有賞于大國象曰貞吉悔亡志行也四變則互震而居震極又四剛而五柔挾震主之威者也然用其震于伐鬼方國之虎臣也先儒或言震為長男帝臣之象愚謂弟子豈有伐鬼方而能吉者當如詩薄言震叠讀之可耳變四互坤坤為年故三年也俞氏曰鬼方指初自四至初厯三爻故三年矣變坤為開國故賞于大國志行者李鼎祚曰坎為志震為行故志行也仁山金氏曰既濟下卦離之三動則為震以三十六宫言之既濟之三反則為未濟之四故又以震言也亦曲解甚哉六五貞吉無悔君子之光有孚吉象曰君子之光其暉吉也君子之光離為大也有孚吉互坎為孚也其暉吉者自孚者言之六五文明之主虛中下賢有賢者及時而孚之象程先生曰君子充積光盛至于有暉不然矣不言天子之光而言君子之光所謂承乘應皆陽剛君子相助為朋者管輅曰日中為光朝日為暉及其暉而孚言其早也如是其不吉乎上九有孚于飲酒無咎濡其首有孚失是象曰飲酒濡首亦不知節也有孚于飲酒者孚于五也有孚失是者孚於三也未濟之家羣䇿並屈以求濟猶所謂若作酒醴爾惟麯糵經師或謂所乘六五之孚者是坎為酒食濟名由坎未濟坎在下而亨之在五故主五而孚之無咎也濡其首卦之上為首濡之者三也與三應而沒入坎水中也三方在險而上已出中猶復不能忘情于三不胥溺乎失是是謂上之安地俞氏指六五非是或曰象傳以飲酒濡首作一事是朱先生所疑也朱先生蓋知渙王居渙其血之為節文以成句而偶不察飲酒濡首之辭與節繇象同例也節蘇氏謂事之㑹猶言時節非節止義王應麟曰易之始終皆陽也始乾之初九終未濟之上九字音句無誤周易象㫖决録卷四
