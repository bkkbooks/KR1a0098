body:
  text: 周易象旨決録卷六明熊過撰繫辭八卦成列象在其中矣因而重之爻在其中矣剛柔相推變在其中矣繫辭焉而命之動在其中矣吉凶悔吝者生乎動者也爻在其中此伏羲之重卦動在其中此文王之重卦也張文饒以文王重爻用十二蓋若世傳易林矣非也往崔子鍾常為豫言伏羲止八卦則十三卦之象無據若六十四卦已重則九卦之作不協况説卦已言六爻成卦乎疑羲止八卦卦各六爻文王乃交互重之為六十四豫曰王弼謂伏羲鄭玄之徒謂神農孫盛謂禹史遷等謂文王乾鑿度云垂皇策者羲何子元因附曰是犧也然乾鑿度本緯書安足信哉説易者定於繫辭尚矣繫辭曰十有八變而成卦夫十有八變則六爻矣又九家易曰伏羲作八卦類萬物之情六十四卦凡萬有一千五百二十䇿䇿數一物也以此知庖犧重為六十四卦而周官紀三易其别皆六十四其待文王而後重卦哉子鍾之言蓋本揚子雲云耳子雲之言非事實也變者蓍之變而為九六也動者人之動也雖未有之而其理已具故曰在其中剛柔者立本者也變通者趨時者也剛柔謂九六承成列重卦變通承相推繫辭畫定剛柔如木本之植本卦也蓍有變通乃隨時之適之卦也古注曰立本况卦趣時况爻即其義張文饒曰變通趨時明用飛伏是或一道矣剛柔之立本虞翻曰乾剛天坤柔地本乎天者親上本乎地者親下故立本朱子發曰不有兩則一不立故爻有剛柔所以立本朱先生義曰各有定位夫三家者孰聽哉虞氏朱氏其説逺矣吉凶者貞勝者也吉凶何以貞勝吳幼清曰貞謂正主之吉勝則無凶凶勝則無吉非如悔吝之可吉可凶也斯言曲而中矣不言悔吝者貞於悔則吉貞於吝則凶耳嘉興陳綬曰一陰一陽之謂道皆以一初生者為至善故以吉居始者為正言當從吉也朱子發辭引韓康伯自佐曰此不纍乎吉凶也橫渠張氏意曰吉凶否亨有義命焉聖人一以貞勝而不顧大人否亨滅頂無咎蓋其類也聖人蓋不使人避凶趨吉乎朱先生専指天運乃釋之曰吉凶相勝而不已擇言雖審殆未盡也天地之道貞觀者也日月之道貞明者也天下之動貞夫一者也湛子曰天地日月無不一故止言乎貞有不一而後言一故以一而言乎人也天地日月人其理一也夫乾確然示人易矣夫坤隤然示人簡矣爻也者效此者也象也者像此者也爻象動乎內吉凶見乎外功業見乎變聖人之情見乎辭爻象動則乾坤二用行而吉凶功業生焉聖人凖之命辭而裁成輔相存乎其中矣君子慎動此之謂也天地之大德曰生聖人之大寶曰位何以守位曰仁何以聚人曰財理財正辭禁民為非曰義位謂卦爻五為君位其剛柔中正者天地生生之德故曰仁獨陰寡陽不生也仁依桓玄明僧紹作仁本義作人疑因聚人之人并誤也聚人亦應作仁財者古與材通孟子稱達材鼂錯傳稱資財者是其例湛子指為卦材是也聚會仁道彖言乎材也理猶料理理卦之材而正其辭以禁民為非乃曰義也聖人在位象易簡而立功業不過一仁而已大德下五言者龍仁夫疑之曰文上下不相合它經誤入也胡仲虎本亦刋去今仍舊證字仁依桓玄明僧紹作仁右第一章古者包犧氏之王天下也仰則觀象於天俯則觀法於地觀鳥獸之文與地之宜近取諸身逺取諸物於是始作八卦以通神明之德以類萬物之情觀鳥獸之文與地之宜王昭素曰印本地上脫天字諸本多有非也按太玄云察龍虎之文觀鳥龜之理陸績以為朱鳥白虎蒼龍玄武四方二十八宿經緯之文而安定胡氏從之如是則鳥獸之文天文也地之宜地理也出天字近復矣神明之德隱故曰通萬物之情顯故曰類作結繩而為網罟以佃以漁蓋取諸離包犧氏沒神農氏作斫木為耜揉木為耒耒耜之利以教天下蓋取諸益日中為市致天下之民聚天下之貨交易而退各得其所蓋取諸噬嗑神農氏沒黃帝堯舜氏作通其變使民不倦神而化之使民宜之易窮則變變則通通則久黃帝堯舜垂衣裳而天下治蓋取諸乾坤離為目目之重者為網罟故結繩為之以佃以漁朱漢上曰佃離為雉漁巽為魚也耒耜取益卦體下震動上巽入者皆木中互坤土木入土而動也沙隨程氏曰飛走之類實害禾稼惟網罟佃漁之制立然後耒耜之利見於天下市取噬嗑翟玄曰離象正上故稱日中艮為徑路震為足又為大塗致民象也坎水艮山羣珍所出聚貨之象也交易而退各得其所噬嗑互坎艮勞乎坎成言乎艮也翟以為震升坎降則非矣少梅鄭氏曰十三卦始離坎益次噬嗑所取食貨而已與龔氏意同衣裳取乾坤朱子發曰神農氏與民並耕而食饔飱而治至是尊卑定位君逸臣勞乾坤無為六子自用雲間田氏曰衣六幅裳十二幅而乾坤奇耦之畫備可備一説也翁庶善以王之司服九章屬乾后之司服六章屬坤者非十二卦分而乾坤合朱漢上曰上古衣裳相連乾坤相依君臣一體也張文饒曰自離至乾坤五卦得陰爻十四者二七也得陽爻十六者二八也刳木為舟剡木為楫舟楫之利以濟不通蓋取諸渙服牛乘馬引重致逺以利天下蓋取諸隨重門擊柝以待暴客蓋取諸豫斷木為杵掘地為臼臼杵之利萬民以濟蓋取諸小過弦木為弧剡木為矢弧失之利以威天下蓋取諸暌上古穴居而野處後世聖人易之以宫室上棟下宇以待風雨蓋取諸大壯古之葬者厚衣之以薪葬之中野不封不樹喪期無數後世聖人易之以棺槨蓋取諸大過上古結繩而治後世聖人易之以書契百官以治萬民以察蓋取諸夬刳空其內剡薄鋭其首也渙下坎水上巽木中互震動木動水上舟楫之象刳木剡木九家易以否卦九四之二為言附會以強通其辭本非易義服牛依説文作犕吳幼清曰震自坤而變坤為牛一奇畫在後者象所引之重物也上兑自乾而變乾為馬一偶在前者象前路開通無礙可以致逺互巽為繩互艮為手所以服乘之也隨之取朱先生曰上動下説按龔氏曰前動而後説凡畫卦自下始夫龔氏其説明矣虞翻謂否上之初俞琰云隨上六兑之陰爻為牛初九震之陽爻為馬皆非是坤為闔户互艮為門闕重門之象義自了然九家易乃曰下有艮象從外示之震復為艮兩艮對合重門之象則亦紆曲矣震動為有聲之木互艮又為木馬融云柝擊以行夜又互艮為閽人擊柝之象也互坎為盜暴客之象也蓋舟車既設川陸既通雖有所利而亦當有所防矣白雲郭氏曰豫本無備豫之義孔子又明豫於此者以見諸卦之象無窮不可一義盡也兑為毁折斷巽木為杵也巽木入坤土掘地為臼也坎陷有臼象而又不止上動也虞翻以為晉上之二非矣弦木上漢藝文志有古者字云其用上矣近是吳幼清曰坎象弧者中弣強上下兩稍弱也離象矢者前鏃後括實中笴虛虞翻謂無妄五之二非也少梅鄭氏以為離絲坎弓離絲出李鼎祚未詳何據項氏玩辭互坎為弓兑為上弦之義亦因象生解而已龔深甫曰弧矢之用相暌不可以相無而卒所以治暌也朱先生以為暌乖然後威以服之殆未盡矣上棟下宇棟一名甍屋脊檁也宇室兩邊垂下者至周始四注即榱也周禮棟尊而宇卑則吐水疾而霤逺以隤下為宇是也震一陽在上卦之下而承二陰上棟之象乾三陽在下而相比下宇之象以蔽風雨二陰在上而動四陽在下而壯故二陰不能陵也虞翻復取無妄明其象豈惟贅辭乎朱先生以壯固釋之亦有遺矣棺槨取大過俞氏曰下巽上兌其卦肖坎坎為隱伏葬埋之象中互重乾之大木棺槨之象虞翻曰巽為木為入處兑為口乾為人木而有口乾人入處棺木之象兩説意互相發也然曰中孚上下象易則大謬矣康成以為初六在巽體為木上六位在己巳當巽位巽又為木二木在外夾四陽互為二乾是君父非也書契取夬書以刀筆畫木簡為文字也契以木刻一二三四之畫豫者執取左者操右合之為信也契但記數書則有指事象形之變吳幼清曰夬有五竒象書契之一二三四五至六則變矣故上畫耦者竒之變也又象契上端分處今按韓非云宋人得契密數其齒謂以刀分有相入之齒縫則吳説是也玩辭曰乾金為言於內兑金為決於外隆山李氏曰天下之事不至於決則不通故雜卦之次序與十三卦之器象皆終於夬凡諸經師家説及豫所解剝經文如此然葉正則曰十三卦亦近世學者所標指而其説尤為不通庖犧始為罔罟神農始為耒耨交易黃帝堯舜始為衣裳其後乃有舟楫牛馬臼杵弧矢宫室棟宇考於易乃無毫釐形似之相近學者震於異説欲大而反小之也學者震於異説誠有之矣以為無毫釐形似之相近斯其言亦太過哉朱先生求尚象之旨於豫暌大壯大過夬五卦直以義訓之則既已非尚象矣獨語録紀其語曰蓋字有義間常疑之以為蓋取諸三言者以意逆志之辭時人知器而已不知其有所取者孔子以易道觀知其制作合易非謂見十三卦而後制十三器也葉氏亦太過哉其後見郭白雲稍同豫説記之俟擇焉右第一章證脫遺據漢藝文志弦木上有古者字是故易者象也象也者像也彖者材也爻也者效天下之動者也是故吉凶生而悔吝著也是故承上取象言依俞氏屬前章取夬下龔氏曰像言易之成卦材言卦之成德動言卦之趨時右第三章證脫誤依俞氏是故易者象也三十五字移取夬之下十六卦十八爻陽卦多陰陰卦多陽其故何也陽卦奇陰卦耦其德行何也陽一君而二民君子之道也陰二君而一民小人之道也陽陰所據有中外本末之殊故曰德行朱子曰君謂陽民謂陰一君二民一貫萬也二君一民二三其德矣右第四章易曰憧憧往來朋從爾思子曰天下何思何慮天下同歸而殊途一致而百慮天下何思何慮日往則月來月往則日來日月相推而明生焉寒往則暑來暑往則寒來寒暑相推而歲成焉往者屈也來者信也屈信相感而利生焉尺蠖之屈以求信也龍蛇之蟄以存身也精義入神以致用也利用安身以崇德也過此以往未之或知也窮神知化德之盛也據吳幼清本此下經咸卦九四文言當在大過文言之後第十説文思有所圖曰慮致趣也歸自來言人也致自往言已也同歸一致言其本然殊途百慮自憧憧者言耳義即易中之藴君子之為咸感以虛受人感則通之日月寒暑之往來任氣尺蠖龍蛇之屈信委形至於下學上達亦待其自致置思慮近助長矣致用謂將用利用謂已用致用者屈之信崇德者信之屈橫渠張子曰入神僅能入於神窮神窮盡其神淺深之别也斯言至矣葉正則顧疑傳義似深而實淺其言曰因往來之已然而遂欲利用安身於其間是不知德之所崇曽憧憧朋從之未及無以窮神而知化彼烏知易哉易曰困于石據于蒺藜入于其宫不見其妻凶子曰非所困而困焉名必辱非所據而據焉身必危既辱且危死期將至妻其可得見耶據吳幼清此困六三文言在益上九文言下第十五困之六三卦以剛見掩為困爻以柔承剛為辱乘剛為危易曰公用射隼於髙墉之上獲之無不利子曰隼者禽也弓矢者器也射之者人也君子藏器於身待時而動何不利之有動而不括是以出而有獲語成器而動者也據吳幼清此下經解上六文言在解六三文言下第十二葉氏曰如使過而用射反以致冦何利之有用之則行非待時也舍之則藏非藏器也沾沾焉抱其所有如賈之售物適以為悖不足以解悖矣子曰小人不恥不仁不畏不義不見利不勸不威不懲小懲而大誡此小人之福也易曰屨校滅趾無咎此之謂也據吳幼清此噬嗑初九文言在豫六二文言下第六不勸依郭京作不動不威下依説苑脫小字不懲下依説苑脫大字此以下皆先泛論事理而後舉易以明之與前所陳别為例矣善不積不足以成名惡不積不足以滅身小人以小善為無益而弗為也以小惡為無傷而弗去也故惡積而不可掩罪大而不可解易曰何校滅耳凶據吳幼清此噬嗑上九文言在豫初九文言下第七子曰危者安其位者也亡者保其存者也亂者有其治者也是故君子安而不忘危存而不忘亡治而不忘亂是以身安而國家可保也易曰其亡其亡繫於苞桑據吳幼清此否九五文言當在坤文言後第一子曰德薄而位尊知小而謀大力小而任重鮮不及矣易曰鼎折足覆公餗其形渥凶言不勝其任也據吳幼清此鼎九四文言在困六三文言下第十六子曰知幾其神乎君子上交不諂下交不瀆其知幾乎幾者動之微吉之先見者也君子見幾而作不俟終日易曰介於石不終日貞吉介如石焉寧用終日斷可識矣君子知微知彰知柔知剛萬夫之望據吳幼清此上經豫六二文言在謙九三文言下第五上交指二於六三下交指二於初六過於恭則諂過於和則瀆故有幾焉見幾而守之介石者果而確也柔指六五剛指九四四由豫之主蘇氏曰無守於中者不有所畏則有所忽也忽者常失之太早畏者常失於太後既失之又懲而矯之則終身未常及事之會矣知幾者不然其介也如石之堅上交不諂無所畏也下交不瀆無所忽也上無畏下無忽事至則發而已矣故萬夫望之以為進退之候也漢書吉之間有凶字朱先生從之愚謂漢書非也此良心之發體撰以長善故曰吉之先見先儒為幾善惡者不可通於此也子曰顔氏之子其殆庶幾乎有不善未嘗不知知之未嘗復行也易曰不逺復無祗悔無吉據吳幼清此復初九文言在噬嗑上九文言下第八庶近也幾者所謂動之微吉之先見者也蘇氏曰其心至靜而清明故不善觸之未常不知所以不及聖人者猶待知耳詩云不識不知順帝之則此聖人也天地絪緼萬物化醇男女搆精萬物化生易曰三人行則損一人一人行則得其友言致一也據吳幼清本此損六三文言在解上六文言下第十三天地絪緼謂乾坤陰陽之感男女搆精謂六子陰陽之合不言陰陽而言男女干寶謂釋六三之辭主於人事是也義海曰天地升降其氣絪緼萬物化矣醇而未漓序卦曰有天地然後有萬物劉牧曰乾道自然而成男坤道自然而成女序卦自萬物則男女在其中矣萬物化醇者言其一未始漓也天地既生萬物萬物各有陰陽精氣相交化生無窮序卦曰有萬物然後有男女劉牧曰咸卦不繫之於離坎以離坎而上男女自然而生咸卦而下男女耦合而生曰男女化生者言有兩則有一也損之六三曰三人行則損一人一人行則得其友言致一則殊途而同歸一致而百慮矣子曰君子安其身而後動易其心而後語定其交而後求君子修此三者故全也危以動則民不與也懼以語則民不應也無交而求則民不與也莫之與則傷之者至矣易曰莫益之或擊之立心勿恆凶據吳幼清此益上九文言在解上六文言下第十四位不能安身時不能易心應不能定交不能益人而反求人之益者也張文饒謂冬至以中孚生復者先天也上繫序七爻首言中孚九二夏至以咸生姤者後天也下繫序十一爻首言咸六四孔子有深旨王應麟曰上繫七爻起於中孚鳴鶴在陰下繫十一爻起於咸憧憧往來卦氣圖自復至咸八十八陽九十二陰自始至中孚八十八陰九十二陽咸至姤凡六日七分中孚至復亦六日七分陰陽自然之數也右第五章此章宜依吳幼清緒正之然釋咸者言無為之妙及有為之迹困解二節言能與不能之利害噬嗑二節言戒與不戒之禍福否以下言求無為者在主敬主敬則能知幾而所謂主敬者又在専一故稱損恆明之則亦非無意也證誤勸依郭京作動證脫簡不威下依説苑脫小字不懲下脫大字子曰乾坤其易之門耶乾陽物也坤陰物也陰陽合德而剛柔有體以體天地之撰以通神明之德二物之德陰與陽合陽與陰合而其情相得二物之體剛自剛柔自柔而其質不同交互相合以生六子震坎艮有一剛二柔巽離兌有一柔二剛為體撰廣雅曰定也朱子發曰形容天地之所定者體造化也蓋剛柔有體天神也地明也通神明之德亦幽顯一源即陰陽合德也張文饒謂此明用兩卦十二爻夫張氏鑿矣其稱名也雜而不越於稽其類其衰世之意耶依漢書及説文至雜為句而不越當讀至其類朱語録於稽一本作烏稽其類一本作其顙今以義知其并謬九家易稱名為卦名陰陽雖錯而卦象各有次序不相踰越是也悔吝憂虞非上古不識不知之意蓋生於衰世而然耳蘇氏曰陰陽合德故稱名雜剛柔有體故不越或曰伏羲自乾一至坤八有自然之序因而重之至文王稱卦之名則雜而非伏羲時所序然於羲易未嘗差違考上世之衰蓋有不得不然矣亦通夫易彰往而察來而微顯闡幽開而當名辨物正言斷辭則備矣其稱名也小其取類也大其旨逺其辭文其言曲而中其事肆而隱因二以濟民行以明失得之報彰往而察來朱子發以自震至乾為彰往自巽至坤為察來指圖明易矣開而當名孔疏開釋卦爻之義使當所象之名亦不煩更字了暢也朱先生疑為誤江夏劉績作開物當名云與卦之實不背非矣蘇氏曰道之大全未始有名而易實開之賦之以名以名為不足而取諸物以寓其意以物為不足而正言之以言為不足而斷之以辭則備矣言者辭之約者也辭者言之幽者也斷辭即彖辭也或曰辨物正言斷辭後天之易也視先天則為備矣二猶虞書勿二之二括蒼龔氏曰可因者因之可二者二之若病者勿藥以順之易所謂因也直以藥相之易所謂二也失得之報蓋二之以報失因之以報得耶虞翻以二為乾坤雖合章首之旨然依釋通之曰因乾坤以濟民行不得謂文義矣蘇氏以為兼三才而兩之然易言兩地不言二地兩不與二通也右第六章證讀據漢書及説文讀其稱名也雜為句易之興也其於中古乎作易者其有憂患乎是故履德之基也謙德之柄也復德之本也恆德之固也損德之修也益德之裕也困德之辨也井德之地也巽德之制也履和而至謙尊而光復小而辨於物恆雜而不厭損先難而後易益長裕而不設困窮而通井居其所而遷巽稱而隱履以和行謙以制禮復以自知恆以一德損以遠害益以興利困以寡怨井以辨義巽以行權履和而至履以兑柔應在上乾剛故龔深甫説和為能悅至為應乾而亨朱義曰禮非強世事皆至極辭晦矣雜者恆剛柔皆應而其文交錯也外剛見為稱內柔伏為隱稱之言稱也權之言稱錘也隱故可行權也隱者藏諸用之謂也九卦之陳履謙復恆損益所以豫其內困井巽所以利於外基言乎其立之位本言乎其養之始地言乎其行之處若曰無入而不自得云耳陸子靜言於鵝湖其意又曰復而先以謙履蓋履上天下澤而人居其中先辨一身所以舉錯動作之由謙以自持使精神收聚於內則此心斯可得而復本心既復謹始克終以得其常而至於堅固私欲日以消磨而為損天理日以澄瑩而為益雖涉危蹈險所遭多至於困而此心卓然不動然後於道有左右逢原蓋至此則順理而行無纎毫透漏如巽風之散無往不入此以其義言之朱子發曰履出乾謙復出坤恆出震損出艮益出巽困井出坎獨不取離者內文明而蒙大難之意胡仲虎乃謂上經自乾至履九卦下經自恆至損益亦九卦上經履至謙五卦下經益至困井亦五卦上經謙至復又九卦下經井至巽又九卦上經自復而後八卦為下經之恆下經自巽未濟亦八卦復為上經之乾上下經對待可以見文王之心非偶然者對待九十卦置乾不言乾為君也文王有事君之小心而不知其有君民之大德或曰謙下艮上坤復下震上坤取坤順者凡二履下兑上乾損下兑上艮困下坎上兑取兑説者凡三恆下巽上震益下震上巽井下巽上坎巽重巽取巽入者凡四處憂患之中不宜用明亦通也三陳皆有辨項氏玩辭曰困之辨辨於已復之辨辨於物井人已之間兩極其辨也學齋占畢三陳九卦初德次體次用蓋本括蒼龔氏之遺而龔説又原於九家易也何子元獨謂始史繩祖殆亦未考耳右第七章易之為書也不可逺為道也屢遷變動不居周流六虛上下無常剛柔相易不可為典要唯變所適變動不居至唯變所適此易道之屢遷也典猶册之有典要猶體之有要典要拘於迹者也下既有典常則以其辭言之耳張文饒曰此明升降也周易以六十四卦為三十六對而乾坤坎離頤大過中孚小過八正卦為四對四對者用飛伏餘五十六卦反對相從用升降其出入以度外內使知懼又明於憂患與故無有師保如臨父母此易書之不可逺也韓康伯注明出入之度使物知內外之戒朱義疑脫誤門人録其語曰合作使內外知懼非也出自內卦而往外也入自外卦而往內也外上卦內下卦也出者度其內之應入者度其外之應得其屈伸消息之幾剛柔虛盈之變凡使人知懼也憂患之故謂幾也師保父母互言之初率其辭而揆其方既有典常茍非其人道不虛行辭謂卦爻之辭方謂辭之所指虞氏指方為坤謂以乾通坤非是易道也右第八章證誤據韓康伯解其出入以度外內使知懼無誤文易之為書也原始要終以為質也六爻相雜唯其時物也其初難知其上易知本末也初辭擬之卒成之終若夫雜物撰德辨是與非則非其中爻不備位言之者初上也時言之者初終也道言之本末也事言之始終也其實一時變則事變事變則道與之俱漢上指初難知以下言初上二爻雜物以下皆言中四爻故張文饒以原始要終為用及對中爻為四位吕仲木獨指二五不取互體非也爻有等故曰物謂陰物陽物京氏曰二至四為互體三至五為約象又鄭云二至四三至五兩體交互各成一卦也德謂卦德撰鄭作算云數也二卦固各有德自其中四爻之陰陽雜而互之又成兩卦是别算其德也初德之是非未見上德之是非已定故以中四爻辨之也噫亦要存亡吉凶則居可知矣智者觀其彖辭則思過半矣要陸德明釋文作去聲者即絶句作平聲者則句至吉凶今當讀作平與要終之要同崔憬謂中四爻亦能要定卦中存亡吉凶之事者是也辨是與非原中爻之始也要存亡吉凶要中爻之終也蓋有是非則位之存亡事之吉凶可得其要也居指本卦之不動者言居則觀其象而玩其辭言無待於動也以彖為要則知者觀其彖辭而思過半言無待於爻所要愈約則所見愈易中爻者六爻之要彖者一卦之要彖辭馬融曰卦辭鄭氏云爻辭者非王肅云彖舉象之要師説通謂卦爻之辭則益非矣彖傳非彖辭二與四同功而異位其善不同二多譽四多懼近也柔之為道不利逺者其要無咎其用柔中也三與五同功而異位三多凶五多功貴賤之等也其柔危其剛勝耶胡仲虎曰雜物撰德指中爻互體此論中爻本體崔憬曰二主士大夫佐於一國四主公孤牧伯佐於天子皆有助理之功三諸侯五天子同有理人之功異位者韓康伯曰有內外也朱先生以二四同陰位三五同陽位疑與下異位之説相左矣陰以降為用而有待於陽故以逺近等之不成乎四退而成乎二陽以升為用而無待於陰故以貴賤等之不成乎三進而成乎五譽懼凶功以異位言之柔本不利逺二逺而譽要之無咎耳非元吉也其用柔中明其無咎之故柔危剛勝専為五言耶疑辭君德以剛為本亦有柔中而吉者然其功鮮矣郭京舉正以近也二言為韓注而今本誤為正文豫按李鼎祚引韓注云四近於君故多懼即不以近也為注郭見何本而云然今易告蒙約引其説豈何子元亦未見李氏易哉二與四三與五皆同功異位二四言其善不同而三五不言者二四皆臣可以比量三五君臣之際善則稱君不敢較也右第九章此章之指俞氏所謂示學者觀六爻之法兼明中爻互體之用也易之為書也廣大悉備有天道焉有人道焉有地道焉兼三才而兩之故六六者非他也三才之道也天道人道地道三畫之卦也兼三才而兩之謂重卦也道有變動故曰爻爻有等故曰物物相雜故曰文文不當故吉凶生焉道三才之道也爻以效其動大傳云乾陽物坤陰物古注以類釋等謂爻有陰陽之類易蓋陽貴陰賤猶物類有等干寶以羣釋等謂爻中之義羣物交集非也朱先生以逺近貴賤釋等貴賤猶可言也以逺近通之而曰逺近相雜則於辭疑若不暢矣文不當謂陽物居陰位陰物居陽位也卦必舉始終而成體故前章以質言爻必雜剛柔而為用故此章以文言右第十章易之興也其當殷之未世周之盛德耶當文王與紂之事耶是故其辭危危者使平易者使傾其道甚大百物不廢懼以終始其要無咎此之謂易之道也辭指爻辭或説為卦辭或説為卦爻辭非也按馬融王肅姚信謂周公作爻辭然易初無明文孔氏正義引説者云升稱王用亨岐山不應文王自説又箕子明夷亦武王觀兵後事故不得謂爻是文王之辭愚謂二説皆非王非文王岐非岐周豫於升辨之箕子非箕子豫於明夷辨之陸德明引劉向云箕子作荄滋今按漢儒林傳趙賓為易師飭易文以為箕子明夷萬物方荄滋也是古人有不指為殷之箕子者矣况蜀才正作其子哉然則謂爻辭非文王作者益無據矣俞氏亦曰以彖辭觀未見所謂危辭爻辭則有危者爻不可謂非文王作占法不變者斷以彖變者斷以爻謂文王不作爻不知占法之妄論云爾李隆山舜臣李西溪過言之明哲豫謂陳高所辨得失相半其言季札觀易象春秋尤為不誤并可見爻辭非周公作矣其道甚大百物不廢言其大也懼以終始其要無咎言其要也要朱語録讀作平聲歸也百物之不廢非逺取諸物之謂也蘇氏曰得其大者縱橫逆順無施不可而天下無廢物矣得其小者懼以終始猶可以無咎此庶幾平危傾易之旨乎右第十一章證音據朱語録其要之要讀作平夫乾天下之至健也德行恆易以知險夫坤天下之至順也德行恆簡以知阻能説諸心能研諸侯之慮定天下之吉凶成天下之亹亹者乾坤之易簡上繫言之矣此言乾坤之所以為易簡者自上視下所見為險自下升上所見為阻易簡故説諸心險阻故研諸慮侯之依王弼例略衍文虞本非諸衆也謂衆人悅心故能定其吉凶研慮故能成其亹亹吳幼清曰至健以下天地之能説以下聖人成能也是故變化云為吉事有祥象事知器占事知來字林云云如雲為象母候制字之意皆以天事言故君子謂言行聖人謂云為即動尚其變吉事劉績讀作言祥者吉凶之兆探其始也即言尚其辭象事知器要其終也即制器尚象占事知來即卜筮尚占蘇氏曰此言易簡者無不知也天地設位聖人成能人謀鬼謀百姓與能蘇氏曰此言易簡者取諸物而足也八卦以象告爻彖以情言剛柔雜居而吉凶可見矣象謂畫象自子之半迄午半陽也故震至乾其初皆陽二分之其前陽中之陰故震離之中皆陰其後陽中之陽故兑乾之中皆陽又四分之始子半者陰次則陽又次陰又次陽故震上陰離上陽兑上陰乾上陽故震陰之始衰也離陽之始長也兑陰之極衰也乾陽之極盛也巽陽之始衰坎陰之始長艮陽之極衰坤陰之極盛觀其所乘而吉凶不可違也然則謂震陽而巽陰有遺論矣此先天之學也劉仲敬氏告豫曰乾起震終坤離起離終艮巽起兑終坎艮起乾終巽坤起巽終乾坎起坎終兑震起艮終離兑起坤終震乾坤者歷八位者也離坎者歷六位者也巽震者四位者也艮兑者二位者也左旋之謂也情言易之情見乎辭也變動以利言吉凶以情遷是故愛惡相攻而吉凶生逺近相取而悔吝生情偽相感而利害生凡易之情近而不相得則凶或害之悔且吝胡瑗曰六爻變動使人由而勸之以盡天下之利非本旨也利猶以利為本之利言六爻陽老則變陰陰老則變陽出於自然耳虞翻曰乾變之坤成震為言亦既拘礙矣情遷即相攻相取相感之情也橫渠張子以情偽専人事則亦幾於析天人然者不恆有孚皆陰陽之實象實理而獨指為人事可乎是故承上吉凶情遷而言平菴項氏曰相感者情之始交故以利害言相取則有事矣故以悔吝言相攻則其事極矣故以吉凶言是已凡爻居皆有逺近其行皆有情偽其情皆有愛惡也然近不相得則惡相攻而凶生偽相感而害生近相取而悔吝生尤為易見反以三隅則逺而為應及一卦主爻亦必備此三條不獨此爻矣將叛者其辭慙中心疑者其辭枝吉人之辭寡躁人之辭多誣善之人其辭遊失其守者其辭屈吳幼清曰上文言易之辭皆由情而生此又以人譬之人之辭亦由情而生也今按虞翻云將叛者其辭慙坎人之辭也中心疑者其辭枝離人之辭也吉人之辭寡艮人之辭也躁人之辭多震人之辭也誣善之人其辭遊兑人之辭也失其守者其辭屈巽人之辭也王臨川郭白雲馮厚齋俱疑六辭與上不屬或疑為占者所問之辭楊廷秀言學易有得者可以知言皆非矣右第十二章證衍文據王弼例略侯之衍文周易象旨決録卷六
