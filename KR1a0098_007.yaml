body:
  text: 周易象旨決録卷七明熊過撰説卦傳隋經籍志序秦後易失説卦三篇後河內女子得之今韓康伯説卦乃止一篇而别出序卦雜卦與隋志不慮雙湖胡氏曰費直所傳不及説卦以後隋志所謂三篇恐并序雜言也昔者聖人之作易也幽贊於神明而生蓍參天兩地而倚數觀變於陰陽而立卦發揮於剛柔而生爻和順於道德而理於義窮理盡性以至於命幽贊者龔氏曰顯相之反也賓主之言贊者通之神明之德聖人通之以大衍之法而推天地之數此之謂生蓍自荀于張程皆謂生用蓍之法與朱義異守經揆方荀于張程是已參兩倚數吳幼清指揲蓍一變之後挂扐而言得天一奇數則象天之圓而圍三三者參其奇一之數故以三數倚於天一奇數之旁謂之參天挂扐得地二偶數則法地之方而圍四四者兩其偶數之二故以二數倚於地二偶數之旁謂之兩地鄭玄注參兩之義曰天地之數備於十乃三之以天兩之以地而倚托大衍之數五十也必三之以天兩之以地者天三覆地二載必極於數庶得吉凶之審或又曰數者有所本而言之也參天為參兩地為兩天一天三天五凡三故參之而成九地二地四凡二故兩之而成六天地之數多矣而參兩之法取九六以為用此之謂倚數倚數者有所托而見也鈎深圖曰九六用生數也朱先生謂兩二一三而為七兩三一二而為八俞氏辨之曰七二地而一天八一地而二天不可參兩故不用也愚謂數家者庶幾乎而未盡康成虛而無當若九六七八之説本指立卦生爻時耳四家者引為倚數之義以後為先強比而同之倚義亦晦故斷以吳説為優也觀變者揲蓍十八變後觀蓍變陰六八陽七九而立奇耦卦畫朱先生謂未説蓍數者非也剛者奇畫柔者耦畫六畫既成則發揮所值剛柔之變而生爻辭以占也俞氏立卦為三畫卦生爻為六十四卦不暢也未入用則謂之陰陽已入用則謂之剛柔未入用故止曰觀已入用故曰發揮張文饒曰陰陽者用也卦者體也以陰陽立卦者用以成體也剛柔者體也爻者用也以剛柔生爻者體以起用也象必有數聖人不過參兩之其為數自有陰陽之變其為變自成剛柔之爻聖人觀變而發揮爾道德義就易言和順言因其自然而無矯強也和順道德立道通德之義統言一卦之體理治也理義各指其所之時措之宜也析言六爻之用窮理盡性至命以用占者言義即所理之義盡性即和順於德至命即和順於道右第一章舊本説卦以下無章次吕因孔疏分節為章朱先生同大扺此章先言生蓍後言立卦蓋以筮言非謂畫卦必假蓍也昔者聖人之作易也將以順性命之理是以立天之道曰陰與陽立地之道曰柔與剛立人之道曰仁與義兼三才而兩之故易六畫而成卦分陰分陽迭用柔剛故易六位而成章性人之理命天地之理也五陽而六陰初剛而二柔三仁而四義與云者俞氏謂相與為用不可廢一是也分陰分陽以位言之一三五陽二四六陰也朱子乃以卦之乾震坎艮為陽坤巽離兑為陰俞玉吾又以八卦之序一分為二以迄乎六十四則既非本旨若朱子發十日之説則去之益逺矣吳氏曰位之陰陽相間則分布一定畫之剛柔不同則迭為用以居六位之中而不定也繫辭物相雜曰文即此成章之謂孔子曰易有六位之才天地人道之分際也三才之道天地人也天有陰陽地有剛柔人有仁義法此三者故生六位六位之變陽爻者制於天也陰爻者繫於地也天動而施曰仁地靜而理曰義仁成而上義成而下上者専制下者順從正形於人則道德立而尊卑定矣此天地人道之分際也辭容有假託者姑存之右第二章天地定位山澤通氣雷風相薄水火不相射八卦相錯數往者順知來者逆是故易逆數也水火不相射息齋曰真水藏於真火真火藏於真水真真不壞以其能相容也虞仲翔曰坎戌離己月三十日一會於壬不相厭射兼二義通之既曰天地定位矣曷言乎其相錯也曰非天地定位則山澤雷風水火不相交也鄞人黃東發以離坎縱圖較之曰康節移易卦離南坎北為乾南坤北移乾西北位以居艮移巽東南位以居兑移艮東北位以居震移坤西南位以居巽移兑西震東位以居坎離為先天卦位與易係所止方位不同矣復以朱先生答王子合書佐之曰康節伏羲卦位近穿鑿附會黃蓋疑康節以希夷數學創為先天圖云按邵伯溫經世辨惑希夷易學主意主象數三者不可缺一理具聖經不煩文字解説止有一圖寓陰陽消長數與卦生變圖亦非創作孔子繫辭述之明矣實指今先天方圓圖也又朱漢上言摶以先天圖傳种放然則圖豈康節創造哉稽焦京卦氣逺自西漢其十二辟卦之序與今圓圖雖踈密不同先後正合矣參同契本東漢魏氏書時時言乾坤父母坎離匡廓遂及復卦建始萌十六轉受統又金碧龍虎文尤古靡不然者則是圖亦不出希夷矣楊殿撰用修因胡一桂語誤謂易圖始希夷朱子不明言也然朱子常曰先天乃伏羲本圖非康節所自作又曰伏羲四圖皆出邵氏出者言自邵氏始傳耳宋人有疑方圓二圖始麻氏心悟者朱子明其不然奈何謂其不言也殿撰又以希夷龍圖序為先天夫龍圖者大衍之數耳寧可誤合耶數往者順知來者逆鵝山簡輔本吳幼清為説曰八卦順逆皆以乾坤為主自震至乾巽至坤卦皆左旋數其已生者故順然乾生兑離震坤生艮坎巽卦皆右旋推其未生者故逆易數據圓圖言之朱先生凖橫圖言以圖從中起然欲連易逆數并言則數往非逆先生答董銖曰方圖一向皆逆圓圖一半逆然試觀圓圖亦正皆逆陳濳室胡玉齋語近孟浪矣按今文上冒天地定位則圓圖也曷常如橫圖所指哉胡仲虎衍暢朱説曰數往知來指圓圖言卦氣之行易逆數指橫圖言卦畫所以生然於經文是故之語何以相承哉俞玉吾又以圓圖兼言之震自北而往歷離兑以至南乾順者也巽自南而來歷坎艮以至北坤逆者也圖從中起本朱説生卦之序吳説非是終以橫圖言欲明逆數之旨可得以否耶漢嘉安公石易牖曰天下之事數往者順知來者逆易為知來而作故其數逆數也數往者順蓋因下句而並舉之非為易有數往之順數楊殿撰稱其超詣非唐宋諸儒所及然豫所考見古文公石以前宋龔原曰往有體故順數之來無方故逆知之順數者知之事逆知者神之事易具神智者也此所以於來不特知之而又數之元俞玉吾引或人之説亦曰易之筮占専為知來設故曰逆數如所謂占事知來遂知來物以前民用皆逆之謂詎得指前無古人哉公石謂易無數往之順要有遺論若蘇氏則又通幽贊生蓍為一章其言曰道德之變沿其末流至於生蓍倚數立卦生爻而萬物之情備沿而上之反從其初有性者有見者一是二者則至於命矣此之謂逆聖人既得性命之理則順而下之以極其變率一物而兩之以開生生之門所謂因二以濟民行者也是故兼三才設六位以行於八卦之中天地山澤雷風水火紛然相錯盡八物之變而邪正吉凶悔吝憂虞進退得失之情不可勝窮也此之謂順然自命言之以順為往以逆為來故數往順知來逆六十四卦三百八十四爻皆據其末而反求其本故易逆數也則其説真超詣矣古本説卦無章次蘇説倘是耶殿撰又謂易畫自下而上為逆其説出朱漢上圖自右而左為逆則吳氏橫圖之説要朱吳説皆非易本旨矣右第三章言先天也雷以動之風以散之雨以潤之日以烜之艮以止之兑以説之乾以君之坤以藏之程直方曰天地定位圓圖乾坤從南北之中起雷動風散方圖震巽自圖之中起張氏易東曰風雷初畫之奇耦雨日中畫之奇耦兑艮上畫之奇耦乾坤三畫之奇偶震巽坎離以其象言艮兑乾坤以其卦言動止説以其性言散潤暄以其功言君以其道言藏以其量言乾君之君郭京舉正作居曷為分卦與象自動至烜言乎其出機自止至藏言乎其入機出無於有氣之行也故言乎象入有於無質之具也故言乎卦右第四章言先天也證字據郭京舉正作乾以居之帝出乎震齊乎巽相見乎離致役乎坤説言乎兑戰乎乾勞乎坎成言乎艮萬物出乎震震東方也齊乎巽巽東南也齊也者言萬物之潔齊也離也者明也萬物皆相見南方之卦也聖人南面而聽天下嚮明而治蓋取諸此也坤也者地也萬物皆致養焉故曰致役乎坤兑正秋也萬物之所説也故曰説言乎兑戰乎乾乾西北之卦也言陰陽相薄也坎者水也正北方之卦也勞卦也萬物之所歸也故曰勞乎坎艮東北之卦也萬物之所成終而所成始也故曰成言乎艮神也者妙萬物而為言者也神也者從龔氏義歸第五章證音勞依吳氏作去聲萬物隨帝者何洪範傳云雷於天地為長子以其首長萬物為出入也雷出地百八十三日而復入入則萬物入入地百八十三日而復出出則萬物亦出也息齋曰八卦既立帝出乎震齊乎巽木氣極也風木相感火德始彰故相見乎離火氣成塵塵結生土火非生土火息而土自成故致役乎坤土結為澤澤潤生金金剛有聲故説言乎兑金土相配金為水母水土之氣互相尅賊故戰于乾乾金既純水出金母流而不息故勞乎坎水既盈溢將反於元木為水子母往就子風水相和水返于風復歸元真故曰始萬物終萬物莫盛於艮八用縱橫帝自震出周遊八極元始之妙故曰象帝元遊項氏玩辭曰木金土各二者以形王也水火各一者以氣王也坤陰土故在陰地艮陽土故在陽地震陽木故震東巽陰木故近南而接乎陰兑陰金故正西乾陽金故近北而接乎陽坤之季夏義在中央故言地而不言西南兑以物成為説故言秋而不言西亦以例餘卦鄭玄云坤不言方地之養物不専一義不若項矣蘇氏曰坤艮皆上也坤位於西南季夏之位也艮位於東北蓋從坎也艮則曷為從坎季夏土十一月其律皆鍾傳曰水土衍而民用也龔氏曰自帝出乎震以至成言乎艮則就四時之終始而具八卦之用也故始於震而終於艮艮者動靜之界也神者隂陽中之氣妙合而不測者鄭康成云乾坤共成萬物不可得而分故合而謂之神是也人道內聖而外王天道內神而外帝帝之乘時在八卦其成功在萬物與物出而不辭歸而不忤其道則神而已矣故其序為先萬物次之而終於神傳曰神鬼神帝則妙萬物可知矣右第五章言後天也動萬物者莫疾乎雷撓萬物者莫疾乎風燥萬物者莫熯乎火説萬物者莫説乎澤潤萬物者莫潤乎水終萬物始萬物者莫盛乎艮故水火相逮雷風不相悖山澤通氣然後能變化既成萬物也五章六章卦位朱義皆未詳吳幼清以此承上章皆言文王卦位章末結語不應復用羲皇卦位本末舛逆首尾衡決然朱别云伏羲文王卦位不同生育萬物既如萬物所次則其方位非如伏羲所定亦不能變化既成萬物胡仲虎謂由後天而推先天是以文王得天地之用者如此俞易别載朱説曰兑震以長男合少女艮巽以長女合少男皆非其偶故自動萬物至始終萬物皆别六子之用以四時之次言之而用文王八卦之序下則推其所以成用於陰陽各得其偶故用伏羲八卦若上用伏羲卦次則四時失其序下用文王八卦則兑震艮巽皆非偶也先生斯言按實頗謬未定之見也人有言後天變化由先天來先天水火相逮以次陰陽之交合後天雷動風撓以次五行之變化惟交合故變化今本水火相逮據鄭宋陸二王按漢志易有八卦乾坤六子水火不相逮云云有不字者非矣三章以山澤風雷水火相次未入用也此以水火雷風山澤相次者入用也未用者尚其體入用者尚其氣氣莫先於水火行者為風雷凝者為山澤皆水火之氣也右第六章此由後天推先天也乾健也坤順也震動也巽入也坎陷也離麗也艮止也兑説也敬軒薛氏曰先天圖左半屬陽故乾健兑説離明震動德皆屬陽右半屬陰故巽入坎陷艮止坤順德皆屬陰右第七章臨川吳氏曰自此以下皆以陰陽純卦及初中終為序又非上先天後天之序也乾為馬坤為牛震為龍巽為雞坎為豕離為雉艮為狗兑為羊乾馬坤牛造化權輿云乾陽物也馬故蹄圓坤陰物也牛故蹄拆陽病則陰故馬疾則卧陰病則陽故牛疾則立馬陽物故起先前足卧先後足牛陰物故起先後足卧先前足龍依虞王本震作駹爾雅面顙皆白惟駹虞云作龍非不應與乾同朝氏曰荀爽九家集解乾為龍陸德明釋文喻陽氣也巽為雞吳幼清曰伏身而出聲於天氣重陽之內與地風同感坎豕離雉幼清曰前後皆陰之汙濁而中心剛躁者豕也前後皆陽之文明而中心柔怯者雉也孔氏曰坎主水瀆豕處於濕離為文明雉有文章可謂舉其一隅漢上朱氏謂豕美脊剛鬛為坎中之陽垂耳俯首尾不足為本末之陰止得其外平菴項氏謂雉化蜃內外殼為離象又取義太紆艮狗兑羊龔氏曰外剛而善禦內柔而附人者狗也內狠而善觸外説而不能害人者羊也玩辭曰狗直戌而艮在寅火墓戌而生寅也羊直未而主兑金生土也羊屬土土生金故有角而善觸項氏於此章悉以十二象所屬言非易本旨右第八章正字龍據虞于作駹乾為首坤為腹震為足巽為股坎為耳離為目艮為手兑為口乾首坤腹龔氏曰外圓諸陽所會首也中寬衆陰所藏腹也震足巽股吳氏曰陽動陰靜動而在下者足也陽連陰拆拆而在下者股也坎耳水內景陽在內離目火外景陽在外吳氏曰耳外內皆凹者陰中凸而實者陽目上下皆白者陽中黑而虛者陰艮手兑口吳氏曰動而在上者手也拆而在上者口也於艮不取止義王太古曰伏羲八卦乾在上三卦之中故為首坤在下三卦之中故為腹震在下三卦而向左故為足而足之力在左巽在上三卦而向右故為手而手之力在右今説卦巽手與艮股互置求之於經觀卦上體從巽故曰盥盥者滌手也豐卦九三則曰折其右股豈非二二四互巽乎姚氏嫌豐之無艮乃欲改股為肱未之思耳艮在下三卦之後而為股今説卦之文與巽手互置然在易艮之初六曰艮其趾六二曰艮其腓咸九三曰咸其股而不以為手此明證也王義精矣但姚信正作右股作肱者乃康成耳荀九家又以艮為鼻麻氏易曰艮為鼻兑為口山澤通氣也巽為手震為足雷風相薄也惟晉管輅亦以鼻為面山右第九章證誤據王太古巽為股當作為手據王太古艮為手當作為股乾天也故稱乎父坤地也故稱乎母震一索而得男故謂之長男巽一索而得女故謂之長女坎再索而得男故謂之中男離再索而得女故謂之中女艮三索而得男故謂之少男兑三索而得女故謂之少女乾坤三索男女俞玉吾曰三男之卦以氣言之則得乾一爻之奇以體言之則得坤二爻之偶三女之卦以氣言之則得坤一爻之偶以體言之則得乾二爻之竒是故一爻為氣二爻為體伏羲卦位則以體相聚而女從父於東南男從母於西北文王卦位則以氣相依而男從父於東北女從母於西南不可槩觀也何子元曰尚書序八卦之説謂之八索孔子讃易道而黜八索兹所列者非索之義勾微云五帝時名八索坤三索於乾而得三男乾三索於坤而得三女遂成八卦八八相索廣生六十四與此言合六十四卦三百八十四爻皆出於八卦就八索之萬有一千五百二十䇿而天下之事得豈獨一索二索三索而已柴氏曰先儒不以此章並於諸象是惑謂之之語而未循本以求又但知男女為人而未知物物有男女象也天地之性人為貴故以人言之耳不然何别象中有為父為長子長女中女少女等語與此所稱無異此蓋以男女分八卦言也物皆有牝牡雌雄之異則父母男女之象也其生皆有先後次序則長中少之象也如是則索不必以訓揲蓍矣胡仲虎曰此章本義乃朱子未改正之筆要當以語録説為正若専言揲蓍求卦則無復此卦序也右第十章孔子舉文王舊文而釋之乾為天為圜為君為父為玉為金為寒為冰為大赤為良馬為老馬為瘠馬為駁馬為木果項氏曰乾道大而無極為天足以盡之運而無極唯圜足以盡之故以二象為首句崔子鍾曰主萬物者天知大始者父為玉為金龔氏曰粹而不雜剛而能變也為寒為氷乾尊在上髙則寒也或以後天卦位乾居西北其候水始冰地始凍或又以寒陰氣冰陰物陰盛之極自坤而變乾故為寒冰皆非也為大赤漢上朱氏曰赤陽色陽始於子坎中陽為赤極於已純陽也故乾為大赤蓋加大以别坎也為良馬純陽善也老馬老陽瘠馬純剛也崔憬曰骨屬陽純陽骨多非陽弱也山海經駁如馬鋸牙食虎豹吳幼清所謂獸之最有威猛者是宋衷曰天有五行之色緣詩東山駵白解為駁説文遂云駁馬色不純郭子和俞玉吾因疑之不達乾純粹之義矣木果圓實在上之象宋衷曰羣星著天似果實在木非也沙隨程氏曰以實承實若艮為果蓏則下有柔者存焉坤為地為母為布為釡為吝嗇為均為子母牛為大輿為文為衆為柄其於地也為黑坤積陰為地作成物為母旁有邊幅而中廣平南北經而東西緯皆布象是也或以泉貨為布取廣布流行之義非也容物熟物以養物為釡項氏曰六十四升為釡坤包六十四卦如釡包六十四升也坤卦半為乾全為坤乾與坤交為六十四卦故為坤能具六十四卦之體曲而巧矣按三畫皆虛為歉縮又陰至靜翕而不施故吝嗇均猶周禮土均之均均者陶人造瓦所用載土以成器物者也崔憬曰生物不擇善惡亦動闢廣均之義性順而蕃育為子母牛項氏曰乾馬老瘠故坤牛牸犢明少且肥皆與乾反也三畫虛所容載者多故為大輿為文為衆竒為質偶為文奇則寡偶則衆三畫皆偶故為文為衆也為柄俞氏曰柄一作枘乾性圜轉而曲坤性執方而直故乾圜坤柄相反也崔憬曰萬物依之為本義猶未盡矣乾極陽為大赤坤極陰故於地為黑證誤柄依俞氏作枘舊誤彼病反震為雷為龍為玄黃為敷為大塗為長子為決躁為蒼筤竹為萑葦其於馬也為善鳴為馵足為作足為的顙其於稼也為反生其究為健為蕃鮮龍依虞翻干寶作駹以第八章有其文此重出也駹色蒼也剛柔始交天地之雜故為玄黃得乾初為玄得坤中上為黃也敷虞本作専延叔堅説以専為敷大布王肅干寶音釋定為敷蓋古鋪為花貌名之數國語震為車左氏亦云震為土車從馬或改敷作車亦通帝與萬物之所出故為大塗一索為長子剛在下動為決躁俞玉吾謂決指陽畫躁指陰畫非也蒼深青震色筤謂色之美尚在實蓋筠也埤雅云萑似葦而小初生者為菼長大者為薍成則名為萑初生為葭長大為蘆成則名為葦竹與萑葦者此下本實而上幹虛震象也漢上朱氏曰萑葦震之廢氣故竹堅而萑葦脆竹久而萑葦易枯也氣始亨故於馬為善鳴爾雅曰後右足白驤後左足白馵震居左也玉篇謂馬懸蹄者非作足猶駉頌思馬斯作之作雙足並舉也皆言在下之陽畫也的顙吳幼清訓如射的之的額有旋毛中虛如射者之的言上畫之虛古皆訓白按巽為白與震色不同蓋惑爾雅的顙白顛之語玩辭以震巽同生有巽之氣首乾象初往生震其上二爻遂成巽象在上為顙亦紆曲附會矣反生萌芽自下而生反勾向上陽在下也宋氏曰麻豆之屬反戴孚甲而出者也陽長不已其究為乾之健蕃謂草也與坤文言傳同鮮謂魚即書益稷鮮食也震三爻俱變則為巽故為蕃鮮震居東得木正氣巽居東南得木餘氣故震花變巽為草震駹變巽為魚漢上朱氏曰震巽皆木巽初草根震初木根巽二三木在上者震二三草在上者木有柔者木之草草有剛者草之木説卦舉一隅爾又曰郭璞謂魚震廢氣馬有旋毛在頂相馬者謂之抹籠旋證誤據虞翻干寶龍作駹敷據虞本作専巽為魚洪氏容齋之説詳巽為木為風為長女為繩直為工為白為長為髙為進退為不果為臭其於人也為寡髮為廣顙為多白眼為近利市三倍其究為躁卦巽偶下入者木根竒上升者木幹又其性可曲直亦順巽之象張子曰陰氣凝聚陽在外者不得入則周旋不舍而為風繩直順以達也翟玄謂二陽共正一陰者非工謂入而順白者虞翻曰乾陽在上古注風吹去塵為潔白古注説優也吳幼清曰陽長陰短陽高陰卑中陽積而達於上故長而髙前二陽欲進後二陰欲退將進又退不果於進者也荀爽曰風行無常故進退風或西或東故不果為臭者臭以風傳陰氣在下盤鬱而不散二陽達之於外也寡髮虞翻本作宣髮馬君改寡按周禮車人之事半矩為宣注頭髮顙落曰宣正與寡義同陰血盛髮多陽血盛髮少也廣顙陽體盛多白眼者上中白而黑者在下也玩辭謂變坎上爻水不上潤故不成血盛之髮遷離中爻於下不成中虛之眼以變遷言不必然也俞玉吾曰巽順而多有入故為近利市三倍南方離日之中為市巽居東南與離相近一陰下為巽主而在上二陽皆其所有三倍謂在上二陽畫每畫三分則其數六而三倍於一陰之二每畫三分不知俞氏何據竊意陽竒為三乾有美利而巽二乾陽畫是三之倍者不知然否李鼎祚曰變至三成坤為近四動乾為利至五成噬嗑故稱市乾三爻為三倍則非矣巽三變成震為躁卦乾鑿度曰物有始有壯有究震得陽氣之先巽得陰氣之先故其卦皆有究極之義也吳幼清謂喜陰卦為陽卦陽卦為純陽卦不欲陽為陰卦為純陰卦理或然也證誤據鄭虞并周禮車人寡髮作宣髮坎為水為溝瀆為隱伏為矯輮為弓輪其於人也為加憂為心病為耳痛為血卦為赤其於馬也為美脊為亟心為下首為薄蹄為曵其於輿也為多眚為通為月為盜其於木也為堅多心水內景坎陽在內又二陰象土之凹中陽象水之流於凹中也故為溝瀆一陽匿於二陰為其所蔽故為隱伏矯輮者宋衷曰曲者更直為矯直者更曲為輮水流有曲直故為矯輮弓輪者吳幼清曰中剛象弓之弣上下之柔象弓之畏弰中之奇象輪之軸上下之偶象輪之輻牙也加憂心病耳痛龔氏曰素問有言西方生金在志為憂北方生水在志為恐以恐對憂則有加矣寒氣水之勝也火熱受邪心病生焉莊子云上而不下則使人善怒下而不上則使人善忘不上不下中身當心則為心病恐則傷腎腎傷則耳痛孔疏曰坎為勞卦聽勞則耳痛亦是也為血卦為赤血在人身水之屬赤其色也漢上朱氏曰黃帝書腎主血心藏血腎坎水也心離火也離中陰而藏血坎離交也坎心亨而此曰心病楊殿撰曰有孚則心亨加憂則心病孚之亨盈科而進憂之病飢渴害之也坎為心中實心之體也離為心中虛心之用也脊者外體之中心者內藏之中坎陽在中故脊美內剛徑故心亟前畫柔故首不昻下畫柔故蹄不厚曵龔氏曰盈科而進也郭子和云易云見與曵馬無曵也乾震之馬四而坎之言馬五亦知曳為輿矣當作其於輿也為曵多眚疑在當心病之下目有病為眚心與目皆屬離離與坎反故在坎為病為眚通亦以輿言得時則為通失時則為曵坤輿當平地任載物未實故三畫皆虛坎輿在險阻陽人居中乘之路艱難進若或曵之也為月依簡輔在為水之下以巽離例之月為水精故方諸取水於月坎受乾為體月借日為光一也為盜楊用修日解整作易者知盜謂坎外險柔而內剛狠又為隱伏有穿穴踰墻乘墉伏莽之狀與項氏玩辭盜替行有水象者意同閟夜行象盜亦通者木堅多心中剛也證誤據郭雍為曵當在輿也下作於輿也為曵據郭雍多眚當在心病之下以巽離例為月依簡輔在為水之下離為火為日為電為中女為甲胄為戈兵其於人也為大腹為乾卦為鱉為蟹為螺為蚌為龜其於木也為科上稿吳幼清曰火中虛麗於實物中黑者陰光明而上下赤者二陽也日者天之火故陽燧可取火於日中一陰象日暗虛上下二陽象曰外明也火麗木日麗天電麗雲鄭玄云大明者日暫明者電也中女者謂再索所得漢五行志陽竒為牡陰偶為妃故水火牡火水妃離為中女取此違經造辭更立新義志五行者悖矣甲胄吳幼清曰上剛象胄下剛象甲中柔象披甲胄之人也俞玉吾曰胄字與冒字相似皆從目從月者胄子之胄也兵戈者上剛象刃下剛象鐏鐓中柔者其柲也大腹中虛也乾卦火日乾燥物也鄭玄作幹陽在外能幹正也鱉蟹螺蚌龜者外剛內柔者也括蒼龔氏曰螺則形鋭而善麗蚌則內虛而含明宋衷曰陰在內則空中木空中則科上稿也虞翻作折上稿謂巽蟲食心則折離火燒巽故稿非也證字胃下從目艮為山為徑路為小石為門闕為果蓏為閽寺為指為狗為鼠為黔喙之屬其於木也為堅多節下二陰地上一陽隆起於地上者為山震陽始出為平地之大塗艮陽上窮髙山之上成蹊耳小石陸績曰艮剛卦之小也一説俞氏曰陽大陰小艮之陽畫為山故陰為小石郭子和以為山與小石如坎水溝瀆之類上陽連亘下陰雙峙門闕象一剛在上象木果二柔在下象草蓏項氏曰震敷草木之始艮果蓏草木之終果蓏終而又能始故於艮象切也閽寺者吳幼清曰外一剛閽人無足而禦止於外內二柔寺人無陽而給使於內也為指據王太古當足指括蒼龔氏曰指於四支之末而能止者虞翻艮手多節非也為狗漢上朱氏曰狗當作豿爾雅謂熊虎醜其子豿蓋虎子未有文猶狗也虞翻作拘曰指屈伸制物為拘舊作狗上已為狗字之誤愚謂虞説非也艮以止為義拘物則動矣鼠與豿皆善嚙艮剛在前也郭子和曰坎之隱伏在君子為隱在小人為盜艮之利則狗害則鼠皆一義而二象也黔喙依鄭氏作黔馬融曰肉食之獸黔黑色陽玄在前吳幼清與鈐通謂齒牙堅利如鐵持束物者愚謂陽色非玄黔亦不與鈐通也郭子和曰艮剛動於上故言喙堅多節剛不中也中則為心不中則為節心則利用節則不利于用二卦之辨也證誤狗據爾雅及朱漢上作豿黔據鄭氏作黚兑為澤為少女為巫為口舌為毁折為附決其於地也為剛鹵為妾為羊澤者虞翻謂坎水半見俞氏曰坎體則上下俱虛澤體則上虛而下實川壅則成澤澤決則成川也巫吳幼清曰少女外以口媚悅陽神俾陽神降于身內也為口舌兑上折偶畫口之象中內畫奇連亘舌之象也毁折者前畫缺橫渠張子曰物成則上柔者必折也附決一陰附二陽之外以為決龔氏謂震動斯決無所附兑決附不足於震也孔頴達曰秋物成熟稿稈之屬則毁折果蓏之實則附決剛鹵吳幼清曰東方斥西方鹵在燥地而剛下二陽剛也上一陰鹵也鄭少梅謂剛者出金鹵者出鹽雖不生五穀而寶貨興兑為妾外柔而有所承少女從姊為娣也為羊虞翻作羔鄭康成本作陽是也陽養無家女行賃炊㸑賤於妾者郭璞引魯詩曰陽如之何又曰巴濮之人自呼阿陽是其義也後漢西南夷傳夷女為婸徒右第十一章證誤羊據鄭氏及魯詩作陽胡氏曰説卦所論八卦方位之不同初未嘗有先後之分也自邵子發明之朱子表章之然後羲文之易辨明於世而孔子所論方位始各有歸著俾學者觀於卦位對待流行而先後天之分較然矣今觀第六章自神也者妙萬物而為言至莫盛乎艮是承前章論後天八卦之位自水火不相逮至既成萬物也仍是先天八卦位次朱啓蒙已言之矣自第七章至第十章啓蒙以為文王觀已成之卦推未明之象為後天之學入用之位何子元曰自七章至篇末十一章皆先天八卦位次而孔子推未明之象以為説故卦次與第三章第四章同其逸象乾有四龍直衣言坤有八牝迷方囊裳黃白􅀈吳氏本無黃震有三玉鵠鼓吳氏曰圭象見益六三誤作玉鶴象見中孚九二誤作鵠當依吳説巽有二楊鸛吳據漸鸛作鴻坎有八宫律可棟叢棘狐蒺藜桎梏離一牝牛艮三鼻虎狐吳氏曰履彖六三九四頥六四革九五履革皆無艮艮不象虎狐者豹之誤兑有二常輔頰常何子元曰西方神或曰九旗之一下二奇象通帛下垂上一偶象分繫於杠愚以為非乃定常作府以上皆因爻中所有而增俞氏謂非本文是矣胡仲虎曰有相對取象者有反對取象老有相因取象者有一卦中自相因取象者有不言互見者可以觸類而通矣查籥有言若倫理不通雖復多添亦何可盡諒哉吾以為然證誤玉依吳氏作圭鵠依吳氏作鶴狐依吳氏作豹常當作虎詳見前履鸛依吳氏作鴻序卦傳有天地然後萬物生焉盈天地之間者唯萬物故受之以屯屯者盈也屯者物之始生也物生必蒙故受之以蒙蒙者蒙也物之稚也物稚不可不養也故受之以需需者飲食之道也飲食必有訟故受之以訟訟必有衆起故受之以師師者衆也衆必有所比故受之以比比者比也比必有所畜故受之以小畜物畜然後有禮故受之以履履而泰然後安故受之以泰泰者通也物不可以終通故受之以否物不可以終否故受之以同人與人同者物必歸焉故受之以大有有大者不可以盈故受之以謙有大而能謙必豫故受之以豫豫必有隨故受之以隨以喜隨人者必有事故受之以蠱蠱者事也有事而後可大故受之以臨臨者大也物大然後可觀故受之以觀可觀而後有所合故受之以噬嗑嗑者合也物不可以茍合而已故受之以賁賁者飾也致飾然後亨則盡矣故受之以剝剝者剝也物不可以終盡剝窮上反下故受之以復復則不妄矣故受之以無妄有無妄然後可畜故受之以大畜物畜然後可養故受之以頥頥者養也不養則不可動故受之以大過物不可以終過故受之以坎坎者陷也陷必有所麗故受之以離離者麗也證脫簡蒙也上據郭京脫蒙字比也上據郭京脫親履下據王弼略例脫履者體也四字有天地然後有萬物有萬物然後有男女有男女然後有夫婦有夫婦然後有父子有父子然後有君臣有君臣然後有上下有上下然後禮義有所錯夫婦之道不可以不久也故受之以恆恆者久也物不可以久居其所故受之以遁遁者退也物不可以終遁故受之以大壯物不可以終壯故受之以晉晉者進也進必有所傷故受之以明夷夷者傷也傷於外者必反其家故受之以家人家道窮必乖故受之以暌暌者乖也乖必有難故受之以蹇蹇者難也物不可以終難故受之以解解者緩也緩必有所失故受之以損損而不已必益故受之以益益而不已必決故受之以夬夬者決也決必有所遇故受之以姤姤者遇也物相遇而後聚故受之以萃萃者聚也聚而上者謂之升故受之以升升而不已必困故受之以困困乎上者必反下故受之以井井道不可不革故受之以革革物者莫若鼎故受之以鼎主器者莫若長子故受之以震震者動也物不可以終動止之故受之以艮艮者止也物不可以終止故受之以漸漸者進也進必有所歸故受之以歸妹得其所歸者必大故受之以豐豐者大也窮大者必失其居故受之以旅旅而無所容故受之以巽巽者入也入而後説之故受之以兑兑者説也説而後散之故受之以渙渙者離也物不可以終離故受之以節節而信之故受之以中孚有其信者必行之故受之以小過有過物者必濟故受之以既濟物不可窮也故受之以未濟終焉文中子讚易至序卦云大哉時之相生也達者可與幾矣張文饒云序卦上經不言乾坤下經不言咸者天地人物之本必藏諸用是皆謂有精義焉然吾未能無疑者以其發言淺末牽繞也甘泉湛子曰序卦者君子之讀易至此而有感焉易既成而象之者也是故其言序者順其指達其辭枝而牽其聖人之疑乎俞氏曰序卦者孔子釋文王六十四卦之先後次第也上經三十卦約之為十八下經三十四卦約之亦為十八上下經之分也乾坤隂陽之純坎離隂陽之中為天地四正故乾坤坎離居上咸恆損益在下震巽艮兑之交也上經首乾坤天地二體分也下經首咸恆者夫婦二體合也易道貴中坎離終上經既濟未濟坎離交故終下經泰否在上乾父坤母自交也需訟同人大有無妄大畜小畜履以乾父交六子故在上師比謙豫在上坤母交三男也晉明夷萃升在下坤母交三女也剝復臨觀退而上一陽二陽為主也夬姤遁大壯退而下一隂二隂為主也困井革鼎家人暌蹇解豐旅渙節六子自交居下屯蒙居上者三男繼父母用事也屯蒙以坎離交震艮而在上故噬嗑賁以離交震艮亦在上隨蠱漸歸妹皆震巽艮兑之交而隨蠱在上長男長女為主也頥大過中孚小過皆震巽艮兑交然頥大過互乾坤故在上中孚小過止肖坎離故在下而胡庭芳又謂本先天圓圖四正在上經四隅在下經乾坤坎離四純居上經震艮巽兑皆其遇震艮巽兑四純居下經坎離乾坤皆其遇上經自坎離之外無一卦無乾坤下經自既未外無一卦無艮兑震巽上經自乾坤而後三陰三陽之卦凡六乃乾坤之三變否泰乾坤之三陰三陽交不交也隨蠱乾坤之三陽三陰雜居噬嗑賁乾坤之三陰三陽分布餘則乾坤兩體各司諸卦下經自咸恆而後艮兑震巽相重之卦亦六乃咸恆之三變損者咸變之盡艮上兑下益者恆變之盡巽上震下説與俞同猶上經有否泰也咸恆之下二體艮巽合而為漸咸恆之上二體兑震合而為歸妹猶上經有蠱隨也以咸下艮遇恆上震為小過咸上兑遇恆下巽為中孚猶上經有噬嗑賁也餘則艮兑震巽各司諸卦是其説成巧矣至於屯蒙隨蠱噬嗑賁頥大過無乾坤正體遁壯晉夷夬姤萃升乃有乾坤非盡艮兑巽離之合則為之解曰文王不以此十六卦兩易者分隂分陽互為其根也於戲又何巧哉豫因是頗韙俞義然豫觀一行易纂有孟喜序卦云陰陽養萬物必訟而成之君臣養萬民亦訟而成之可觀而後有所合鄭本引乾鑿度云陽起於子陰起於午天數天分以陽出離以陰入坎坎為中男離為中女大乙之行出從中男入從中女因陰陽男女之偶為終始也淮南子引易云剝之不可遂盡也故受之以復説苑引孔子告子路曰易曰不損而益之故損自損而終故益荀爽傳引易云有上下然後有禮義禮義備則人知所厝王昭素謂離者麗也麗必有所感故受之以咸咸者感也朝以正古易取之增入正文是序卦者經師互有異同亦容有經師之説參乎其中矣其淺末牽繞奚暇論之哉或曰上下經之各十八何也曰以應天地之數也劉仲敬為豫述邵氏之意曰天地之數各四而用者各三則為六又三其六則十有八矣雜卦傳雜卦者韓康伯云雜揉衆卦錯綜其義或以類相同或以異相明也朱先生有言雜卦反對之義惟反覆則吉凶禍福動靜剛柔皆相反也豫按其義指未能使心怡然吳幼清曰錯揉其次依文王反對之偶而不仍其先後之序故為雜其義以明六十四卦所主之爻然吳氏亦有不能用其説遍通之或通之而不暢顧其得者多豫是之文中子讚易至雜卦云旁行而不流守者可與存義矣於戲至哉俞氏自姤至乾為羲易自乾至未濟為文易自乾至夬為孔易尋其言亦非無見者乾剛坤柔比樂師憂乾主上九坤主上六比樂師憂皆一陽統五陰之卦也比一陽在上為顯比之主師一陽在下為行險之帥虞翻謂三失位輿尸故憂非也臨觀之義或與或求吳幼清曰二陽浸長上陰不以勢臨而與之以俟其進四陰已盛然不進逼陽統率三陰居下求觀九五中正其解是已龔氏謂上臨下下臨上已觀物物觀已非也俞氏謂二陽在內方進而臨在外之四陰是我出而與人二陽在上將去而四陰在下仰觀之是人望而求我臨觀人之義未明矣屯見而不失其居蒙雜而著屯蒙皆二陽之卦陽陷一也而位不同屯陽見於上卦二陰之中而為主下一陽動乎險中而利居貞蒙陽雜於下卦二陰之中而為主其上一陽止於險外以貞示人郭京以雜作稚恐不必然也震起也艮止也損益盛衰之始也張文饒曰方陽交陰而生也離三附震之四變艮之七坎離相遇老陽成物則艮復反震之四故為震起艮止夫張氏殆一道乎起止者主陽言之耳張説鑿矣龔氏云損之終必益則損乃盛之始益之終必損則益乃衰之始吳氏非之按李鼎祚損泰初益上衰之始損否上益初盛之始其説近之但損泰三往上非泰初益否四益初非否上耳關朗曰始盛者由衰而益始衰者由盛而損大畜時也無妄災也以艮畜乾而可者艮為上主而力足以畜大故云時也吳氏必指大壯之四往上者非也以乾行震而不利者震為下主以上主者為時則下主者災矣是上下之分也吳氏以為九不處三而三失牛亦是非也虞翻謂大畜五之復二成臨時捨坤二故時無妄上之遁初子弒父故災益支蔓紆曲不可詰矣萃聚而升不來也萃升皆四陰之卦萃一陰為上卦之主而三陰聚於下升一陰為下卦之主而三陰往於上李鼎祚升五不來之二吳氏謂萃以觀四往上升以臨三來初亦鑿矣不來者主陰而言易以上為往下為來也謙輕而豫怠也虞氏以怠作怡曰豫樂祖考故怡項氏曰此以怡時災來叶爾怠亦未嘗不叶平上去入之分自沈約始贊易時固未分也陽在下卦自抑而為謙之主故輕陽在上卦自亢而為豫之主故怠噬嗑食也賁無色也噬嗑賁皆三陰三陽之卦噬嗑中陽在頥居下卦震動之上食也賁中陽文剛而光輝於艮實之內無色也吳氏謂噬嗑自否變賁自泰變殆謬説也色謂一色文則無一色矣兑見而巽伏也關子明曰兑見也以其陰柔外形乎巽伏也以其陰柔內藴乎朱義本之張文饒曰方陰交陽而生也兑二得離之三變巽之五及其成也巽五得坎之六離坎相遇老陽成物巽復反兑之二故為兑見巽伏夫張氏鑿矣隨無故也蠱則飭也吳幼清曰隨初九為主聽二陰自隨而無所作為蠱初六為主承乾父體壞而有所整治剝爛也復反也晉晝也明夷誅也孫奕示兒編誅當作昧明出地上為晝明入地中為昧得反對之義關氏曰蒙昧者厥道求乎明明夷亦昧也非不明蓋傷之爾孫義取此井通而困相遇也巽之上爻主塞坎水之下流而坎水乃出在上蓋塞而後通者也兑之下爻主塞坎水之上源而坎水適在下正遇其塞所以困也吳幼清謂井初九升五而坎水上通困上九降二遇陰而掩亦非是也咸速也恆久也渙離也節止也解緩也蹇難也吳幼清曰咸九三不上感正應而下感近比欲速感也恆初六以柔巽處卑下妻道之可久者也渙九二坎水在巽風之下為風所離散節九五坎水在兑澤之上為澤所節止解九二坎陷在內震則出險而動於外內險已解緩也蹇九五坎險在外艮則見險而止於內外險方艱難也暌外也家人內也虞翻曰離女在上故外女正位乎內故內謂二五陰爻也關朗曰明乎外者物自暌故曰暌外明乎內者家自齊故家人內也否泰反其類也括蒼龔氏曰否泰以類相反故爻言疇言彚吳幼清曰否三四相易為漸泰三四相易為歸妹漸四復反於三就其同類之陰為否歸妹四復反於三就其同類之陽為泰故曰反其類以反訓歸豫謂吳氏蓋執主爻之説為支蔓矣大壯則止遁則退也大壯剛以動而曰止非其象矣止蓋正之誤字也大壯之勢陽上而不已遁則陽退諸家之説紛紛悉牽會無足取也大有衆也同人親也項氏玩辭曰大有同人皆以離之中爻為主在上則人歸乎我是之謂衆在下則我同乎人是之謂親隆山李氏曰離為火火性炎上上而趨乾故曰同人親革去故也鼎取新也小過過也中孚信也吳幼清曰革六二離火在內而兑澤燥渴尾閭沃之火去其澤之故者也鼎六五離火在上而巽木生之燧改薪傳之火取其木火之新者也小過九四主也而為六五所過蓋陰盛能過陽衰不反也中孚六四主也而為九五所信蓋陽實能感陰虛能應也豐多故親寡旅也荀本豐多故親絶句者非依京氏本故下有也字豐以二四為主二為明之主而四為動之主動乎明中內文明則有所容為多故旅以三五為主三為止之主五為明之主止乎明下外文明則有所察故無徒吳幼清曰豐六二在內為主於明盛之中外與四相易而情相得初六往上三亦來孚故舊之多也旅六五在外為主於羈窮之中內與三相易而情不相親相親者寡愚謂豐二四相得旅三五不相得本無所據也離上而坎下也小畜寡也履不處也吳幼清曰離六五為主火炎而上故上征而折上九之首坎九五為主水潤而下故下比而納六四之約小畜一陰畜藏於五陽之間所畜者寡少履六三履行於二陽之上所履者剛又不得正位非其所安故行去而不留處也需不進也訟不親也需九五為主下三陽以險在前而不進訟以九二為主水性潤下天髙違行而不親大過顛也姤遇也柔遇剛也漸女歸待男行也頥養正也既濟定也歸妹女之終也未濟男之窮也夬決也剛決柔也君子道長小人道憂也大過以下朱義謂卦不反對或是錯簡以韻協之又似非誤未詳何義按鄭康成時則已有是疑矣蘇東坡易傳改云頥養正也大過顛也姤遇也柔遇剛也夬決也剛決柔也君子道長小人道憂也漸女歸待男行也歸妹女之終也既濟定也未濟男之窮也以為相從之次相反之義洪邁隨筆大以為然然亦時有失韻者矣其後節齋蔡氏易義改云大過顛也頥養正也既濟定也未濟男之窮也歸妹女之終也漸女歸待男行也姤遇也柔遇剛也夬決也剛決柔也君子道長小人道憂也丘氏云今依蔡易讀之則八卦既得以類從而於韻亦叶但不當僣改經文耳今姑仍蔡舊文折之大過本末弱又以上應三如首向下皆顛義也既濟六爻皆當位故定未濟三陽皆失位是為男窮三陰亦失位不足言也吳氏既濟必主六二未濟主九二也者亦太泥哉歸妹之義吳幼清曰六三女君之娣女之少者既歸則女之事終也漸九三得男位之正而將往迎六四之女女待其迎而後行也易終雜卦可反覆為兩而剛柔吉凶相反變易之義也自乾坤至困三十卦當上經之數中雜下經十二卦自咸至夬三十四卦當下經之數中雜上經十二卦坎離以交中居上經今下附震艮巽兑以交偏居下今上附其無反對者上經六今附以二下經二今附以六又皆交易矣十二辟卦除乾坤上經泰否臨觀剝復陰多於陽者十二下經遁壯姤夬陽多於陰者十二移否泰於三十四卦之中而陰陽之多少復如之特在上經者三十六畫今附者二十四下經者二十四畫今附者三十六愈見其交易之妙爾若合論六十四卦上經三十卦陰爻之多於陽者八下經三十四卦陽爻之多於陰者亦八今附於三十卦者陰多三十六附於三十四卦者陽多亦三十六以反對論上經陰多者四下經陽多亦四今則附於上者陰爻多十八附於下者陽多亦十八或三十六或十八互為多少陰陽交易而三十六宫之妙愈可見矣伏羲之畫文王周公孔子之言皆天也自大過以下雜物撰德指中四爻互體而言先天圖之左互復頥既濟家人歸妹暌夬乾八卦右互姤大過未濟解漸蹇剝坤八卦此則於右取姤大過未濟漸四卦於左取頥既濟歸妹夬四卦各舉半可兼其餘雜卦中取互體又其最雜者也上三十卦終以困柔掩剛下三十四卦終以夬剛決柔柔掩剛君子不失其所亨剛決柔君子道長小人道憂矣雜卦之末特别君子小人其意微矣始乾終夬一陰決盡則乾也考皇極經世乾已會之終當堯世欲自夬而乾如堯世者任賢去邪疑謀勿成以為夬耳胡仲虎言有可採者因括而附末簡焉周易象旨決録卷七
